/* =====================================================================
   TASK MODAL — create or edit a task
   ===================================================================== */
function TaskModal() {
  const { state, dispatch } = useApp();
  const { task, accountId: initialAccountId } = state.modalProps;
  const editing = !!task;

  const [accountId, setAccountId] = useState(task?.account_id || initialAccountId || '');
  const [title, setTitle] = useState(task?.title || '');
  const [notes, setNotes] = useState(task?.notes || '');
  const [assigneeId, setAssigneeId] = useState(task?.assignee_id || state.profile?.id || '');
  const [dueDate, setDueDate] = useState(task?.due_at ? task.due_at.slice(0,10) : '');
  const [dueTime, setDueTime] = useState(task?.due_at ? new Date(task.due_at).toTimeString().slice(0,5) : '');
  const [busy, setBusy] = useState(false);

  async function submit(e) {
    e.preventDefault();
    if (!title.trim()) return notify(dispatch, 'Title required.', 'error');
    if (!accountId) return notify(dispatch, 'Account required.', 'error');
    if (!assigneeId) return notify(dispatch, 'Assignee required.', 'error');

    setBusy(true);
    const due_at = dueDate ? new Date(`${dueDate}T${dueTime || '17:00'}`).toISOString() : null;
    const payload = {
      account_id: accountId,
      assignee_id: assigneeId,
      title: title.trim(),
      notes: notes || null,
      due_at,
    };
    let result;
    if (editing) {
      result = await supabase.from('tasks').update(payload).eq('id', task.id).select().single();
    } else {
      result = await supabase.from('tasks').insert({ ...payload, created_by: state.profile.id }).select().single();
    }
    setBusy(false);
    if (result.error) return notify(dispatch, result.error.message, 'error');
    dispatch({ type: 'UPSERT_TASK', task: result.data });
    dispatch({ type: 'CLOSE_MODAL' });
    notify(dispatch, editing ? 'Task updated.' : 'Task added.');
  }

  async function deleteTask() {
    if (!editing) return;
    if (!window.confirm('Delete this task?')) return;
    const { error } = await supabase.from('tasks').delete().eq('id', task.id);
    if (error) return notify(dispatch, error.message, 'error');
    dispatch({ type: 'REMOVE_TASK', id: task.id });
    dispatch({ type: 'CLOSE_MODAL' });
    notify(dispatch, 'Deleted.');
  }

  return (
    <Modal open={true} onClose={() => dispatch({ type: 'CLOSE_MODAL' })} title={editing ? 'Edit task' : 'New task'} width="max-w-xl">
      <form onSubmit={submit} className="space-y-3">
        <Input label="Title *" value={title} onChange={e => setTitle(e.target.value)} required autoFocus placeholder="Follow up on proposal, send pricing, etc." />
        <Select label="Account *" value={accountId} onChange={e => setAccountId(e.target.value)} includeBlank
                options={state.accounts.filter(a => a.status === 'active').map(a => ({ value: a.id, label: a.name }))} />
        <div className="grid grid-cols-2 gap-3">
          <Input label="Due date" type="date" value={dueDate} onChange={e => setDueDate(e.target.value)} />
          <Input label="Due time" type="time" value={dueTime} onChange={e => setDueTime(e.target.value)} />
        </div>
        <Select label="Assignee *" value={assigneeId} onChange={e => setAssigneeId(e.target.value)}
                options={state.profiles.map(p => ({ value: p.id, label: p.full_name }))} />
        <Textarea label="Notes" rows={3} value={notes} onChange={e => setNotes(e.target.value)} />
        <div className="flex items-center justify-between pt-2 border-t border-gray-200">
          {editing
            ? <Button type="button" variant="ghost" onClick={deleteTask} className="text-red-600">Delete</Button>
            : <span />}
          <div className="flex gap-2">
            <Button type="button" variant="secondary" onClick={() => dispatch({ type: 'CLOSE_MODAL' })}>Cancel</Button>
            <Button type="submit" disabled={busy}>{busy ? 'Saving…' : (editing ? 'Save' : 'Add task')}</Button>
          </div>
        </div>
      </form>
    </Modal>
  );
}

function MeetingModal() {
  const { state, dispatch } = useApp();
  const { startISO, accountId: initialAccountId } = state.modalProps;
  const initialStart = startISO ? new Date(startISO) : new Date(Math.ceil(Date.now() / (15*60000)) * 15*60000);

  const [accountId, setAccountId] = useState(initialAccountId || '');
  const [subject, setSubject] = useState('');
  const [date, setDate] = useState(() => {
    const local = new Date(initialStart.getTime() - initialStart.getTimezoneOffset() * 60000);
    return local.toISOString().slice(0,10);
  });
  const [time, setTime] = useState(() => {
    const hh = String(initialStart.getHours()).padStart(2,'0');
    const mm = String(initialStart.getMinutes()).padStart(2,'0');
    return `${hh}:${mm}`;
  });
  const [duration, setDuration] = useState(30);
  const [attendeeEmail, setAttendeeEmail] = useState('');
  const [meetingType, setMeetingType] = useState('virtual'); // 'physical' | 'virtual'
  const [location, setLocation] = useState('');
  const [notes, setNotes] = useState('');
  const [busy, setBusy] = useState(false);

  const account = state.accounts.find(a => a.id === accountId);
  const contacts = state.contacts[accountId] || [];

  // When an account is picked, autofill subject + location + load contacts
  useEffect(() => {
    if (!accountId || !account) return;
    setSubject(prev => prev || `Meeting · ${account.name}`);
    const addr = [account.street, account.city, account.state].filter(Boolean).join(', ');
    if (addr) setLocation(prev => prev || addr);
    if (!state.contacts[accountId]) {
      supabase.from('contacts').select('*').eq('account_id', accountId)
        .order('is_primary', { ascending: false }).order('created_at', { ascending: true })
        .then(({ data }) => { if (data) dispatch({ type: 'LOAD_CONTACTS', accountId, contacts: data }); });
    }
  }, [accountId]);

  useEffect(() => {
    if (!contacts.length || attendeeEmail) return;
    const primary = contacts.find(c => c.is_primary) || contacts[0];
    if (primary?.email) setAttendeeEmail(primary.email);
  }, [contacts]);

  function isValidEmail(s) {
    return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test((s || '').trim());
  }

  const emailOk = isValidEmail(attendeeEmail);
  const physicalOk = meetingType !== 'physical' || location.trim().length > 0;
  const canSubmit = emailOk && physicalOk && subject.trim() && date && time && !busy;

  async function submit(e) {
    e.preventDefault();
    if (!state.googleConnected) return notify(dispatch, 'Connect Google Calendar first (top-right menu).', 'error');
    if (!emailOk) return notify(dispatch, 'A valid attendee email is required.', 'error');
    if (!physicalOk) return notify(dispatch, 'Enter a physical address.', 'error');

    setBusy(true);
    const start = new Date(`${date}T${time}`);
    const end = new Date(start.getTime() + duration * 60000);
    try {
      const description = [
        notes,
        accountId ? `Crocs & Clicks CRM\nAccount: ${account?.name}\n${window.location.origin}${window.location.pathname}#/accounts/${accountId}` : 'Crocs & Clicks CRM',
      ].filter(Boolean).join('\n\n');

      const ev = await gcal.createEvent({
        summary: subject.trim(),
        description,
        startISO: start.toISOString(),
        endISO: end.toISOString(),
        attendees: [attendeeEmail.trim()],
        location: meetingType === 'physical' ? location.trim() : null,
        virtual: meetingType === 'virtual',
      });

      const meetLink = ev?.conferenceData?.entryPoints?.find(p => p.entryPointType === 'video')?.uri;

      if (accountId) {
        const { data: upd } = await supabase.from('accounts').update({
          meeting_set: true,
          meeting_at: start.toISOString(),
          updated_by: state.profile.id,
        }).eq('id', accountId).select().single();
        if (upd) dispatch({ type: 'UPSERT_ACCOUNT', account: upd });

        const body = [
          `Invite sent to ${attendeeEmail.trim()}`,
          meetingType === 'physical' ? `Location: ${location.trim()}` : `Google Meet: ${meetLink || '(link in calendar event)'}`,
        ].join('\n');

        await supabase.from('activities').insert({
          account_id: accountId, user_id: state.profile.id, type: 'meeting',
          subject: `Meeting scheduled: ${subject.trim()}`,
          body,
          occurred_at: new Date().toISOString(),
        });
      }

      notify(dispatch, meetingType === 'virtual' && meetLink ? 'Meeting created. Meet link added.' : 'Meeting created on Google Calendar.');
      dispatch({ type: 'CLOSE_MODAL' });
      window.dispatchEvent(new CustomEvent('gcal-refresh'));
    } catch (e2) {
      console.error('[CRM] Meeting creation failed:', e2);
      notify(dispatch, e2.message || 'Meeting creation failed — see console for details.', 'error');
    } finally { setBusy(false); }
  }

  return (
    <Modal open={true} onClose={() => dispatch({ type: 'CLOSE_MODAL' })} title="New meeting" width="max-w-xl">
      <form onSubmit={submit} className="space-y-3">
        <Select label="Account (optional)" value={accountId} onChange={e => setAccountId(e.target.value)}
                includeBlank blankLabel="— No account (personal / internal) —"
                options={state.accounts.filter(a => a.status === 'active').map(a => ({ value: a.id, label: a.name }))} />
        <Input label="Subject *" value={subject} onChange={e => setSubject(e.target.value)} required autoFocus />
        <div className="grid grid-cols-3 gap-3">
          <Input label="Date" type="date" value={date} onChange={e => setDate(e.target.value)} />
          <Input label="Start time" type="time" value={time} onChange={e => setTime(e.target.value)} />
          <Select label="Duration" value={String(duration)} onChange={e => setDuration(parseInt(e.target.value,10))}
                  options={[
                    {value:'15',label:'15 min'},
                    {value:'30',label:'30 min'},
                    {value:'45',label:'45 min'},
                    {value:'60',label:'1 hour'},
                    {value:'90',label:'1.5 hours'},
                    {value:'120',label:'2 hours'},
                  ]} />
        </div>
        <div>
          <Input label="Attendee email *" type="email" value={attendeeEmail} onChange={e => setAttendeeEmail(e.target.value)} required placeholder="prospect@example.com — Google sends them an invite" />
          {!emailOk && attendeeEmail && <div className="text-xs text-red-600 mt-1">Enter a valid email address.</div>}
        </div>
        <div>
          <div className="text-xs font-medium text-gray-700 mb-1">Meeting type</div>
          <div className="flex gap-2">
            <button type="button" onClick={() => setMeetingType('virtual')}
              className={classNames('flex-1 px-3 py-2 rounded border text-sm text-left',
                meetingType === 'virtual' ? 'border-blue-600 bg-blue-50 text-blue-900' : 'border-gray-300 bg-white text-gray-700 hover:bg-gray-50')}>
              <div className="font-medium">Virtual</div>
              <div className="text-xs opacity-80">Google Meet link added automatically</div>
            </button>
            <button type="button" onClick={() => setMeetingType('physical')}
              className={classNames('flex-1 px-3 py-2 rounded border text-sm text-left',
                meetingType === 'physical' ? 'border-blue-600 bg-blue-50 text-blue-900' : 'border-gray-300 bg-white text-gray-700 hover:bg-gray-50')}>
              <div className="font-medium">Physical</div>
              <div className="text-xs opacity-80">Enter an address or room</div>
            </button>
          </div>
        </div>
        {meetingType === 'physical' && (
          <Input label="Address / location *" value={location} onChange={e => setLocation(e.target.value)} required placeholder="123 Main St, Vancouver WA" />
        )}
        <Textarea label="Notes" rows={3} value={notes} onChange={e => setNotes(e.target.value)} />
        <div className="flex justify-end gap-2 pt-2 border-t border-gray-200">
          <Button type="button" variant="secondary" onClick={() => dispatch({ type: 'CLOSE_MODAL' })}>Cancel</Button>
          <Button type="submit" disabled={!canSubmit}>{busy ? 'Creating…' : 'Create meeting'}</Button>
        </div>
      </form>
    </Modal>
  );
}

/* =====================================================================
   DIALER MODAL — Twilio Voice click-to-call
   ===================================================================== */
function DialerModal() {
  const { state, dispatch } = useApp();
  const { to, accountId, contactId, accountName, contactName } = state.modalProps || {};
  const account = useMemo(() => accountId ? state.accounts.find(a => a.id === accountId) : null, [accountId, state.accounts]);

  // 'idle' | 'connecting' | 'on_call' | 'ended' | 'error'
  const [status, setStatus] = useState('idle');
  const [errorMsg, setErrorMsg] = useState('');
  const [duration, setDuration] = useState(0);
  const [isMuted, setIsMuted] = useState(false);
  const [notes, setNotes] = useState('');
  const callRef = useRef(null);
  const timerRef = useRef(null);
  const sidRef = useRef(null);

  function fmtDur(s) { return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`; }

  function teardown() {
    if (timerRef.current) { clearInterval(timerRef.current); timerRef.current = null; }
    if (callRef.current) { try { callRef.current.disconnect(); } catch {} }
  }

  async function persistNotes() {
    const sid = sidRef.current;
    if (!sid || !notes.trim()) return;
    await supabase.from('calls').update({ notes: notes.trim() }).eq('twilio_call_sid', sid);
  }

  async function refreshAccount() {
    if (!accountId) return;
    const { data } = await supabase.from('accounts').select('*').eq('id', accountId).single();
    if (data) dispatch({ type: 'UPSERT_ACCOUNT', account: data });
  }

  function closeModal() {
    teardown();
    // Close the modal immediately; run network cleanup in the background so a
    // slow Supabase response can never block the close.
    dispatch({ type: 'CLOSE_MODAL' });
    (async () => {
      try {
        await persistNotes();
        await refreshAccount();
        const { data: cls } = await supabase.from('calls').select('*').order('started_at', { ascending: false }).limit(1000);
        if (cls) dispatch({ type: 'SET_ALL_CALLS', calls: cls });
      } catch (e) {
        console.error('[dialer] post-close cleanup failed', e);
      }
    })();
  }

  async function dial() {
    const device = window.__twilioDevice;
    if (!device || state.twilio.status !== 'ready') {
      setErrorMsg(state.twilio.error || 'Phone system not ready. Refresh the page and try again.');
      setStatus('error');
      return;
    }
    setStatus('connecting');
    setErrorMsg('');
    try {
      const call = await device.connect({
        params: {
          To: to,
          accountId: accountId || '',
          contactId: contactId || '',
          userId: state.profile.id,
        },
      });
      callRef.current = call;
      sidRef.current = call.parameters?.CallSid || null;
      call.on('accept', () => {
        sidRef.current = call.parameters?.CallSid || sidRef.current;
        setStatus('on_call');
        const start = Date.now();
        timerRef.current = setInterval(() => setDuration(Math.floor((Date.now() - start) / 1000)), 250);
      });
      call.on('disconnect', () => {
        setStatus('ended');
        if (timerRef.current) { clearInterval(timerRef.current); timerRef.current = null; }
      });
      call.on('cancel', () => {
        setStatus('ended');
        if (timerRef.current) { clearInterval(timerRef.current); timerRef.current = null; }
      });
      call.on('reject', () => setStatus('ended'));
      call.on('error', (err) => {
        setStatus('error');
        setErrorMsg(err?.message || 'Call error');
        if (timerRef.current) { clearInterval(timerRef.current); timerRef.current = null; }
      });
    } catch (e) {
      setStatus('error');
      setErrorMsg(e?.message || 'Failed to start call');
    }
  }

  // Auto-dial as soon as the device is ready.
  useEffect(() => {
    if (status === 'idle' && state.twilio.status === 'ready') {
      dial();
    }
  }, [state.twilio.status]);

  // Cleanup on unmount.
  useEffect(() => () => teardown(), []);

  function hangup() {
    if (callRef.current) { try { callRef.current.disconnect(); } catch {} }
  }
  function toggleMute() {
    if (callRef.current) {
      const next = !isMuted;
      try { callRef.current.mute(next); setIsMuted(next); } catch {}
    }
  }

  const callerId = account?.caller_id_number || null;
  const headline = contactName || accountName || formatPhone(to) || 'Unknown';
  const subline  = (contactName && accountName) ? accountName : null;

  return (
    <Modal open={true} onClose={closeModal} title="Dial" width="max-w-md">
      <div className="space-y-3">
        <div>
          <div className="text-xs text-gray-500">Calling</div>
          <div className="text-lg font-medium text-gray-900">{headline}</div>
          {subline && <div className="text-sm text-gray-600">{subline}</div>}
          <div className="text-sm text-gray-700 mt-0.5">{formatPhone(to)}</div>
        </div>

        <div className="text-xs text-gray-500">
          From: <span className="font-medium text-gray-700">{callerId ? formatPhone(callerId) : '— assigned automatically on first call —'}</span>
        </div>

        <div className="min-h-[1.5rem]">
          {status === 'idle' && state.twilio.status !== 'ready' && (
            <div className="text-sm text-gray-600">Initializing phone… ({state.twilio.status})</div>
          )}
          {status === 'connecting' && <div className="text-sm text-blue-700">Dialing…</div>}
          {status === 'on_call'    && <div className="text-sm text-green-700">Connected · {fmtDur(duration)}</div>}
          {status === 'ended'      && <div className="text-sm text-gray-600">Call ended{duration > 0 ? ` (${fmtDur(duration)})` : ''}</div>}
          {status === 'error'      && <div className="text-sm text-red-700">{errorMsg || 'Error'}</div>}
        </div>

        <Textarea
          label="Call notes (saved when you close this dialog)"
          rows={3}
          value={notes}
          onChange={e => setNotes(e.target.value)}
          disabled={status === 'idle' && state.twilio.status !== 'ready'}
        />

        <div className="flex justify-end gap-2 pt-2 border-t border-gray-200">
          {(status === 'connecting' || status === 'on_call') && (
            <>
              <Button variant="secondary" onClick={toggleMute}>{isMuted ? 'Unmute' : 'Mute'}</Button>
              <Button variant="danger" onClick={hangup}>Hang up</Button>
            </>
          )}
          {(status === 'idle' || status === 'ended' || status === 'error') && (
            <>
              {(status === 'ended' || status === 'error') && (
                <Button variant="secondary" onClick={() => { setStatus('idle'); setDuration(0); setErrorMsg(''); sidRef.current = null; dial(); }}>Redial</Button>
              )}
              <Button onClick={closeModal}>Close</Button>
            </>
          )}
        </div>
      </div>
    </Modal>
  );
}

// Helper: open the dialer modal from anywhere with a clean payload.
function openDialer(dispatch, { to, accountId, contactId, accountName, contactName }) {
  const e164 = (() => {
    const d = digitsOnly(to);
    if (!d) return null;
    if (d.length === 11 && d.startsWith('1')) return '+' + d;
    if (d.length === 10) return '+1' + d;
    return null;
  })();
  if (!e164) { return; }
  dispatch({ type: 'OPEN_MODAL', modal: 'dialer', props: { to: e164, accountId, contactId, accountName, contactName } });
}

/* =====================================================================
   EMAIL COMPOSER MODAL — send via the rep's Gmail
   ===================================================================== */
function EmailModal() {
  const { state, dispatch } = useApp();
  const { accountId, contactId, accountName, contactName, defaultTo, replyToActivity } = state.modalProps || {};

  const isReply = !!replyToActivity;
  const [to, setTo] = useState(defaultTo || '');
  const [subject, setSubject] = useState(isReply
    ? (replyToActivity.email_subject?.startsWith('Re: ')
        ? replyToActivity.email_subject
        : `Re: ${replyToActivity.email_subject || ''}`)
    : '');
  const [body, setBody] = useState('');
  const [status, setStatus] = useState('idle'); // idle | sending | sent | error
  const [errorMsg, setErrorMsg] = useState('');

  function withTimeout(promise, ms, label) {
    return Promise.race([
      promise,
      new Promise((_, reject) => setTimeout(() => reject(new Error(`${label} timed out after ${ms / 1000}s`)), ms)),
    ]);
  }

  async function send() {
    if (!to.trim()) { setStatus('error'); setErrorMsg('Recipient required.'); return; }
    if (!state.googleConnected) {
      setStatus('error');
      setErrorMsg('Google not connected. Open the user menu (top-right) and click Reconnect Google.');
      return;
    }
    setStatus('sending'); setErrorMsg('');
    try {
      const sent = await withTimeout(gmail.send({
        to: to.trim(),
        subject: subject.trim(),
        body,
        threadId: replyToActivity?.gmail_thread_id || null,
        replyToMessageId: replyToActivity?.gmail_message_id || null,
      }), 20000, 'Gmail send');

      // Log the activity but don't let a slow Supabase response leave the
      // modal stuck — cap the wait and continue if it overruns.
      try {
        const insertPromise = supabase.from('activities').insert({
          account_id: accountId,
          contact_id: contactId || null,
          user_id: state.profile.id,
          type: 'email',
          subject: subject.trim() || '(no subject)',
          body,
          occurred_at: new Date().toISOString(),
          gmail_thread_id: sent.threadId || null,
          gmail_message_id: sent.id || null,
          email_to: to.trim(),
          email_from: state.user.email || null,
          email_subject: subject.trim() || null,
        }).select().single();
        const { data: activity, error } = await withTimeout(insertPromise, 10000, 'Activity log');
        if (error) console.error('[email] activity insert failed', error);
        else if (activity) dispatch({ type: 'ADD_ACTIVITY', activity });
      } catch (logErr) {
        console.error('[email] activity log skipped', logErr);
      }

      setStatus('sent');
      notify(dispatch, 'Email sent.');
      setTimeout(() => dispatch({ type: 'CLOSE_MODAL' }), 600);
    } catch (e) {
      setStatus('error');
      setErrorMsg(e?.message || 'Failed to send.');
    }
  }

  return (
    <Modal open={true} onClose={() => dispatch({ type: 'CLOSE_MODAL' })} title={isReply ? 'Reply' : 'New email'} width="max-w-2xl">
      <div className="space-y-3">
        {accountName && (
          <div className="text-xs text-gray-500">
            {contactName ? <>To <span className="font-medium text-gray-700">{contactName}</span> at <span className="font-medium text-gray-700">{accountName}</span></> : <>At <span className="font-medium text-gray-700">{accountName}</span></>}
          </div>
        )}
        <Input label="To" value={to} onChange={e => setTo(e.target.value)} placeholder="prospect@example.com" />
        <Input label="Subject" value={subject} onChange={e => setSubject(e.target.value)} />
        <Textarea label="Body" rows={10} value={body} onChange={e => setBody(e.target.value)} placeholder="Type your message…" />
        {!state.googleConnected && (
          <div className="text-xs text-amber-700 bg-amber-50 border border-amber-200 rounded px-2 py-1.5">
            Google isn't connected for this user yet. Click Connect Google in the user menu (top-right), then reopen this dialog.
          </div>
        )}
        {status === 'error' && <div className="text-xs text-red-600">{errorMsg}</div>}
        {status === 'sent'  && <div className="text-xs text-green-700">Sent.</div>}
        <div className="flex justify-end gap-2 pt-2 border-t border-gray-200">
          <Button variant="secondary" onClick={() => dispatch({ type: 'CLOSE_MODAL' })}>Cancel</Button>
          <Button onClick={send} disabled={status === 'sending' || status === 'sent'}>
            {status === 'sending' ? 'Sending…' : status === 'sent' ? 'Sent' : 'Send'}
          </Button>
        </div>
      </div>
    </Modal>
  );
}

function openEmail(dispatch, { accountId, contactId, accountName, contactName, defaultTo, replyToActivity }) {
  dispatch({
    type: 'OPEN_MODAL',
    modal: 'email',
    props: { accountId, contactId, accountName, contactName, defaultTo: defaultTo || '', replyToActivity: replyToActivity || null },
  });
}

/* =====================================================================
   EMAIL THREAD VIEWER — fetches the live thread from Gmail
   ===================================================================== */
function EmailThreadModal() {
  const { state, dispatch } = useApp();
  const { activity } = state.modalProps || {};
  const [thread, setThread] = useState(null);
  const [loading, setLoading] = useState(true);
  const [err, setErr] = useState('');

  useEffect(() => {
    if (!activity?.gmail_thread_id) { setLoading(false); setErr('No thread ID on this email.'); return; }
    (async () => {
      try {
        const t = await gmail.getThread(activity.gmail_thread_id);
        setThread(t);
      } catch (e) {
        setErr(e?.message || 'Failed to load thread.');
      } finally {
        setLoading(false);
      }
    })();
  }, [activity?.id]);

  function replyAll() {
    if (!thread?.messages?.length) return;
    const last = thread.messages[thread.messages.length - 1];
    const myEmail = (state.user?.email || '').toLowerCase();
    // Reply target: whoever isn't us in the From line
    const target = last.from && !last.from.toLowerCase().includes(myEmail)
      ? last.from
      : last.to;
    dispatch({ type: 'CLOSE_MODAL' });
    setTimeout(() => openEmail(dispatch, {
      accountId: activity.account_id, contactId: activity.contact_id,
      accountName: null, contactName: null,
      defaultTo: target,
      replyToActivity: { ...activity, gmail_message_id: last.id, gmail_thread_id: thread.id },
    }), 50);
  }

  return (
    <Modal open={true} onClose={() => dispatch({ type: 'CLOSE_MODAL' })} title={activity?.email_subject || activity?.subject || 'Email thread'} width="max-w-3xl">
      <div className="space-y-3 max-h-[70vh] overflow-y-auto scrollbar-thin">
        {loading && <div className="text-sm text-gray-500">Loading thread…</div>}
        {err && <div className="text-sm text-red-600">{err}</div>}
        {thread?.messages?.map((m, i) => (
          <div key={m.id} className={classNames('border rounded p-3', i === thread.messages.length - 1 ? 'border-blue-200 bg-blue-50/40' : 'border-gray-200 bg-white')}>
            <div className="text-xs text-gray-600 flex flex-wrap gap-x-3">
              <span><b>From:</b> {m.from}</span>
              <span><b>To:</b> {m.to}</span>
              {m.internalDate && <span>{m.internalDate.toLocaleString()}</span>}
            </div>
            <div className="text-sm text-gray-800 mt-2 whitespace-pre-wrap">{m.body || m.snippet}</div>
          </div>
        ))}
        {thread && thread.messages?.length === 0 && <div className="text-sm text-gray-500">Thread is empty.</div>}
      </div>
      <div className="flex justify-end gap-2 pt-3 border-t border-gray-200 mt-3">
        <Button variant="secondary" onClick={() => dispatch({ type: 'CLOSE_MODAL' })}>Close</Button>
        {thread?.messages?.length > 0 && <Button onClick={replyAll}>Reply</Button>}
      </div>
    </Modal>
  );
}

function ImportModal() {
  const { state, dispatch } = useApp();
  const [step, setStep] = useState(1);
  const [file, setFile] = useState(null);
  const [headers, setHeaders] = useState([]);
  const [rows, setRows] = useState([]);
  const [mapping, setMapping] = useState({});
  const [dedup, setDedup] = useState('domain');
  const [busy, setBusy] = useState(false);
  const [progress, setProgress] = useState({ done: 0, total: 0 });
  const [summary, setSummary] = useState(null);

  function onFile(f) {
    setFile(f);
    Papa.parse(f, {
      header: true, skipEmptyLines: true,
      complete: (res) => {
        const hdrs = (res.meta.fields || []).map(h => h.replace(/^﻿/, ''));
        const data = res.data.map(r => {
          const o = {};
          hdrs.forEach(h => { o[h] = (r[h] ?? r['﻿' + h] ?? '').toString().trim(); });
          return o;
        });
        setHeaders(hdrs);
        setRows(data);
        const m = {};
        hdrs.forEach(h => { m[h] = autoMap(h); });
        setMapping(m);
        setStep(2);
      }
    });
  }

  function rowToAccount(r) {
    const out = {};
    Object.entries(mapping).forEach(([header, field]) => {
      if (field === '__ignore__') return;
      let v = (r[header] ?? '').toString().trim();
      if (!v) return;
      if (field === 'phone') v = digitsOnly(v);
      if (field === 'website') v = v.replace(/^https?:\/\//,'').replace(/^www\./,'').replace(/\/+$/,'').toLowerCase();
      out[field] = v;
    });
    return out;
  }

  const proposed = useMemo(() => rows.map(rowToAccount), [rows, mapping]);
  const missingName = proposed.filter(p => !p.name).length;
  const dupesInUpload = useMemo(() => {
    const seen = new Set(); let n = 0;
    proposed.forEach(p => {
      const k = dedup === 'domain' ? normalizeDomain(p.website || '') : digitsOnly(p.phone || '');
      if (!k) return;
      if (seen.has(k)) n++; else seen.add(k);
    });
    return n;
  }, [proposed, dedup]);

  async function execute() {
    setBusy(true);
    setProgress({ done: 0, total: 0 });
    const errors = [];
    let created = 0, updated = 0, skipped = 0;

    // 1. Pre-fetch full existing accounts (one round trip)
    const { data: existing, error: exErr } = await supabase
      .from('accounts')
      .select('*')
      .neq('status', 'deleted');
    if (exErr) {
      errors.push(`Could not read existing accounts: ${exErr.message}`);
    }
    const byDomain = new Map();
    const byPhone = new Map();
    (existing || []).forEach(a => {
      if (a.website_domain) byDomain.set(a.website_domain, a);
      if (a.phone) byPhone.set(a.phone, a);
    });

    // 2. Partition into inserts and update patches
    const toInsert = [];
    const toUpdate = []; // { id, patch }
    for (const r of proposed) {
      if (!r.name) { skipped++; continue; }
      const dKey = normalizeDomain(r.website || '');
      const pKey = digitsOnly(r.phone || '');
      const match = dedup === 'domain' ? (dKey && byDomain.get(dKey))
                  : dedup === 'phone'  ? (pKey && byPhone.get(pKey))
                  : null;
      if (match) {
        const patch = {};
        Object.entries(r).forEach(([k, v]) => {
          if (v && (match[k] === null || match[k] === undefined || match[k] === '')) patch[k] = v;
        });
        if (Object.keys(patch).length === 0) { skipped++; continue; }
        patch.updated_by = state.profile.id;
        toUpdate.push({ id: match.id, patch });
      } else {
        toInsert.push({
          ...r,
          owner_id: state.profile.id,
          lead_source: r.lead_source || null,
          created_by: state.profile.id,
          updated_by: state.profile.id,
        });
      }
    }

    setProgress({ done: 0, total: toInsert.length + toUpdate.length });

    // 3. Batched inserts
    const BATCH = 50;
    for (let i = 0; i < toInsert.length; i += BATCH) {
      const batch = toInsert.slice(i, i + BATCH);
      const { data, error } = await supabase.from('accounts').insert(batch).select('id');
      if (error) {
        // Fall back to per-row inserts so one bad row doesn't kill the batch
        for (const row of batch) {
          const { error: e2 } = await supabase.from('accounts').insert(row);
          if (e2) { errors.push(`${row.name}: ${e2.message}`); skipped++; }
          else created++;
        }
      } else {
        created += (data || batch).length;
      }
      setProgress(p => ({ ...p, done: p.done + batch.length }));
    }

    // 4. Updates (one per row — Supabase has no batch update without RPC)
    for (const { id, patch } of toUpdate) {
      const { error } = await supabase.from('accounts').update(patch).eq('id', id);
      if (error) { errors.push(`update ${id}: ${error.message}`); skipped++; }
      else updated++;
      setProgress(p => ({ ...p, done: p.done + 1 }));
    }

    // 5. Audit + reload
    await supabase.from('prospect_imports').insert({
      user_id: state.profile.id,
      filename: file?.name || 'upload.csv',
      total_rows: proposed.length, created_count: created, updated_count: updated, skipped_count: skipped,
    });
    const { data: all } = await supabase.from('accounts').select('*').neq('status', 'deleted').order('updated_at', { ascending: false });
    if (all) dispatch({ type: 'LOAD_ACCOUNTS', accounts: all });

    setSummary({ created, updated, skipped, total: proposed.length, errors });
    setBusy(false);
    setStep(4);
  }

  return (
    <Modal open={true} onClose={() => dispatch({ type: 'CLOSE_MODAL' })} title="Import accounts from CSV" width="max-w-4xl">
      {step === 1 && (
        <div>
          <label className="block border-2 border-dashed border-gray-300 rounded p-10 text-center cursor-pointer hover:border-blue-400">
            <input type="file" accept=".csv,text/csv" className="hidden" onChange={e => e.target.files[0] && onFile(e.target.files[0])} />
            <div className="text-sm text-gray-700 mb-1">Drop a CSV here or click to choose</div>
            <div className="text-xs text-gray-500">First row should be headers. UTF-8 / UTF-8 BOM both fine.</div>
          </label>
        </div>
      )}
      {step === 2 && (
        <div>
          <div className="text-sm font-medium text-gray-900 mb-2">Map your columns</div>
          <div className="overflow-x-auto max-h-96 overflow-y-auto scrollbar-thin border border-gray-200 rounded">
            <table className="w-full text-sm">
              <thead className="bg-gray-50 sticky top-0">
                <tr><th className="px-3 py-2 text-left text-xs text-gray-600">CSV column</th><th className="px-3 py-2 text-left text-xs text-gray-600">Maps to</th><th className="px-3 py-2 text-left text-xs text-gray-600">Sample</th></tr>
              </thead>
              <tbody>
                {headers.map(h => (
                  <tr key={h} className="border-t border-gray-100">
                    <td className="px-3 py-1.5 text-xs font-mono text-gray-700">{h}</td>
                    <td className="px-3 py-1.5">
                      <select value={mapping[h] || '__ignore__'} onChange={e => setMapping(m => ({ ...m, [h]: e.target.value }))} className="text-xs border border-gray-300 rounded px-1.5 py-1 bg-white">
                        {CSV_FIELDS.map(f => <option key={f.key} value={f.key}>{f.label}</option>)}
                      </select>
                    </td>
                    <td className="px-3 py-1.5 text-xs text-gray-500 truncate-cell">{(rows[0]?.[h] || '').toString().slice(0,80)}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
          <div className="flex justify-between mt-3">
            <Button variant="secondary" onClick={() => setStep(1)}>Back</Button>
            <Button onClick={() => setStep(3)}>Next: Preview</Button>
          </div>
        </div>
      )}
      {step === 3 && (
        <div>
          <div className="grid grid-cols-2 gap-3 mb-3">
            <div className="bg-gray-50 border border-gray-200 rounded p-3 text-sm">
              <div className="font-medium text-gray-900 mb-1">Validation</div>
              <ul className="text-xs text-gray-700 space-y-0.5">
                <li>Rows: <span className="font-mono">{proposed.length}</span></li>
                <li>Missing name (will skip): <span className="font-mono">{missingName}</span></li>
                <li>Duplicates within upload: <span className="font-mono">{dupesInUpload}</span></li>
              </ul>
            </div>
            <div className="bg-gray-50 border border-gray-200 rounded p-3 text-sm">
              <div className="font-medium text-gray-900 mb-1">Dedup strategy</div>
              <label className="flex items-center gap-2 text-sm py-0.5"><input type="radio" checked={dedup === 'domain'} onChange={() => setDedup('domain')} /> Match on normalized website domain (recommended)</label>
              <label className="flex items-center gap-2 text-sm py-0.5"><input type="radio" checked={dedup === 'phone'} onChange={() => setDedup('phone')} /> Match on phone</label>
              <label className="flex items-center gap-2 text-sm py-0.5"><input type="radio" checked={dedup === 'none'} onChange={() => setDedup('none')} /> No dedup (create all)</label>
              <div className="text-xs text-gray-500 mt-1.5">Existing accounts are filled in empty fields only — your data is never overwritten.</div>
            </div>
          </div>
          <div className="text-sm font-medium text-gray-900 mb-1">Preview (first 10)</div>
          <div className="overflow-x-auto max-h-80 overflow-y-auto scrollbar-thin border border-gray-200 rounded">
            <table className="w-full text-xs">
              <thead className="bg-gray-50 sticky top-0">
                <tr>
                  {Object.values(mapping).filter(v => v !== '__ignore__').filter((v,i,a) => a.indexOf(v) === i).map(field => (
                    <th key={field} className="px-2 py-1.5 text-left text-gray-600">{CSV_FIELDS.find(f => f.key === field)?.label || field}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {proposed.slice(0,10).map((p, i) => (
                  <tr key={i} className="border-t border-gray-100">
                    {Object.values(mapping).filter(v => v !== '__ignore__').filter((v,i,a) => a.indexOf(v) === i).map(field => (
                      <td key={field} className="px-2 py-1 text-gray-700 truncate-cell">{p[field] || ''}</td>
                    ))}
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
          <div className="flex justify-between mt-3">
            <Button variant="secondary" onClick={() => setStep(2)}>Back</Button>
            <Button disabled={busy} onClick={execute}>
              {busy
                ? (progress.total > 0
                    ? `Importing ${progress.done} of ${progress.total}…`
                    : 'Preparing…')
                : `Import ${proposed.length - missingName} rows`}
            </Button>
          </div>
        </div>
      )}
      {step === 4 && summary && (
        <div className="py-6">
          <div className="text-lg font-semibold text-gray-900 mb-2 text-center">Import complete</div>
          <div className="text-sm text-gray-700 mb-4 text-center">
            Imported {summary.total} rows: <span className="font-medium">{summary.created} new</span>,{' '}
            <span className="font-medium">{summary.updated} updated</span>,{' '}
            <span className="font-medium">{summary.skipped} skipped</span>.
          </div>
          {summary.errors && summary.errors.length > 0 && (
            <details className="border border-amber-200 bg-amber-50 rounded p-2 mb-4 text-xs">
              <summary className="cursor-pointer font-medium text-amber-900">
                {summary.errors.length} row{summary.errors.length === 1 ? '' : 's'} had errors — click to view
              </summary>
              <ul className="mt-2 space-y-0.5 max-h-48 overflow-y-auto scrollbar-thin font-mono">
                {summary.errors.map((e, i) => <li key={i}>{e}</li>)}
              </ul>
            </details>
          )}
          <div className="text-center">
            <Button onClick={() => dispatch({ type: 'CLOSE_MODAL' })}>Done</Button>
          </div>
        </div>
      )}
    </Modal>
  );
}

/* =====================================================================
   APP ROOT
   ===================================================================== */
function App() {
  const [state, dispatch] = useReducer(appReducer, initialState);

  // restore column visibility
  useEffect(() => {
    try {
      const raw = localStorage.getItem('crm.cols');
      if (raw) dispatch({ type: 'SET_COLS', cols: { ...initialState.columnVisibility, ...JSON.parse(raw) } });
    } catch {}
  }, []);

  // Google Calendar: reflect stored token state, poll for GIS readiness so the
  // "Connect" button activates the moment the gsi/client script finishes loading.
  useEffect(() => {
    function check() {
      const connected = gcal.isConnected();
      dispatch({ type: 'SET_GOOGLE', connected });
    }
    check();
    const t = setInterval(check, 5000);
    return () => clearInterval(t);
  }, []);

  // auth bootstrap
  useEffect(() => {
    let unsub;
    (async () => {
      const { data: { session } } = await supabase.auth.getSession();
      if (session?.user) {
        const { data: profile } = await supabase.from('profiles').select('*').eq('id', session.user.id).single();
        dispatch({ type: 'AUTH_READY', user: session.user, profile });
      } else {
        dispatch({ type: 'AUTH_READY', user: null, profile: null });
      }
      const { data } = supabase.auth.onAuthStateChange(async (event, sess) => {
        if (sess?.user) {
          const { data: profile } = await supabase.from('profiles').select('*').eq('id', sess.user.id).single();
          dispatch({ type: 'AUTH_READY', user: sess.user, profile });
        } else {
          dispatch({ type: 'AUTH_READY', user: null, profile: null });
        }
      });
      unsub = data?.subscription;
    })();
    return () => unsub?.unsubscribe();
  }, []);

  // load profiles + accounts after auth
  useEffect(() => {
    if (!state.user) return;
    (async () => {
      dispatch({ type: 'SET_LOADING', loading: true });
      const [{ data: profs }, { data: accs }, { data: ctcs }, { data: tsks }, { data: cls }, { data: acts }] = await Promise.all([
        supabase.from('profiles').select('*').order('full_name', { ascending: true }),
        supabase.from('accounts').select('*').neq('status', 'deleted').order('updated_at', { ascending: false }),
        supabase.from('contacts').select('*').order('created_at', { ascending: false }),
        supabase.from('tasks').select('*').order('due_at', { ascending: true, nullsFirst: false }),
        supabase.from('calls').select('*').order('started_at', { ascending: false }).limit(1000),
        supabase.from('activities').select('*').order('occurred_at', { ascending: false }).limit(1000),
      ]);
      if (profs) dispatch({ type: 'SET_PROFILES', profiles: profs });
      if (accs) dispatch({ type: 'LOAD_ACCOUNTS', accounts: accs });
      if (ctcs) dispatch({ type: 'SET_ALL_CONTACTS', contacts: ctcs });
      if (tsks) dispatch({ type: 'SET_ALL_TASKS', tasks: tsks });
      if (cls) dispatch({ type: 'SET_ALL_CALLS', calls: cls });
      if (acts) dispatch({ type: 'SET_ALL_ACTIVITIES', activities: acts });
      dispatch({ type: 'SET_LOADING', loading: false });
    })();
  }, [state.user?.id]);

  // Twilio Voice — register a Device for this user once authed, refresh token before expiry.
  const twilioDeviceRef = useRef(null);
  useEffect(() => {
    if (!state.user) return;
    let cancelled = false;
    let refreshTimer = null;

    async function fetchToken() {
      const { data: { session } } = await supabase.auth.getSession();
      const jwt = session?.access_token;
      if (!jwt) throw new Error('Not signed in.');
      const res = await fetch(CALL_FUNCTION_URL + '/token', {
        method: 'POST',
        headers: { 'Authorization': 'Bearer ' + jwt, 'Content-Type': 'application/json' },
      });
      if (!res.ok) throw new Error('Token endpoint failed (' + res.status + ')');
      return await res.json();
    }

    (async () => {
      if (!window.Twilio?.Device) {
        if (!cancelled) dispatch({ type: 'SET_TWILIO', twilio: { status: 'error', error: 'Twilio SDK not loaded' } });
        return;
      }
      try {
        if (!cancelled) dispatch({ type: 'SET_TWILIO', twilio: { status: 'registering', error: null } });
        const { token } = await fetchToken();
        if (cancelled) return;
        const device = new window.Twilio.Device(token, { logLevel: 'warn', closeProtection: true });
        twilioDeviceRef.current = device;
        device.on('registered', () => { if (!cancelled) dispatch({ type: 'SET_TWILIO', twilio: { status: 'ready', error: null } }); });
        device.on('error', (err) => {
          console.error('Twilio Device error', err);
          if (!cancelled) dispatch({ type: 'SET_TWILIO', twilio: { status: 'error', error: err?.message || 'Device error' } });
        });
        device.on('tokenWillExpire', async () => {
          try {
            const { token: fresh } = await fetchToken();
            device.updateToken(fresh);
          } catch (e) { console.error('Token refresh failed', e); }
        });
        await device.register();
        window.__twilioDevice = device;
      } catch (e) {
        const msg = e?.message || (e ? String(e) : 'Failed to initialize Twilio Device');
        if (!cancelled) dispatch({ type: 'SET_TWILIO', twilio: { status: 'error', error: msg } });
      }
    })();

    return () => {
      cancelled = true;
      if (refreshTimer) clearInterval(refreshTimer);
      try { twilioDeviceRef.current?.destroy(); } catch {}
      twilioDeviceRef.current = null;
      window.__twilioDevice = null;
    };
  }, [state.user?.id]);

  // hash routing
  useEffect(() => {
    function onHash() { dispatch({ type: 'SET_ROUTE', route: parseHash(window.location.hash) }); }
    window.addEventListener('hashchange', onHash);
    if (!window.location.hash) window.location.hash = '#/accounts';
    return () => window.removeEventListener('hashchange', onHash);
  }, []);

  // keyboard shortcuts
  useEffect(() => {
    function onKey(e) {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') return;
      if (e.key === '/') { e.preventDefault(); document.getElementById('global-search')?.focus(); }
      else if (e.key === 'n') { e.preventDefault(); dispatch({ type: 'OPEN_MODAL', modal: 'add_account' }); }
      else if (e.key === 'i') { e.preventDefault(); dispatch({ type: 'OPEN_MODAL', modal: 'import' }); }
      else if (e.key === 'Escape') { dispatch({ type: 'CLOSE_MODAL' }); }
    }
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, []);

  const ctx = useMemo(() => ({ state, dispatch }), [state]);

  if (!state.authReady) {
    return <div className="h-full flex items-center justify-center text-sm text-gray-500">Loading…</div>;
  }
  if (!state.user || !state.profile) {
    return (
      <AppCtx.Provider value={ctx}>
        <LoginView />
        <Toast />
      </AppCtx.Provider>
    );
  }

  return (
    <AppCtx.Provider value={ctx}>
      <div className="h-full flex flex-col">
        <TopBar />
        {state.route.name === 'calendar'
          ? <CalendarView />
          : state.route.name === 'detail'
            ? <AccountDetailView accountId={state.route.accountId} />
            : state.route.tab === 'contacts'
              ? <ContactListView />
              : state.route.tab === 'tasks'
                ? <TaskListView />
                : state.route.tab === 'activity'
                  ? <ActivityListView />
                  : <AccountListView />}
      </div>
      {state.modal === 'add_account' && <AddAccountModal />}
      {state.modal === 'add_contact' && <ContactModal />}
      {state.modal === 'log_activity' && <LogActivityModal />}
      {state.modal === 'import' && <ImportModal />}
      {state.modal === 'create_meeting' && <MeetingModal />}
      {state.modal === 'create_task' && <TaskModal />}
      {state.modal === 'edit_task' && <TaskModal />}
      {state.modal === 'dialer' && <DialerModal />}
      {state.modal === 'email' && <EmailModal />}
      {state.modal === 'email_thread' && <EmailThreadModal />}
      <Toast />
    </AppCtx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
