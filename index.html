/* =====================================================================
   FILTERING / SORTING
   ===================================================================== */
function applyFilters(accounts, f) {
  const search = f.search.trim().toLowerCase();
  return accounts.filter(a => {
    if (a.status !== 'active') return false;
    if (f.stages.length && !f.stages.includes(a.deal_stage)) return false;
    if (f.fits.length && !f.fits.includes(a.fit)) return false;
    if (f.owners.length && !f.owners.includes(a.owner_id)) return false;
    if (f.industries.length && !f.industries.includes(a.industry)) return false;
    if (f.states.length && !f.states.includes(a.state)) return false;
    if (f.cityContains && !(a.city || '').toLowerCase().includes(f.cityContains.toLowerCase())) return false;
    if (f.servicesContains && !(a.services || '').toLowerCase().includes(f.servicesContains.toLowerCase())) return false;
    if (f.revenueRanges.length && !f.revenueRanges.includes(a.annual_revenue_range)) return false;
    if (f.employeeRanges.length && !f.employeeRanges.includes(a.employee_count_range)) return false;
    if (f.channels.length) {
      const accCh = a.current_marketing_channels || [];
      if (!f.channels.some(c => accCh.includes(c))) return false;
    }
    if (f.spendRanges.length && !f.spendRanges.includes(a.monthly_marketing_spend_range)) return false;
    if (f.agencyContains && !(a.current_agency || '').toLowerCase().includes(f.agencyContains.toLowerCase())) return false;
    if (f.meetingSet === 'yes' && !a.meeting_set) return false;
    if (f.meetingSet === 'no' && a.meeting_set) return false;
    if (f.leadSources.length && !f.leadSources.includes(a.lead_source)) return false;
    if (f.lastContact !== 'any') {
      if (f.lastContact === 'never') {
        if (a.last_contact_date) return false;
      } else {
        const cutoff = parseInt(f.lastContact, 10);
        if (!a.last_contact_date) return false;
        const diff = (Date.now() - new Date(a.last_contact_date).getTime()) / 86400000;
        if (diff > cutoff) return false;
      }
    }
    if (f.nextContact !== 'any') {
      const days = a.next_contact_date ? daysFromNow(a.next_contact_date) : null;
      if (f.nextContact === 'today' && days !== 0) return false;
      if (f.nextContact === 'overdue' && (days === null || days >= 0)) return false;
      if (f.nextContact === 'week' && (days === null || days < 0 || days > 7)) return false;
      if (f.nextContact === 'month' && (days === null || days < 0 || days > 31)) return false;
      if (f.nextContact === 'none' && a.next_contact_date) return false;
    }
    if (search) {
      const hay = [a.name, a.phone, a.website, a.street].map(x => (x || '').toLowerCase()).join(' ');
      if (!hay.includes(search)) return false;
    }
    return true;
  });
}

const FIT_ORDER = { a: 0, b: 1, c: 2, d: 3, unrated: 4 };
const STAGE_ORDER = DEAL_STAGES.reduce((m, s, i) => (m[s.value] = i, m), {});

function applySort(accounts, sort, profileMap) {
  const { field, dir } = sort;
  const k = dir === 'asc' ? 1 : -1;
  const get = (a) => {
    switch (field) {
      case 'name': return (a.name || '').toLowerCase();
      case 'deal_stage': return STAGE_ORDER[a.deal_stage] ?? 99;
      case 'fit': return FIT_ORDER[a.fit] ?? 9;
      case 'industry': return a.industry || '';
      case 'owner': return (profileMap[a.owner_id]?.full_name || '').toLowerCase();
      case 'location': return ((a.state || '') + (a.city || '')).toLowerCase();
      case 'last_contact': return a.last_contact_date || '';
      case 'next_contact': return a.next_contact_date || '';
      case 'meeting': return a.meeting_set ? 1 : 0;
      case 'revenue': return a.annual_revenue_range || '';
      case 'employees': return a.employee_count_range || '';
      case 'spend': return a.monthly_marketing_spend_range || '';
      case 'lead_source': return a.lead_source || '';
      default: return a.updated_at || '';
    }
  };
  return accounts.slice().sort((a, b) => {
    const av = get(a), bv = get(b);
    if (av < bv) return -1 * k;
    if (av > bv) return 1 * k;
    return 0;
  });
}

function AccountsTable({ rows }) {

  const profileMap = useMemo(() => Object.fromEntries(state.profiles.map(p => [p.id, p])), [state.profiles]);
  const allSelected = rows.length > 0 && rows.every(r => state.selectedIds.includes(r.id));
  const cv = state.columnVisibility;

  function sortBy(field) {
    if (!COLUMN_DEFS.find(c => c.key === field)?.sortable) return;
    const next = state.sort.field === field
      ? { field, dir: state.sort.dir === 'asc' ? 'desc' : 'asc' }
      : { field, dir: 'asc' };
    dispatch({ type: 'SET_SORT', sort: next });
  }
  function openAccount(id) { window.location.hash = `#/accounts/${id}`; }

  function HeaderCell({ k, children, className }) {
    if (!cv[k]) return null;
    const sortable = COLUMN_DEFS.find(c => c.key === k)?.sortable;
    const isSorted = state.sort.field === k;
    return (
      <th className={classNames('px-3 py-2 text-left font-medium text-gray-600 text-xs whitespace-nowrap', sortable && 'cursor-pointer hover:bg-gray-100', className)} onClick={() => sortBy(k)}>
        {children}{isSorted && <span className="ml-1">{state.sort.dir === 'asc' ? '↑' : '↓'}</span>}
      </th>
    );
  }
  function Cell({ k, children, className }) {
    if (!cv[k]) return null;
    return <td className={classNames('px-3 py-2 text-sm text-gray-800', className)}>{children}</td>;
  }

  return (
    <div className="flex-1 overflow-auto scrollbar-thin">
      <table className="min-w-full border-collapse">
        <thead className="bg-gray-50 border-b border-gray-200 sticky top-0 z-10">
          <tr>
            <th className="px-3 py-2 w-8">
              <input
                type="checkbox"
                checked={allSelected}
                onChange={() => {
                  if (allSelected) dispatch({ type: 'CLEAR_SELECTION' });
                  else dispatch({ type: 'SET_SELECTION', ids: rows.map(r => r.id) });
                }}
              />
            </th>
            <HeaderCell k="name">Name</HeaderCell>
            <HeaderCell k="deal_stage">Stage</HeaderCell>
            <HeaderCell k="fit">Fit</HeaderCell>
            <HeaderCell k="industry">Industry</HeaderCell>
            <HeaderCell k="owner">Owner</HeaderCell>
            <HeaderCell k="location">City, State</HeaderCell>
            <HeaderCell k="current_agency">Current agency</HeaderCell>
            <HeaderCell k="last_contact">Last contact</HeaderCell>
            <HeaderCell k="next_contact">Next contact</HeaderCell>
            <HeaderCell k="meeting">Meeting set</HeaderCell>
            <HeaderCell k="phone">Phone</HeaderCell>
            <HeaderCell k="revenue">Revenue</HeaderCell>
            <HeaderCell k="employees">Employees</HeaderCell>
            <HeaderCell k="spend">Monthly spend</HeaderCell>
            <HeaderCell k="lead_source">Lead source</HeaderCell>
          </tr>
        </thead>
        <tbody>
          {rows.map(a => {
            const owner = profileMap[a.owner_id];
            const overdue = a.next_contact_date && daysFromNow(a.next_contact_date) < 0;
            const selected = state.selectedIds.includes(a.id);
            return (
              <tr key={a.id} className={classNames('border-b border-gray-100 row-hover', selected && 'bg-blue-50')}>
                <td className="px-3 py-2">
                  <input type="checkbox" checked={selected} onChange={() => dispatch({ type: 'TOGGLE_SELECT', id: a.id })} />
                </td>
                <Cell k="name">
                  <button onClick={() => openAccount(a.id)} className="text-blue-700 hover:underline font-medium truncate-cell text-left">
                    {a.name}
                  </button>
                </Cell>
                <Cell k="deal_stage"><StagePill value={a.deal_stage} /></Cell>
                <Cell k="fit"><FitPill value={a.fit} /></Cell>
                <Cell k="industry">
                  {a.industry && <Pill className="bg-gray-100 text-gray-700">{labelFor(INDUSTRIES, a.industry)}</Pill>}
                </Cell>
                <Cell k="owner">
                  {owner ? (
                    <span className="inline-flex items-center gap-1.5">
                      <span className="w-5 h-5 rounded-full bg-blue-600 text-white text-[10px] font-semibold flex items-center justify-center">
                        {(owner.full_name || '?').slice(0,2).toUpperCase()}
                      </span>
                      <span className="text-xs text-gray-700">{owner.full_name}</span>
                    </span>
                  ) : <span className="text-xs text-gray-400">—</span>}
                </Cell>
                <Cell k="location" className="whitespace-nowrap">{[a.city, a.state].filter(Boolean).join(', ')}</Cell>
                <Cell k="current_agency" className="truncate-cell">{a.current_agency}</Cell>
                <Cell k="last_contact" className="whitespace-nowrap">
                  <span title={a.last_contact_date || ''}>{a.last_contact_date ? relativeTime(a.last_contact_date) : '—'}</span>
                </Cell>
                <Cell k="next_contact" className={classNames('whitespace-nowrap', overdue && 'text-red-600 font-medium')}>
                  {a.next_contact_date || '—'}
                </Cell>
                <Cell k="meeting">
                  {a.meeting_set ? (
                    <span className="text-green-700">✓ {a.meeting_at ? fmtDate(a.meeting_at) : ''}</span>
                  ) : <span className="text-gray-400">—</span>}
                </Cell>
                <Cell k="phone">
                  {a.phone && (
                    <button
                      onClick={(e) => {
                        e.stopPropagation();
                        openDialer(dispatch, { to: a.phone, accountId: a.id, accountName: a.name });
                      }}
                      className="text-blue-700 hover:underline inline-flex items-center gap-1" title="Dial">
                      <span>📞</span><span>{formatPhone(a.phone)}</span>
                    </button>
                  )}
                </Cell>
                <Cell k="revenue">{labelFor(REVENUE_RANGES, a.annual_revenue_range)}</Cell>
                <Cell k="employees">{labelFor(EMPLOYEE_RANGES, a.employee_count_range)}</Cell>
                <Cell k="spend">{labelFor(SPEND_RANGES, a.monthly_marketing_spend_range)}</Cell>
                <Cell k="lead_source">{labelFor(LEAD_SOURCES, a.lead_source)}</Cell>
              </tr>
            );
          })}
          {rows.length === 0 && (
            <tr>
              <td colSpan={20} className="text-center py-16 text-sm text-gray-500">
                <div className="font-medium text-gray-700 mb-1">No accounts match the current filters.</div>
                <div className="text-xs">Adjust filters, or <button className="text-blue-600 hover:underline" onClick={() => dispatch({ type: 'OPEN_MODAL', modal: 'import' })}>import a CSV</button>.</div>
              </td>
            </tr>
          )}
        </tbody>
      </table>
    </div>
  );
}

/* =====================================================================
   BULK ACTIONS
   ===================================================================== */
function BulkActionBar({ rows }) {
  const { state, dispatch } = useApp();
  const sel = state.selectedIds;
  if (sel.length === 0) return null;

  async function changeStage(stage) {
    const { error } = await supabase.from('accounts').update({ deal_stage: stage }).in('id', sel);
    if (error) return notify(dispatch, error.message, 'error');
    sel.forEach(id => dispatch({ type: 'UPSERT_ACCOUNT', account: { id, deal_stage: stage } }));
    notify(dispatch, `Stage updated on ${sel.length} accounts.`);
  }
  async function archiveSel() {
    if (!window.confirm(`Archive ${sel.length} account(s)?`)) return;
    const { error } = await supabase.from('accounts').update({ status: 'archived' }).in('id', sel);
    if (error) return notify(dispatch, error.message, 'error');
    sel.forEach(id => dispatch({ type: 'UPSERT_ACCOUNT', account: { id, status: 'archived' } }));
    dispatch({ type: 'CLEAR_SELECTION' });
    notify(dispatch, 'Archived.');
  }
  function exportSel() {
    const subset = rows.filter(r => sel.includes(r.id));
    const cols = ['name','phone','email','website','street','city','state','zip','industry','services','annual_revenue_range','employee_count_range','current_agency','monthly_marketing_spend_range','competitor_agencies_mentioned','fit','deal_stage','lead_source','last_contact_date','next_contact_date','meeting_set','meeting_at','notes'];
    const csv = Papa.unparse(subset.map(r => Object.fromEntries(cols.map(c => [c, r[c] ?? '']))));
    const blob = new Blob([csv], { type: 'text/csv' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `accounts-${todayISO()}.csv`; a.click();
    URL.revokeObjectURL(url);
  }

  return (
    <div className="sticky top-0 z-10 bg-blue-50 border-b border-blue-200 px-4 py-2 flex items-center gap-3">
      <div className="text-sm text-blue-900 font-medium">{sel.length} selected</div>
      <Select includeBlank blankLabel="Change stage…" value="" onChange={e => e.target.value && changeStage(e.target.value)} options={DEAL_STAGES} />
      <Button variant="secondary" size="sm" onClick={exportSel}>Export CSV</Button>
      <Button variant="secondary" size="sm" onClick={archiveSel}>Archive</Button>
      <button onClick={() => dispatch({ type: 'CLEAR_SELECTION' })} className="ml-auto text-xs text-blue-700 hover:underline">Clear selection</button>
    </div>
  );
}

function SavedViewsBar({ kind = 'accounts' }) {
  const { state, dispatch } = useApp();

  async function refresh() {
    const { data } = await supabase.from('saved_views').select('*').order('created_at', { ascending: false });
    dispatch({ type: 'SET_SAVED_VIEWS', views: data || [] });
  }
  useEffect(() => { if (state.profile) refresh(); }, [state.profile?.id]);

  const visible = state.savedViews.filter(v => (v.filters?._kind || 'accounts') === kind);

  async function saveCurrent() {
    const name = window.prompt('Name this view:');
    if (!name) return;
    const filters = kind === 'contacts' ? { ...state.contactFilters, _kind: 'contacts' }
                  : kind === 'tasks'    ? { ...state.taskFilters,    _kind: 'tasks' }
                                        : { ...state.filters,        _kind: 'accounts' };
    const sort = kind === 'contacts' ? state.contactSort
              : kind === 'tasks'    ? state.taskSort
                                    : state.sort;
    const { data, error } = await supabase.from('saved_views').insert({
      user_id: state.profile.id, name,
      filters,
      sort_by: sort.field,
      sort_dir: sort.dir,
    }).select().single();
    if (error) return notify(dispatch, error.message, 'error');
    dispatch({ type: 'SET_SAVED_VIEWS', views: [data, ...state.savedViews] });
    notify(dispatch, 'View saved.');
  }
  async function deleteView(id) {
    if (!window.confirm('Delete this view?')) return;
    const { error } = await supabase.from('saved_views').delete().eq('id', id);
    if (error) return notify(dispatch, error.message, 'error');
    dispatch({ type: 'SET_SAVED_VIEWS', views: state.savedViews.filter(v => v.id !== id) });
  }
  function loadView(v) {
    const filters = { ...(v.filters || {}) };
    delete filters._kind;
    const sort = v.sort_by ? { field: v.sort_by, dir: v.sort_dir || 'asc' } : null;
    if (kind === 'contacts')    dispatch({ type: 'APPLY_CONTACT_VIEW', filters, sort });
    else if (kind === 'tasks')  dispatch({ type: 'APPLY_TASK_VIEW',    filters, sort });
    else                        dispatch({ type: 'APPLY_VIEW',         filters, sort });
  }

  return (
    <div className="bg-white border-b border-gray-200 px-4 py-1.5 flex items-center gap-2 overflow-x-auto">
      <span className="text-xs text-gray-500 font-medium mr-1">Saved views:</span>
      {visible.length === 0 && <span className="text-xs text-gray-400 italic">none yet</span>}
      {visible.map(v => (
        <span key={v.id} className="inline-flex items-center gap-1 bg-gray-100 rounded text-xs px-2 py-1">
          <button onClick={() => loadView(v)} className="font-medium text-gray-800 hover:text-blue-700">{v.name}</button>
          <button onClick={() => deleteView(v.id)} className="text-gray-400 hover:text-red-600 ml-1" title="Delete">×</button>
        </span>
      ))}
      <button onClick={saveCurrent} className="text-xs text-blue-600 hover:underline ml-auto">+ Save current view</button>
    </div>
  );
}

/* =====================================================================
   CONTACT LIST VIEW — master list of every contact across all accounts
   ===================================================================== */
function applyContactFilters(contacts, accounts, f) {
  const acctMap = Object.fromEntries(accounts.map(a => [a.id, a]));
  const search = (f.search || '').trim().toLowerCase();
  return contacts.filter(c => {
    const acct = acctMap[c.account_id];
    if (!acct || acct.status !== 'active') return false;
    if (f.owners.length && !f.owners.includes(acct.owner_id)) return false;
    if (f.stages.length && !f.stages.includes(acct.deal_stage)) return false;
    if (f.states.length && !f.states.includes(acct.state)) return false;
    if (f.industries.length && !f.industries.includes(acct.industry)) return false;
    if (f.titleContains && !(c.title || '').toLowerCase().includes(f.titleContains.toLowerCase())) return false;
    if (f.hasEmail === 'yes' && !c.email) return false;
    if (f.hasEmail === 'no' && c.email) return false;
    if (f.hasPhone === 'yes' && !c.phone && !c.mobile) return false;
    if (f.hasPhone === 'no' && (c.phone || c.mobile)) return false;
    if (f.isPrimary === 'yes' && !c.is_primary) return false;
    if (f.isPrimary === 'no' && c.is_primary) return false;
    if (search) {
      const hay = [c.first_name, c.last_name, c.email, c.phone, c.mobile, c.title, acct.name].map(x => (x || '').toLowerCase()).join(' ');
      if (!hay.includes(search)) return false;
    }
    return true;
  });
}

function applyContactSort(contacts, accounts, profiles, sort) {
  const acctMap = Object.fromEntries(accounts.map(a => [a.id, a]));
  const profileMap = Object.fromEntries(profiles.map(p => [p.id, p]));
  const k = sort.dir === 'asc' ? 1 : -1;
  const get = (c) => {
    const a = acctMap[c.account_id] || {};
    switch (sort.field) {
      case 'first_name': return (c.first_name || '').toLowerCase();
      case 'last_name': return (c.last_name || '').toLowerCase();
      case 'title': return (c.title || '').toLowerCase();
      case 'account': return (a.name || '').toLowerCase();
      case 'email': return (c.email || '').toLowerCase();
      case 'owner': return (profileMap[a.owner_id]?.full_name || '').toLowerCase();
      case 'last_contact': return a.last_contact_date || '';
      case 'location': return ((a.state || '') + (a.city || '')).toLowerCase();
      case 'is_primary': return c.is_primary ? 1 : 0;
      default: return c.created_at || '';
    }
  };
  return contacts.slice().sort((a,b) => {
    const av = get(a), bv = get(b);
    if (av < bv) return -1 * k;
    if (av > bv) return 1 * k;
    return 0;
  });
}

/* =====================================================================
   TASK LIST VIEW — account-level to-dos with due dates
   ===================================================================== */
function applyTaskFilters(tasks, accounts, f, currentUserId) {
  const acctMap = Object.fromEntries(accounts.map(a => [a.id, a]));
  const search = (f.search || '').trim().toLowerCase();
  const now = new Date();
  const today = new Date(); today.setHours(0,0,0,0);
  const weekEnd = addDays(today, 7);
  return tasks.filter(t => {
    const acct = acctMap[t.account_id];
    if (!acct || acct.status !== 'active') return false;
    if (f.assignees.length && !f.assignees.includes(t.assignee_id)) return false;

    if (f.status === 'open' && t.completed_at) return false;
    if (f.status === 'done' && !t.completed_at) return false;
    if (f.status === 'mine' && t.assignee_id !== currentUserId) return false;
    if (f.status === 'overdue') {
      if (t.completed_at) return false;
      if (!t.due_at || new Date(t.due_at) >= now) return false;
    }

    if (f.due === 'today') {
      if (!t.due_at) return false;
      const d = new Date(t.due_at);
      if (d < today || d >= addDays(today, 1)) return false;
    } else if (f.due === 'week') {
      if (!t.due_at) return false;
      const d = new Date(t.due_at);
      if (d < today || d >= weekEnd) return false;
    } else if (f.due === 'overdue') {
      if (!t.due_at || new Date(t.due_at) >= now || t.completed_at) return false;
    } else if (f.due === 'none') {
      if (t.due_at) return false;
    }

    if (search) {
      const hay = [t.title, t.notes, acct.name].map(x => (x || '').toLowerCase()).join(' ');
      if (!hay.includes(search)) return false;
    }
    return true;
  });
}

function applyTaskSort(tasks, accounts, profiles, sort) {
  const acctMap = Object.fromEntries(accounts.map(a => [a.id, a]));
  const profileMap = Object.fromEntries(profiles.map(p => [p.id, p]));
  const k = sort.dir === 'asc' ? 1 : -1;
  const get = (t) => {
    switch (sort.field) {
      case 'title': return (t.title || '').toLowerCase();
      case 'account': return (acctMap[t.account_id]?.name || '').toLowerCase();
      case 'assignee': return (profileMap[t.assignee_id]?.full_name || '').toLowerCase();
      case 'created_at': return t.created_at || '';
      case 'completed': return t.completed_at ? 1 : 0;
      case 'due_at':
      default: return t.due_at || '9999-12-31';
    }
  };
  return tasks.slice().sort((a, b) => {
    const av = get(a), bv = get(b);
    if (av < bv) return -1 * k;
    if (av > bv) return 1 * k;
    return 0;
  });
}

function DueBadge({ due_at, completed_at }) {
  if (completed_at) return <span className="text-xs text-gray-500 line-through">{due_at ? fmtDate(due_at) : '—'}</span>;
  if (!due_at) return <span className="text-xs text-gray-400">no due date</span>;
  const d = new Date(due_at);
  const today = new Date(); today.setHours(0,0,0,0);
  const overdue = d < new Date();
  const isToday = sameDay(d, today);
  return (
    <span className={classNames('text-xs',
      overdue ? 'text-red-600 font-medium' :
      isToday ? 'text-amber-700 font-medium' :
      'text-gray-700'
    )} title={fmtDateTime(due_at)}>
      {overdue ? 'Overdue · ' : ''}{fmtDate(due_at)}
      {d.getHours() || d.getMinutes() ? ` · ${fmtTime(d)}` : ''}
    </span>
  );
}

function TaskBulkActionBar() {
  const { state, dispatch } = useApp();
  const sel = state.taskSelectedIds;
  if (sel.length === 0) return null;

  async function markDone() {
    const completedAt = new Date().toISOString();
    const { error } = await supabase.from('tasks').update({ completed_at: completedAt }).in('id', sel);
    if (error) return notify(dispatch, error.message, 'error');
    const ids = [...sel];
    ids.forEach(id => dispatch({ type: 'UPSERT_TASK', task: { id, completed_at: completedAt } }));
    dispatch({ type: 'CLEAR_TASK_SELECTION' });
    // Advance any cadences whose current task is in this batch.
    for (const id of ids) {
      await advanceCadenceFromCompletedTask({ taskId: id, state, dispatch });
    }
    notify(dispatch, `${ids.length} task(s) marked done.`);
  }
  async function deleteSel() {
    if (!window.confirm(`Delete ${sel.length} task(s)?`)) return;
    const { error } = await supabase.from('tasks').delete().in('id', sel);
    if (error) return notify(dispatch, error.message, 'error');
    sel.forEach(id => dispatch({ type: 'REMOVE_TASK', id }));
    dispatch({ type: 'CLEAR_TASK_SELECTION' });
    notify(dispatch, 'Deleted.');
  }

  return (
    <div className="sticky top-0 z-10 bg-blue-50 border-b border-blue-200 px-4 py-2 flex items-center gap-3">
      <div className="text-sm text-blue-900 font-medium">{sel.length} selected</div>
      <Button variant="secondary" size="sm" onClick={markDone}>Mark done</Button>
      <Button variant="secondary" size="sm" onClick={deleteSel}>Delete</Button>

    </div>
  );
}

];

function CallStatusPill({ value }) {
  if (!value) return <span className="text-gray-400 text-xs">—</span>;
  return <Pill className={classFor(CALL_STATUSES, value)}>{labelFor(CALL_STATUSES, value)}</Pill>;
}

function fmtCallDuration(sec) {
  if (sec == null) return '—';
  const m = Math.floor(sec / 60); const s = sec % 60;
  if (m === 0) return `${s}s`;
  return `${m}m ${s}s`;
}

// Map a calls-table row or activities-table row into a unified event shape.
function callToEvent(c) {
  return {
    kind: 'call',
    id: 'call-' + c.id,
    raw: c,
    account_id: c.account_id,
    contact_id: c.contact_id,
    user_id: c.user_id,
    occurred_at: c.started_at,
    type: 'call',
    direction: c.direction,
  };
}
function activityToEvent(a) {
  return {
    kind: 'activity',
    id: 'act-' + a.id,
    raw: a,
    account_id: a.account_id,
    contact_id: a.contact_id,
    user_id: a.user_id,
    occurred_at: a.occurred_at,
    type: a.type,
    direction: null,
  };
}
function mergeEvents(calls, activities) {
  return [...calls.map(callToEvent), ...activities.map(activityToEvent)];
}

function applyActivityFilters(events, f) {
  const search = (f.search || '').trim().toLowerCase();
  const now = new Date();
  const cutoff = (() => {
    if (f.dateRange === 'today') { const d = new Date(); d.setHours(0,0,0,0); return d; }
    if (f.dateRange === 'week')  return addDays(startOfWeek(now), 0);
    if (f.dateRange === 'month') return new Date(now.getFullYear(), now.getMonth(), 1);
    return null;
  })();
  return events.filter(ev => {
    if (f.users.length && !f.users.includes(ev.user_id)) return false;
    if (f.types.length && !f.types.includes(ev.type)) return false;
    if (cutoff && new Date(ev.occurred_at) < cutoff) return false;
    if (search) {
      const r = ev.raw;
      const hay = ev.kind === 'call'
        ? [r.from_number, r.to_number, r.notes, r.voicemail_transcription]
        : [r.subject, r.body, r.email_to, r.email_from, r.email_subject];
      const joined = hay.map(x => (x || '').toLowerCase()).join(' ');
      if (!joined.includes(search)) return false;
    }
    return true;
  });
}

function applyActivitySort(events, accounts, profiles, sort) {
  const acctMap = Object.fromEntries(accounts.map(a => [a.id, a]));
  const profileMap = Object.fromEntries(profiles.map(p => [p.id, p]));
  const k = sort.dir === 'asc' ? 1 : -1;
  const get = (ev) => {
    switch (sort.field) {
      case 'account':    return (acctMap[ev.account_id]?.name || '').toLowerCase();
      case 'user':       return (profileMap[ev.user_id]?.full_name || '').toLowerCase();
      case 'type':       return ev.type || '';
      case 'occurred_at':
      default:           return ev.occurred_at || '';
    }
  };
  return events.slice().sort((a,b) => {
    const av = get(a), bv = get(b);
    if (av < bv) return -1 * k;
    if (av > bv) return 1 * k;
    return 0;
  });
}

/* =====================================================================
   DASHBOARD — team metrics over a selectable time window

const DASHBOARD_PERIODS = [
  { key: 'hour',  label: 'Last hour',  ms: 60 * 60 * 1000 },
  { key: 'day',   label: 'Last 24h',   ms: 24 * 60 * 60 * 1000 },
  { key: 'week',  label: 'Last week',  ms: 7 * 24 * 60 * 60 * 1000 },
  { key: 'month', label: 'Last month', ms: 30 * 24 * 60 * 60 * 1000 },
];

function MetricCard({ label, value, sub, tone = 'default' }) {
  const toneCls = {
    default: 'text-gray-900',
    green:   'text-green-700',
    red:     'text-red-700',
    blue:    'text-blue-700',
  }[tone];
  return (
    <div className="bg-white rounded-lg border border-gray-200 p-4">
      <div className="text-xs text-gray-500 mb-1">{label}</div>
      <div className={classNames('text-3xl font-semibold', toneCls)}>{value}</div>
      {sub && <div className="text-xs text-gray-600 mt-1">{sub}</div>}
    </div>
  );
}

function DashboardView() {
  const { state } = useApp();
  const [period, setPeriod] = useState('week');
  // Default: reps land on their own dashboard, admins land on the team view.
  const isAdmin = state.profile?.role === 'admin';
  const [view, setView] = useState(isAdmin ? 'team' : 'mine');

  const periodMeta = DASHBOARD_PERIODS.find(p => p.key === period) || DASHBOARD_PERIODS[2];
  const cutoff = useMemo(() => new Date(Date.now() - periodMeta.ms), [period]);

  const accountOwnerById = useMemo(
    () => Object.fromEntries(state.accounts.map(a => [a.id, a.owner_id])),
    [state.accounts]
  );

  // Compute metrics for an arbitrary user (null = team-wide).
  function computeFor(uid) {
    const inPeriod = (ts) => ts && new Date(ts) >= cutoff;
    const matchUser = (u) => uid == null || u === uid;
    const dials = state.allCalls.filter(c =>
      c.direction === 'outbound' && inPeriod(c.started_at) && matchUser(c.user_id)
    ).length;
    const countStage = (stage) => state.stageChanges.filter(sc =>
      sc.to_stage === stage && inPeriod(sc.changed_at) &&
      matchUser(sc.changed_by || accountOwnerById[sc.account_id])
    ).length;
    const won = countStage('opportunity_won');
    const lost = countStage('opportunity_lost');
    return {
      dials,
      meetingsSet: countStage('meeting_set'),
      discoveryComplete: countStage('discovery_complete'),
      won,
      lost,
    };
  }

  const focusedUserId = view === 'mine' ? state.profile?.id : null;
  const metrics = useMemo(() => computeFor(focusedUserId),
    [state.allCalls, state.stageChanges, cutoff, focusedUserId, accountOwnerById]);

  const total = metrics.won + metrics.lost;
  const winRate = total > 0 ? Math.round((metrics.won / total) * 100) : null;

  // Per-rep leaderboard cards — visible only in Team view.
  const leaderboard = useMemo(() => {
    if (view !== 'team') return null;
    return state.profiles
      .map(p => ({ rep: p, ...computeFor(p.id) }))
      .filter(r => r.dials + r.meetingsSet + r.discoveryComplete + r.won + r.lost > 0)
      .sort((a, b) => b.dials - a.dials);
  }, [view, state.profiles, state.allCalls, state.stageChanges, cutoff, accountOwnerById]);

  function PillToggle({ value, options, onChange }) {
    return (
      <div className="inline-flex rounded-md border border-gray-300 overflow-hidden">
        {options.map((o, i) => (
          <button key={o.value} onClick={() => onChange(o.value)}
            className={classNames('px-3 py-1.5 text-sm',
              i > 0 && 'border-l border-gray-300',
              value === o.value ? 'bg-gray-900 text-white' : 'bg-white text-gray-700 hover:bg-gray-50')}>
            {o.label}
          </button>
        ))}
      </div>
    );
  }

  return (
    <div className="flex flex-1 overflow-hidden">
      <div className="flex-1 flex flex-col overflow-hidden">
        <ListTabSwitcher />
        <div className="px-6 py-5 flex-1 overflow-y-auto scrollbar-thin">
          <div className="flex items-center justify-between mb-4 flex-wrap gap-3">
            <PillToggle
              value={view}
              onChange={setView}
              options={[{ value: 'mine', label: 'Mine' }, { value: 'team', label: 'Team' }]}
            />
            <div className="flex gap-1.5 flex-wrap">
              {DASHBOARD_PERIODS.map(p => (
                <button key={p.key} onClick={() => setPeriod(p.key)}
                  className={classNames('px-3 py-1.5 text-sm rounded border',
                    period === p.key ? 'bg-gray-900 text-white border-gray-900' : 'bg-white text-gray-700 border-gray-300 hover:bg-gray-50')}>
                  {p.label}
                </button>
              ))}
            </div>
          </div>

          {/* Leaderboard strip — Team view only */}
          {view === 'team' && leaderboard && (
            <div className="mb-5">
              <div className="text-xs uppercase tracking-wide text-gray-500 mb-2">Leaderboard</div>
              {leaderboard.length === 0 ? (
                <div className="bg-white border border-gray-200 rounded p-3 text-sm text-gray-500">
                  No rep activity in this window yet.
                </div>
              ) : (
                <div className="flex gap-3 overflow-x-auto pb-1">
                  {leaderboard.map(({ rep, dials, meetingsSet, won, lost }) => (
                    <div key={rep.id} className="bg-white border border-gray-200 rounded-lg p-3 min-w-[190px] shrink-0">
                      <div className="flex items-center gap-2">
                        <span className="w-6 h-6 rounded-full bg-blue-600 text-white text-[10px] font-semibold flex items-center justify-center">
                          {(rep.full_name || '?').slice(0,2).toUpperCase()}
                        </span>
                        <span className="text-sm font-medium text-gray-900 truncate">{rep.full_name}</span>
                      </div>
                      <div className="mt-2 flex items-baseline gap-2">
                        <span className="text-2xl font-semibold text-blue-700">{dials}</span>
                        <span className="text-xs text-gray-500">dials</span>
                      </div>
                      <div className="text-xs text-gray-600 mt-1 flex gap-2">
                        <span>{meetingsSet} mtgs</span>
                        <span className="text-green-700">{won}W</span>
                        <span className="text-red-700">{lost}L</span>
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </div>
          )}

          {/* Headline metrics */}
          <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
            <MetricCard label="Dials" value={metrics.dials} tone="blue" />
            <MetricCard label="Meetings set" value={metrics.meetingsSet} />
            <MetricCard label="Discovery complete" value={metrics.discoveryComplete} />
            <MetricCard
              label="Opportunity won / lost"
              value={`${metrics.won} W · ${metrics.lost} L`}
              sub={winRate != null ? `${winRate}% win rate` : 'No closed deals in this window'}
              tone={winRate != null && winRate >= 50 ? 'green' : winRate != null ? 'red' : 'default'}
            />
          </div>

          <div className="text-xs text-gray-400 mt-6">
            {view === 'mine' ? 'Your stats' : 'Team stats'} · {fmtDateTime(cutoff)} → now
          </div>
        </div>
      </div>
    </div>
  );
}

function CalendarView() {
  const { state, dispatch } = useApp();
  const [tab, setTab] = useState('week');
  const [weekStart, setWeekStart] = useState(() => startOfWeek(new Date()));
  const [events, setEvents] = useState([]);
  const [loading, setLoading] = useState(false);
  const [err, setErr] = useState('');

  // CRM meetings (from accounts.meeting_at) as second source
  const crmMeetings = useMemo(() => {
    const acctMap = Object.fromEntries(state.accounts.map(a => [a.id, a]));
    return state.accounts
      .filter(a => a.meeting_at && a.status === 'active')
      .map(a => ({
        id: 'crm-' + a.id,
        summary: `Meeting · ${a.name}`,
        start: new Date(a.meeting_at),
        end: new Date(new Date(a.meeting_at).getTime() + 30 * 60 * 1000),
        crmAccountId: a.id,
        source: 'crm',
      }));
  }, [state.accounts]);

  async function loadEvents(start, end) {
    if (!state.googleConnected) { setEvents([]); return; }
    setLoading(true); setErr('');
    try {
      const items = await gcal.listEvents({ timeMin: start, timeMax: end, maxResults: 250 });
      setEvents(items.map(ev => ({
        id: ev.id,
        summary: ev.summary || '(no title)',
        description: ev.description,
        location: ev.location,
        start: new Date(ev.start?.dateTime || ev.start?.date),
        end: new Date(ev.end?.dateTime || ev.end?.date),
        allDay: !!ev.start?.date,
        attendees: ev.attendees,
        htmlLink: ev.htmlLink,
        source: 'google',
      })));
    } catch (e) {
      setErr(e.message);
      setEvents([]);
    } finally { setLoading(false); }
  }

  function refresh() {
    if (tab === 'week') loadEvents(weekStart, addDays(weekStart, 7));
    else { const now = new Date(); now.setHours(0,0,0,0); loadEvents(now, addDays(now, 30)); }
  }

  useEffect(() => { refresh(); }, [tab, weekStart, state.googleConnected]);

  useEffect(() => {
    window.addEventListener('gcal-refresh', refresh);
    return () => window.removeEventListener('gcal-refresh', refresh);
  }, [tab, weekStart, state.googleConnected]);

  function openMeetingModal(startTime) {
    const startISO = (startTime || new Date(Math.ceil(Date.now() / (15*60000)) * 15*60000)).toISOString();
    dispatch({ type: 'OPEN_MODAL', modal: 'create_meeting', props: { startISO } });
  }

  if (!GOOGLE_CLIENT_ID) {
    return (
      <div className="flex-1 flex items-center justify-center p-8">
        <div className="max-w-md text-center">
          <div className="text-base font-medium text-gray-800 mb-2">Calendar setup required</div>
          <div className="text-sm text-gray-600">
            Set <code className="bg-gray-100 px-1 rounded">GOOGLE_CLIENT_ID</code> in <code>index.html</code> with your Google Cloud OAuth client ID, then reload.
          </div>
        </div>
      </div>
    );
  }

  if (!state.googleConnected) {
    return (
      <div className="flex-1 flex items-center justify-center p-8">
        <div className="max-w-md text-center">
          <div className="text-base font-medium text-gray-800 mb-2">Connect your Google Calendar</div>
          <div className="text-sm text-gray-600 mb-4">
            Pulls events from your primary Google Calendar so you see meetings and personal conflicts in one place. Meetings booked in the CRM get pushed back to Google automatically.
          </div>
          <Button onClick={async () => {
            try {
              await gcal.getAccessToken({ interactive: true });
              dispatch({ type: 'SET_GOOGLE', connected: true });
            } catch (e) { notify(dispatch, e.message, 'error'); }
          }}>Connect Google Calendar</Button>
        </div>
      </div>
    );
  }

  return (
    <div className="flex-1 flex flex-col overflow-hidden">
      <div className="bg-white border-b border-gray-200 px-4 py-2 flex items-center gap-3 flex-nowrap">
        <div className="flex items-center rounded border border-gray-300 overflow-hidden shrink-0">
          <button onClick={() => setTab('week')}
            className={classNames('px-3 py-1 text-sm whitespace-nowrap', tab === 'week' ? 'bg-gray-900 text-white' : 'bg-white text-gray-700')}>Week</button>
          <button onClick={() => setTab('agenda')}
            className={classNames('px-3 py-1 text-sm whitespace-nowrap', tab === 'agenda' ? 'bg-gray-900 text-white' : 'bg-white text-gray-700')}>Agenda</button>
        </div>
        {tab === 'week' && (
          <div className="flex items-center gap-2 shrink-0">
            <Button variant="secondary" size="sm" onClick={() => setWeekStart(addDays(weekStart, -7))}>← Prev</Button>
            <Button variant="secondary" size="sm" onClick={() => setWeekStart(startOfWeek(new Date()))}>Today</Button>
            <Button variant="secondary" size="sm" onClick={() => setWeekStart(addDays(weekStart, 7))}>Next →</Button>
            <span className="text-sm text-gray-700 ml-2 whitespace-nowrap">
              {weekStart.toLocaleDateString(undefined, { month: 'long', day: 'numeric' })} – {addDays(weekStart, 6).toLocaleDateString(undefined, { month: 'long', day: 'numeric', year: 'numeric' })}
            </span>
          </div>
        )}
        <div className="ml-auto shrink-0 flex items-center gap-2">
          {loading && <span className="text-xs text-gray-500">Loading…</span>}
          <Button size="sm" onClick={() => openMeetingModal()}>+ New meeting</Button>
        </div>
      </div>
      {err && (
        <div className="bg-red-50 border-b border-red-200 px-4 py-2 text-xs text-red-800 flex items-start gap-2">
          <span className="font-medium shrink-0">Calendar error:</span>
          <span className="flex-1 break-words">{err}</span>
          <button onClick={() => { setErr(''); }} className="ml-2 text-red-600 hover:underline shrink-0">Dismiss</button>
        </div>
      )}
      {tab === 'week'
        ? <WeekGrid weekStart={weekStart} events={events} crmMeetings={crmMeetings} onSlotClick={openMeetingModal} />
        : <AgendaList events={events} crmMeetings={crmMeetings} />}
    </div>
  );
}

const HOUR_PX = 48;
const DAY_START_HOUR = 7;
const DAY_END_HOUR = 21;

function WeekGrid({ weekStart, events, crmMeetings, onSlotClick }) {
  const days = Array.from({ length: 7 }, (_, i) => addDays(weekStart, i));
  const weekEnd = addDays(weekStart, 7);

  const dayEvents = days.map(d => {
    const dayStart = new Date(d); dayStart.setHours(0,0,0,0);
    const dayEnd = addDays(dayStart, 1);
    const all = [...events, ...crmMeetings.filter(m => m.start >= weekStart && m.start < weekEnd)];
    return all
      .filter(e => !e.allDay && e.end > dayStart && e.start < dayEnd)
      .sort((a,b) => a.start - b.start);
  });

  const hours = Array.from({ length: DAY_END_HOUR - DAY_START_HOUR + 1 }, (_, i) => i + DAY_START_HOUR);
  const totalH = (DAY_END_HOUR - DAY_START_HOUR) * HOUR_PX;
  const today = new Date(); today.setHours(0,0,0,0);

  return (
    <div className="flex-1 overflow-auto scrollbar-thin bg-white">
      <div className="grid" style={{ gridTemplateColumns: `60px repeat(7, minmax(140px, 1fr))` }}>
        {/* Header row */}
        <div className="sticky top-0 bg-white border-b border-gray-200 z-10"></div>
        {days.map((d, i) => (
          <div key={i} className={classNames('sticky top-0 bg-white border-b border-l border-gray-200 z-10 px-2 py-2',
            sameDay(d, today) && 'bg-blue-50')}>
            <div className="text-xs text-gray-500">{d.toLocaleDateString(undefined, { weekday: 'short' })}</div>
            <div className={classNames('text-base font-medium', sameDay(d, today) ? 'text-blue-700' : 'text-gray-800')}>
              {d.getDate()}
            </div>
          </div>
        ))}

        {/* Hour gutter */}
        <div className="relative" style={{ height: totalH }}>
          {hours.slice(0, -1).map((h, i) => (
            <div key={h} className="text-xs text-gray-400 text-right pr-1 border-t border-gray-100"
                 style={{ position: 'absolute', top: i * HOUR_PX, right: 0, height: HOUR_PX, width: '100%' }}>
              {(h % 12 || 12)} {h < 12 ? 'AM' : 'PM'}
            </div>
          ))}
        </div>

        {/* Day columns */}
        {days.map((d, i) => (
          <div key={i}
               className={classNames('relative border-l border-gray-200', onSlotClick && 'cursor-pointer')}
               style={{ height: totalH }}
               onClick={(e) => {
                 if (!onSlotClick) return;
                 const rect = e.currentTarget.getBoundingClientRect();
                 const y = e.clientY - rect.top;
                 const totalMin = (y / HOUR_PX) * 60;
                 const snapped = Math.round(totalMin / 15) * 15;
                 const start = new Date(d);
                 start.setHours(DAY_START_HOUR, 0, 0, 0);
                 start.setMinutes(start.getMinutes() + snapped);
                 onSlotClick(start);
               }}>
            {hours.slice(0, -1).map((h, hi) => (
              <div key={h} className="border-t border-gray-100 hover:bg-blue-50/40"
                   style={{ position: 'absolute', top: hi * HOUR_PX, left: 0, right: 0, height: HOUR_PX }} />
            ))}
            {dayEvents[i].map(ev => {
              const dayStart = new Date(d); dayStart.setHours(DAY_START_HOUR, 0, 0, 0);
              const startMin = Math.max(0, (ev.start - dayStart) / 60000);
              const endMin = Math.min((DAY_END_HOUR - DAY_START_HOUR) * 60, (ev.end - dayStart) / 60000);
              const top = (startMin / 60) * HOUR_PX;
              const height = Math.max(20, ((endMin - startMin) / 60) * HOUR_PX);
              const isCrm = ev.source === 'crm';
              return (
                <div key={ev.id}
                  className={classNames('absolute left-0.5 right-0.5 rounded p-1 text-[11px] overflow-hidden cursor-pointer shadow-sm border',
                    isCrm ? 'bg-blue-100 border-blue-300 text-blue-900' : 'bg-emerald-100 border-emerald-300 text-emerald-900')}
                  style={{ top, height }}
                  onClick={(e) => {
                    e.stopPropagation();
                    if (isCrm && ev.crmAccountId) window.location.hash = `#/accounts/${ev.crmAccountId}`;
                    else if (ev.htmlLink) window.open(ev.htmlLink, '_blank');
                  }}
                  title={`${ev.summary}\n${fmtTime(ev.start)} – ${fmtTime(ev.end)}`}>
                  <div className="font-medium truncate">{ev.summary}</div>
                  <div className="opacity-75">{fmtTime(ev.start)}</div>
                </div>
              );
            })}
          </div>
        ))}
      </div>
    </div>
  );
}

function AgendaList({ events, crmMeetings }) {
  const all = [...events, ...crmMeetings]
    .filter(e => e.end > new Date())
    .sort((a,b) => a.start - b.start);

  const grouped = useMemo(() => {
    const m = new Map();
    all.forEach(e => {
      const key = fmtDate(e.start);
      if (!m.has(key)) m.set(key, []);
      m.get(key).push(e);
    });
    return Array.from(m.entries());
  }, [all]);

  if (all.length === 0) {
    return <div className="flex-1 flex items-center justify-center text-sm text-gray-500">No upcoming events in the next 30 days.</div>;
  }

  return (
    <div className="flex-1 overflow-auto scrollbar-thin">
      <div className="max-w-3xl mx-auto p-4 space-y-4">
        {grouped.map(([day, items]) => (
          <div key={day} className="bg-white border border-gray-200 rounded">
            <div className="px-3 py-2 border-b border-gray-100 bg-gray-50 text-sm font-medium text-gray-700">
              {new Date(day + 'T00:00:00').toLocaleDateString(undefined, { weekday: 'long', month: 'long', day: 'numeric' })}
            </div>
            <div className="divide-y divide-gray-100">
              {items.map(ev => {
                const isCrm = ev.source === 'crm';
                return (
                  <div key={ev.id} className="px-3 py-2 flex items-start gap-3 hover:bg-gray-50 cursor-pointer"
                    onClick={() => {
                      if (isCrm && ev.crmAccountId) window.location.hash = `#/accounts/${ev.crmAccountId}`;
                      else if (ev.htmlLink) window.open(ev.htmlLink, '_blank');
                    }}>
                    <div className={classNames('w-1 self-stretch rounded', isCrm ? 'bg-blue-400' : 'bg-emerald-400')} />
                    <div className="flex-1 min-w-0">
                      <div className="text-sm font-medium text-gray-900">{ev.summary}</div>
                      <div className="text-xs text-gray-500 mt-0.5">
                        {ev.allDay ? 'All day' : `${fmtTime(ev.start)} – ${fmtTime(ev.end)}`}
                        {ev.location && <> · {ev.location}</>}
                      </div>
                      {isCrm && <div className="text-[11px] text-blue-700 mt-0.5">CRM meeting · click to open account</div>}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

function AccountDetailView({ accountId }) {
  const { state, dispatch } = useApp();
  const account = state.accounts.find(a => a.id === accountId);
  const [tab, setTab] = useState('overview');
  const profileMap = useMemo(() => Object.fromEntries(state.profiles.map(p => [p.id, p])), [state.profiles]);

  useEffect(() => {
    if (!accountId) return;
    (async () => {
      const [c, act] = await Promise.all([
        supabase.from('contacts').select('*').eq('account_id', accountId).order('is_primary', { ascending: false }).order('created_at', { ascending: true }),
        supabase.from('activities').select('*').eq('account_id', accountId).order('occurred_at', { ascending: false }),
      ]);
      if (c.data) dispatch({ type: 'LOAD_CONTACTS', accountId, contacts: c.data });
      if (act.data) dispatch({ type: 'LOAD_ACTIVITIES', accountId, activities: act.data });
    })();
  }, [accountId]);

  if (!account) {
    return <div className="p-8 text-sm text-gray-500">Account not found. <a href="#/accounts" className="text-blue-600 hover:underline">Back to list</a></div>;
  }

  const canEdit = state.profile?.role === 'admin' || account.owner_id === state.profile?.id;
  const owner = profileMap[account.owner_id];
  const contacts = state.contacts[accountId] || [];
  const activities = state.activities[accountId] || [];

  async function archive() {
    if (!window.confirm('Archive this account?')) return;
    const { error } = await supabase.from('accounts').update({ status: 'archived' }).eq('id', accountId);
    if (error) return notify(dispatch, error.message, 'error');
    dispatch({ type: 'UPSERT_ACCOUNT', account: { ...account, status: 'archived' } });
    window.location.hash = '#/accounts';
    notify(dispatch, 'Archived.');
  }

  async function changeOwner() {
    const opts = state.profiles.map(p => p.full_name).join('\n');
    const name = window.prompt(`Reassign owner to (enter exact name):\n\n${opts}`);
    if (!name) return;
    const target = state.profiles.find(p => p.full_name === name);
    if (!target) return notify(dispatch, 'No matching user.', 'error');
    const prevOwner = owner?.full_name || '(unassigned)';
    const { error } = await supabase.from('accounts').update({ owner_id: target.id }).eq('id', accountId);
    if (error) return notify(dispatch, error.message, 'error');
    dispatch({ type: 'UPSERT_ACCOUNT', account: { ...account, owner_id: target.id } });
    await supabase.from('activities').insert({
      account_id: accountId, user_id: state.profile.id, type: 'note',
      subject: `Owner changed from ${prevOwner} to ${target.full_name}`,
    });
    notify(dispatch, 'Owner updated.');
  }

  return (
    <div className="flex-1 overflow-y-auto scrollbar-thin">
      <div className="max-w-6xl mx-auto px-6 py-5">
        <div className="mb-2">
          <a href="#/accounts" className="text-sm text-blue-600 hover:underline">← Back to list</a>
        </div>
        <div className="flex items-start gap-4 mb-4">
          <div className="flex-1">
            <h1 className="text-2xl font-semibold text-gray-900">{account.name}</h1>
            <div className="mt-1 flex flex-wrap items-center gap-2">
              <StagePill value={account.deal_stage} />
              <FitPill value={account.fit} />
              {account.industry && <Pill className="bg-gray-100 text-gray-700">{labelFor(INDUSTRIES, account.industry)}</Pill>}
              {owner && <span className="text-xs text-gray-600">Owner: <span className="font-medium">{owner.full_name}</span></span>}
              {(account.city || account.state) && <span className="text-xs text-gray-600">{[account.city, account.state].filter(Boolean).join(', ')}</span>}
              {account.website && <a href={account.website.startsWith('http') ? account.website : `https://${account.website}`} target="_blank" rel="noopener" className="text-xs text-blue-600 hover:underline">{normalizeDomain(account.website)}</a>}
            </div>
          </div>
          <div className="flex items-center gap-2">
            {(() => {
              const primary = contacts.find(c => c.is_primary) || contacts[0];
              const dialNumber = primary?.phone || primary?.mobile || account.phone;
              const emailAddress = primary?.email || account.email;
              const contactName = primary ? `${primary.first_name} ${primary.last_name || ''}`.trim() : null;
              return (
                <>
                  {dialNumber && (
                    <Button size="sm"
                      onClick={() => openDialer(dispatch, {
                        to: dialNumber, accountId: account.id,
                        contactId: primary?.id || null,
                        accountName: account.name,
                        contactName,
                      })}>
                      📞 Dial
                    </Button>
                  )}
                  {emailAddress && (
                    <Button size="sm" variant="secondary"
                      onClick={() => openEmail(dispatch, {
                        accountId: account.id,
                        contactId: primary?.id || null,
                        accountName: account.name,
                        contactName,
                        defaultTo: emailAddress,
                      })}>
                      ✉️ Email
                    </Button>
                  )}
                </>
              );
            })()}
            <Button size="sm" onClick={() => dispatch({ type: 'OPEN_MODAL', modal: 'create_meeting', props: { accountId } })}>📅 Schedule meeting</Button>
            {(() => {
              const existing = state.cadenceEnrollments.find(e => e.account_id === account.id && e.status !== 'opted_out');
              if (existing) return null;
              return <Button variant="secondary" size="sm" onClick={() => dispatch({ type: 'OPEN_MODAL', modal: 'enroll_cadence', props: { accountId } })}>🪜 Enroll in cadence</Button>;
            })()}
            <Button variant="secondary" size="sm" onClick={() => dispatch({ type: 'OPEN_MODAL', modal: 'create_task', props: { accountId } })}>+ Task</Button>
            <Button variant="secondary" size="sm" onClick={() => dispatch({ type: 'OPEN_MODAL', modal: 'log_activity', props: { accountId } })}>Log activity</Button>
            {canEdit && (
              <>
                <Button variant="secondary" size="sm" onClick={changeOwner}>Change owner</Button>
                <Button variant="secondary" size="sm" onClick={archive}>Archive</Button>
              </>
            )}
          </div>
        </div>

        <CadenceProgressWidget account={account} />

        <div className="border-b border-gray-200 flex gap-4 sticky top-0 bg-gray-50 z-10">
          {['overview','contacts','tasks','activity','notes'].map(t => {
            const callCount = state.allCalls.filter(x => x.account_id === account.id).length;
            const activityCount = activities.length + callCount;
            return (
              <button key={t} onClick={() => setTab(t)}
                className={classNames('px-1 py-2 text-sm font-medium border-b-2',
                  tab === t ? 'border-blue-600 text-blue-700' : 'border-transparent text-gray-600 hover:text-gray-900')}>
                {t === 'overview' ? 'Overview'
                  : t === 'contacts' ? `Contacts${contacts.length ? ` (${contacts.length})` : ''}`
                  : t === 'tasks' ? `Tasks${state.allTasks.filter(x => x.account_id === account.id && !x.completed_at).length ? ` (${state.allTasks.filter(x => x.account_id === account.id && !x.completed_at).length})` : ''}`
                  : t === 'activity' ? `Activity${activityCount ? ` (${activityCount})` : ''}`
                  : 'Notes'}
              </button>
            );
          })}
        </div>

        <div className="py-4">
          {tab === 'overview' && <OverviewTab account={account} canEdit={canEdit} />}
          {tab === 'contacts' && <ContactsTab account={account} contacts={contacts} canEdit={canEdit} />}
          {tab === 'tasks' && <TasksTab account={account} />}
          {tab === 'activity' && <ActivityTab account={account} activities={activities} contacts={contacts} />}
          {tab === 'notes' && <NotesTab account={account} canEdit={canEdit} />}
        </div>
      </div>
    </div>
  );
}

/* =====================================================================
   OVERVIEW TAB — inline editable fields
   ===================================================================== */
function InlineField({ label, value, onSave, type='text', options=null, multi=false, parse=(v) => v, render=null, disabled=false }) {
  const [editing, setEditing] = useState(false);
  const [draft, setDraft] = useState(value ?? (multi ? [] : ''));
  useEffect(() => { setDraft(value ?? (multi ? [] : '')); }, [value, multi]);

  async function commit(v) {
    setEditing(false);
    const parsed = parse(v);
    if (JSON.stringify(parsed) === JSON.stringify(value ?? (multi ? [] : ''))) return;
    await onSave(parsed);
  }

  if (disabled || !editing) {
    const displayed = render ? render(value) : (value && value.length !== 0 ? String(value) : <span className="text-gray-400">—</span>);
    return (
      <div className="text-sm">
        <div className="text-xs text-gray-500 mb-0.5">{label}</div>
        <div onClick={() => !disabled && setEditing(true)} className={classNames('px-2 py-1 -mx-2 rounded', !disabled && 'hover:bg-gray-100 cursor-text')}>
          {displayed}
        </div>
      </div>
    );
  }

  if (type === 'select') {
    return (
      <div className="text-sm">
        <div className="text-xs text-gray-500 mb-0.5">{label}</div>
        <select autoFocus value={draft || ''} onChange={e => setDraft(e.target.value)} onBlur={() => commit(draft || null)}
          className="w-full px-2 py-1 text-sm border border-gray-300 rounded bg-white ring-focus">
          <option value="">—</option>
          {options.map(o => <option key={o.value} value={o.value}>{o.label}</option>)}
        </select>
      </div>
    );
  }
  if (type === 'multi') {
    return (
      <div className="text-sm">
        <div className="text-xs text-gray-500 mb-0.5">{label}</div>
        <div className="border border-gray-300 rounded p-1.5 bg-white max-h-44 overflow-y-auto scrollbar-thin">
          {options.map(o => (
            <label key={o.value} className="flex items-center gap-2 text-sm py-0.5">
              <input type="checkbox" checked={draft.includes(o.value)} onChange={() => {
                const next = draft.includes(o.value) ? draft.filter(x => x !== o.value) : [...draft, o.value];
                setDraft(next);
              }} />
              <span>{o.label}</span>
            </label>
          ))}
          <div className="text-right pt-1">
            <button onClick={() => commit(draft)} className="text-xs text-blue-600 hover:underline">Done</button>
          </div>
        </div>
      </div>
    );
  }
  if (type === 'textarea') {
    return (
      <div className="text-sm">
        <div className="text-xs text-gray-500 mb-0.5">{label}</div>
        <textarea autoFocus rows={3} value={draft} onChange={e => setDraft(e.target.value)} onBlur={() => commit(draft)}
          className="w-full px-2 py-1 text-sm border border-gray-300 rounded ring-focus" />
      </div>
    );
  }
  return (
    <div className="text-sm">
      <div className="text-xs text-gray-500 mb-0.5">{label}</div>
      <input
        autoFocus
        type={type}
        value={draft}
        onChange={e => setDraft(e.target.value)}
        onBlur={() => commit(draft)}
        onKeyDown={e => { if (e.key === 'Enter') e.target.blur(); if (e.key === 'Escape') { setDraft(value ?? ''); setEditing(false); } }}
        className="w-full px-2 py-1 text-sm border border-gray-300 rounded ring-focus"
      />
    </div>
  );
}

function OverviewTab({ account, canEdit }) {
  const { state, dispatch } = useApp();
  const contacts = state.contacts[account.id] || [];

  async function save(patch) {
    const prevMeetingAt = account.meeting_at;
    const { error, data } = await supabase.from('accounts').update({ ...patch, updated_by: state.profile.id }).eq('id', account.id).select().single();
    if (error) return notify(dispatch, error.message, 'error');
    dispatch({ type: 'UPSERT_ACCOUNT', account: data });

    // If meeting_at was just set or changed and Google Calendar is connected,
    // offer to push the meeting to the rep's primary calendar.
    if ('meeting_at' in patch && patch.meeting_at && patch.meeting_at !== prevMeetingAt) {
      if (state.googleConnected) {
        const primary = contacts.find(c => c.is_primary) || contacts[0];
        const ok = window.confirm(`Also create this meeting on your Google Calendar?\n\n${account.name}\n${new Date(patch.meeting_at).toLocaleString()}${primary?.email ? `\nInvite: ${primary.email}` : ''}`);
        if (ok) {
          try {
            const start = new Date(patch.meeting_at);
            const end = new Date(start.getTime() + 30 * 60 * 1000);
            await gcal.createEvent({
              summary: `${account.name} — Discovery`,
              description: `Crocs & Clicks CRM\nAccount: ${account.name}\n${window.location.origin}${window.location.pathname}#/accounts/${account.id}`,
              startISO: start.toISOString(),
              endISO: end.toISOString(),
              attendees: primary?.email ? [primary.email] : [],
              location: [account.street, account.city, account.state].filter(Boolean).join(', '),
            });
            // Log it on the account so the audit trail reflects the push
            await supabase.from('activities').insert({
              account_id: account.id, user_id: state.profile.id, type: 'meeting',
              subject: 'Meeting scheduled (synced to Google Calendar)',
              body: primary?.email ? `Invite sent to ${primary.email}` : null,
              occurred_at: new Date().toISOString(),
            });
            notify(dispatch, 'Added to your Google Calendar.');
          } catch (e) { notify(dispatch, e.message, 'error'); }
        }
      }
    }
  }

  const Section = ({ title, children }) => (
    <div className="bg-white border border-gray-200 rounded p-4">
      <div className="text-sm font-semibold text-gray-900 mb-3">{title}</div>
      <div className="grid grid-cols-1 sm:grid-cols-2 gap-x-6 gap-y-3">{children}</div>
    </div>
  );

  return (
    <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
      <Section title="Basics">
        <InlineField label="Name" value={account.name} onSave={v => save({ name: v })} disabled={!canEdit} />
        <InlineField label="Phone" value={account.phone} onSave={v => save({ phone: digitsOnly(v) || null })} render={v => v ? formatPhone(v) : null} disabled={!canEdit} />
        <InlineField label="Email" value={account.email} onSave={v => save({ email: v || null })} type="email" disabled={!canEdit} />
        <InlineField label="Website" value={account.website} onSave={v => save({ website: v || null })} disabled={!canEdit} />
        <InlineField label="Street" value={account.street} onSave={v => save({ street: v || null })} disabled={!canEdit} />
        <InlineField label="City" value={account.city} onSave={v => save({ city: v || null })} disabled={!canEdit} />
        <InlineField label="State" value={account.state} onSave={v => save({ state: v || null })} type="select" options={US_STATES.map(s => ({ value: s, label: s }))} disabled={!canEdit} />
        <InlineField label="ZIP" value={account.zip} onSave={v => save({ zip: v || null })} disabled={!canEdit} />
      </Section>

      <Section title="Qualification">
        <InlineField label="Industry" value={account.industry} onSave={v => save({ industry: v })} type="select" options={INDUSTRIES} render={v => v ? labelFor(INDUSTRIES, v) : null} disabled={!canEdit} />
        <InlineField label="Services" value={account.services} onSave={v => save({ services: v || null })} disabled={!canEdit} />
        <InlineField label="Annual revenue" value={account.annual_revenue_range} onSave={v => save({ annual_revenue_range: v })} type="select" options={REVENUE_RANGES} render={v => v ? labelFor(REVENUE_RANGES, v) : null} disabled={!canEdit} />
        <InlineField label="Employee count" value={account.employee_count_range} onSave={v => save({ employee_count_range: v })} type="select" options={EMPLOYEE_RANGES} render={v => v ? labelFor(EMPLOYEE_RANGES, v) : null} disabled={!canEdit} />
        <InlineField label="Fit score" value={account.fit} onSave={v => save({ fit: v || 'unrated' })} type="select" options={FIT_SCORES} render={v => v ? <FitPill value={v} /> : null} disabled={!canEdit} />
        <InlineField label="Budget range" value={account.budget_range} onSave={v => save({ budget_range: v || null })} disabled={!canEdit} />
        <InlineField label="Seasonality" value={account.seasonality} onSave={v => save({ seasonality: v || null })} disabled={!canEdit} />
      </Section>

      <Section title="Marketing posture">
        <InlineField label="Currently using" value={account.current_marketing_channels || []} onSave={v => save({ current_marketing_channels: v })} type="multi" multi options={MARKETING_CHANNELS}
          render={v => (v && v.length) ? <div className="flex flex-wrap gap-1">{v.map(c => <Pill key={c} className="bg-indigo-100 text-indigo-800">{labelFor(MARKETING_CHANNELS, c)}</Pill>)}</div> : null}
          disabled={!canEdit} />
        <InlineField label="Current agency" value={account.current_agency} onSave={v => save({ current_agency: v || null })} disabled={!canEdit} />
        <InlineField label="Monthly spend" value={account.monthly_marketing_spend_range} onSave={v => save({ monthly_marketing_spend_range: v })} type="select" options={SPEND_RANGES} render={v => v ? labelFor(SPEND_RANGES, v) : null} disabled={!canEdit} />
        <InlineField label="Competitor agencies mentioned" value={account.competitor_agencies_mentioned} onSave={v => save({ competitor_agencies_mentioned: v || null })} type="textarea" disabled={!canEdit} />
      </Section>

      <Section title="Pipeline">
        <InlineField label="Deal stage" value={account.deal_stage} onSave={v => save({ deal_stage: v })} type="select" options={DEAL_STAGES} render={v => <StagePill value={v} />} disabled={!canEdit} />
        <InlineField label="Owner" value={account.owner_id} onSave={v => save({ owner_id: v })} type="select" options={state.profiles.map(p => ({ value: p.id, label: p.full_name }))} render={v => state.profiles.find(p => p.id === v)?.full_name} disabled={!canEdit} />
        <InlineField label="Lead source" value={account.lead_source} onSave={v => save({ lead_source: v })} type="select" options={LEAD_SOURCES} render={v => v ? labelFor(LEAD_SOURCES, v) : null} disabled={!canEdit} />
        <InlineField label="Last contact" value={account.last_contact_date} disabled render={v => v ? fmtDate(v) : null} />
        <InlineField label="Next contact" value={account.next_contact_date} onSave={v => save({ next_contact_date: v || null })} type="date" disabled={!canEdit} />
        <InlineField label="Meeting set" value={account.meeting_set ? 'yes' : 'no'} onSave={v => save({ meeting_set: v === 'yes' })} type="select" options={[{value:'yes',label:'Yes'},{value:'no',label:'No'}]} disabled={!canEdit} />
        <InlineField label="Meeting at" value={account.meeting_at ? account.meeting_at.slice(0,16) : ''} onSave={v => save({ meeting_at: v ? new Date(v).toISOString() : null })} type="datetime-local" disabled={!canEdit} />
      </Section>
    </div>
  );
}

/* =====================================================================
   CONTACTS TAB
   ===================================================================== */
function ContactsTab({ account, contacts, canEdit }) {
  const { state, dispatch } = useApp();

  async function setPrimary(contact) {
    const { data, error } = await supabase.from('contacts').update({ is_primary: true }).eq('id', contact.id).select().single();
    if (error) return notify(dispatch, error.message, 'error');
    // Refresh whole list because trigger may have flipped others
    const { data: list } = await supabase.from('contacts').select('*').eq('account_id', account.id).order('is_primary', { ascending: false });
    if (list) {
      dispatch({ type: 'LOAD_CONTACTS', accountId: account.id, contacts: list });
      list.forEach(c => dispatch({ type: 'UPSERT_ALL_CONTACT', contact: c }));
    }
  }
  async function remove(contact) {
    if (!window.confirm(`Delete contact ${contact.first_name} ${contact.last_name || ''}?`)) return;
    const { error } = await supabase.from('contacts').delete().eq('id', contact.id);
    if (error) return notify(dispatch, error.message, 'error');
    dispatch({ type: 'REMOVE_CONTACT', id: contact.id, accountId: account.id });
    dispatch({ type: 'REMOVE_ALL_CONTACT', id: contact.id });
  }

  return (
    <div>
      <div className="flex items-center justify-between mb-3">
        <div className="text-sm text-gray-600">{contacts.length} contact{contacts.length === 1 ? '' : 's'}</div>
        {canEdit && <Button size="sm" onClick={() => dispatch({ type: 'OPEN_MODAL', modal: 'add_contact', props: { accountId: account.id } })}>Add contact</Button>}
      </div>
      {contacts.length === 0 ? (
        <div className="bg-white border border-gray-200 rounded p-8 text-center">
          <div className="text-sm text-gray-600 mb-3">No contacts yet.</div>
          {canEdit && <Button size="sm" onClick={() => dispatch({ type: 'OPEN_MODAL', modal: 'add_contact', props: { accountId: account.id } })}>Add a contact</Button>}
        </div>
      ) : (
        <div className="bg-white border border-gray-200 rounded divide-y divide-gray-100">
          {contacts.map(c => (
            <div key={c.id} className="px-4 py-3 flex items-start gap-3">
              <div className="flex-1">
                <div className="flex items-center gap-2">
                  <span className="font-medium text-gray-900">{[c.first_name, c.last_name].filter(Boolean).join(' ')}</span>
                  {c.is_primary && <Pill className="bg-blue-100 text-blue-800">Primary</Pill>}
                </div>
                {c.title && <div className="text-xs text-gray-600">{c.title}</div>}
                <div className="text-xs text-gray-600 mt-1 flex flex-wrap gap-x-4 gap-y-0.5 items-center">
                  {c.email && (
                    <span className="inline-flex items-center gap-1">
                      <a href={`mailto:${c.email}`} className="text-blue-600 hover:underline">{c.email}</a>
                      <button
                        onClick={() => openEmail(dispatch, {
                          accountId: account.id, contactId: c.id,
                          accountName: account.name,
                          contactName: `${c.first_name} ${c.last_name || ''}`.trim(),
                          defaultTo: c.email,
                        })}
                        className="ml-1 text-blue-600 hover:text-blue-800" title="Compose email">✉️</button>
                    </span>
                  )}
                  {c.phone && (
                    <span className="inline-flex items-center gap-1">
                      Phone: {formatPhone(c.phone)}
                      <button
                        onClick={() => openDialer(dispatch, {
                          to: c.phone, accountId: account.id, contactId: c.id,
                          accountName: account.name,
                          contactName: `${c.first_name} ${c.last_name || ''}`.trim(),
                        })}
                        className="ml-1 text-blue-600 hover:text-blue-800" title="Dial">📞</button>
                    </span>
                  )}
                  {c.mobile && (
                    <span className="inline-flex items-center gap-1">
                      Mobile: {formatPhone(c.mobile)}
                      <button
                        onClick={() => openDialer(dispatch, {
                          to: c.mobile, accountId: account.id, contactId: c.id,
                          accountName: account.name,
                          contactName: `${c.first_name} ${c.last_name || ''}`.trim(),
                        })}
                        className="ml-1 text-blue-600 hover:text-blue-800" title="Dial">📞</button>
                    </span>
                  )}

                {c.notes && <div className="text-xs text-gray-700 mt-1.5 whitespace-pre-wrap">{c.notes}</div>}

                <div className="flex items-center gap-1">
                  {!c.is_primary && <Button variant="ghost" size="sm" onClick={() => setPrimary(c)}>Set primary</Button>}

      )}
