const DIALER_OUTCOMES = [
  { value: 'no_answer',      label: '📵 No answer',      nextBumpDays: 3 },
  { value: 'voicemail',      label: '📨 Voicemail',      nextBumpDays: 5 },
  { value: 'interested',     label: '💬 Interested',     nextBumpDays: null },
  { value: 'not_interested', label: '❌ Not interested', nextBumpDays: null, stage: 'opportunity_lost' },
  { value: 'bad_number',     label: '🚫 Bad number',     nextBumpDays: null },
  { value: 'callback',       label: '📅 Callback',       nextBumpDays: null, openTask: true },
];

const DIALER_AUTO_ADVANCE_KEY = 'crm.dialer.autoAdvanceSeconds';
function loadAutoAdvance() {
  const raw = parseInt(localStorage.getItem(DIALER_AUTO_ADVANCE_KEY) || '5', 10);
  return isNaN(raw) ? 5 : Math.max(0, Math.min(60, raw));
}
function saveAutoAdvance(n) {
  try { localStorage.setItem(DIALER_AUTO_ADVANCE_KEY, String(n)); } catch {}
}

// Convert a list of accounts/contacts/tasks into queue items with phone numbers.
function buildDialerQueue(rows, { source, state }) {
  const acctMap = Object.fromEntries(state.accounts.map(a => [a.id, a]));
  const contactsByAccount = state.allContacts.reduce((m, c) => {
    (m[c.account_id] = m[c.account_id] || []).push(c); return m;
  }, {});

  const items = [];
  for (const r of rows) {
    if (source === 'accounts') {
      const acct = r;
      const primary = (contactsByAccount[acct.id] || []).find(c => c.is_primary) || (contactsByAccount[acct.id] || [])[0];
      const phone = primary?.phone || primary?.mobile || acct.phone;
      if (!phone) continue;
      items.push({
        accountId: acct.id,
        contactId: primary?.id || null,
        phone,
        accountName: acct.name,
        contactName: primary ? `${primary.first_name} ${primary.last_name || ''}`.trim() : null,
      });
    } else if (source === 'contacts') {
      const c = r;
      const phone = c.phone || c.mobile;
      if (!phone) continue;
      const acct = acctMap[c.account_id];
      items.push({
        accountId: c.account_id,
        contactId: c.id,
        phone,
        accountName: acct?.name || null,
        contactName: `${c.first_name} ${c.last_name || ''}`.trim(),
      });
    } else if (source === 'tasks') {
      const t = r;
      const acct = acctMap[t.account_id];
      if (!acct) continue;
      const primary = (contactsByAccount[acct.id] || []).find(c => c.is_primary) || (contactsByAccount[acct.id] || [])[0];
      const phone = primary?.phone || primary?.mobile || acct.phone;
      if (!phone) continue;
      items.push({
        accountId: acct.id,
        contactId: primary?.id || null,
        phone,
        accountName: acct.name,
        contactName: primary ? `${primary.first_name} ${primary.last_name || ''}`.trim() : null,
      });
    }
  }
  return items;
}

function startDialerQueue(dispatch, rows, source, ctx) {
  const items = buildDialerQueue(rows, { source, state: ctx.state });
  if (!items.length) {
    notify(dispatch, 'Nothing to dial — none of those rows have a phone number.', 'warn');
    return;
  }
  dispatch({ type: 'START_DIAL_QUEUE', items, source });
}

function DialerSidebar() {
  const { state, dispatch } = useApp();
  const q = state.dialerQueue;
  const open = state.dialerPanelOpen;

  const [callStatus, setCallStatus] = useState('idle'); // idle | connecting | on_call | ended | awaiting_outcome | error
  const [errorMsg, setErrorMsg] = useState('');
  const [duration, setDuration] = useState(0);
  const [isMuted, setIsMuted] = useState(false);
  const [notes, setNotes] = useState('');
  const [autoAdvance, setAutoAdvance] = useState(loadAutoAdvance());
  const [countdown, setCountdown] = useState(null);

  const callRef = useRef(null);
  const sidRef = useRef(null);
  const timerRef = useRef(null);
  const countdownRef = useRef(null);

  const current = q ? q.items[q.position] : null;
  const upcoming = q ? q.items.slice(q.position + 1, q.position + 4) : [];

  function fmtDur(s) { return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`; }

  function teardownCall() {
    if (timerRef.current) { clearInterval(timerRef.current); timerRef.current = null; }
    if (callRef.current) { try { callRef.current.disconnect(); } catch {} callRef.current = null; }
  }
  function teardownCountdown() {
    if (countdownRef.current) { clearInterval(countdownRef.current); countdownRef.current = null; }
    setCountdown(null);
  }

  // Auto-dial when queue advances and status is 'starting'
  useEffect(() => {
    if (!current || !q || q.status !== 'starting') return;
    if (state.twilio.status !== 'ready') return;
    // Reset state for new call
    setCallStatus('idle');
    setNotes('');
    setDuration(0);
    setIsMuted(false);
    sidRef.current = null;
    teardownCountdown();
    // small delay so React renders the new prospect before dialing
    const t = setTimeout(() => dial(), 200);
    return () => clearTimeout(t);
  }, [q?.position, q?.status, state.twilio.status]);

  // Cleanup on unmount
  useEffect(() => () => { teardownCall(); teardownCountdown(); }, []);

  async function dial() {
    const device = window.__twilioDevice;
    if (!device || state.twilio.status !== 'ready') {
      setCallStatus('error');
      setErrorMsg(state.twilio.error || 'Phone not ready');
      return;
    }
    if (!current) return;
    setCallStatus('connecting');
    setErrorMsg('');
    try {
      const e164 = (() => {
        const d = digitsOnly(current.phone);
        if (!d) return null;
        if (d.length === 11 && d.startsWith('1')) return '+' + d;
        if (d.length === 10) return '+1' + d;
        return null;
      })();
      if (!e164) { setCallStatus('error'); setErrorMsg('Invalid phone'); return; }

      const call = await device.connect({
        params: {
          To: e164,
          accountId: current.accountId || '',
          contactId: current.contactId || '',
          userId: state.profile.id,
        },
      });
      callRef.current = call;
      sidRef.current = call.parameters?.CallSid || null;
      call.on('accept', () => {
        sidRef.current = call.parameters?.CallSid || sidRef.current;
        setCallStatus('on_call');
        const start = Date.now();
        timerRef.current = setInterval(() => setDuration(Math.floor((Date.now() - start) / 1000)), 250);
      });
      call.on('disconnect', () => {
        setCallStatus('awaiting_outcome');
        if (timerRef.current) { clearInterval(timerRef.current); timerRef.current = null; }
        if (current?.accountId) autoAdvanceCadenceOnActivity({ accountId: current.accountId, activityType: 'call', state, dispatch });
      });
      call.on('cancel', () => setCallStatus('awaiting_outcome'));
      call.on('reject', () => setCallStatus('awaiting_outcome'));
      call.on('error', (err) => {
        setCallStatus('error');
        setErrorMsg(err?.message || 'Call error');
        if (timerRef.current) { clearInterval(timerRef.current); timerRef.current = null; }
      });
    } catch (e) {
      setCallStatus('error');
      setErrorMsg(e?.message || 'Failed to start');
    }
  }

  function hangup() { if (callRef.current) try { callRef.current.disconnect(); } catch {} }
  function toggleMute() {
    if (callRef.current) {
      const n = !isMuted;
      try { callRef.current.mute(n); setIsMuted(n); } catch {}
    }
  }

  async function chooseOutcome(outcome) {
    const meta = DIALER_OUTCOMES.find(o => o.value === outcome);
    dispatch({ type: 'LOG_DIAL_OUTCOME', outcome });

    const trimmedNotes = notes.trim();

    // Persist outcome + notes on the calls row
    if (sidRef.current) {
      await supabase.from('calls').update({
        outcome,
        notes: trimmedNotes || null,
      }).eq('twilio_call_sid', sidRef.current);
    }

    // Side-effects on the account: next_contact_date, stage move, and
    // a running log of the call notes appended to account.notes.
    if (current?.accountId && meta) {
      const patch = { updated_by: state.profile.id };
      if (meta.nextBumpDays) {
        const d = new Date(); d.setDate(d.getDate() + meta.nextBumpDays);
        patch.next_contact_date = d.toISOString().slice(0, 10);
      }
      if (meta.stage) patch.deal_stage = meta.stage;
      if (outcome === 'bad_number') patch.next_contact_date = null;

      // Append call notes (+ outcome) to account.notes
      if (trimmedNotes || meta.label) {
        const { data: acctRow } = await supabase.from('accounts').select('notes').eq('id', current.accountId).single();
        const ts = new Date().toLocaleString('en-US', { month: 'short', day: 'numeric', year: 'numeric', hour: 'numeric', minute: '2-digit' });
        const who = current.contactName ? ` with ${current.contactName}` : '';
        const outcomeLabel = meta.label.replace(/^\S+\s/, ''); // strip emoji prefix
        const entry = trimmedNotes
          ? `[${ts}] Call${who} — ${outcomeLabel}:\n${trimmedNotes}`
          : `[${ts}] Call${who} — ${outcomeLabel}`;
        const prefix = (acctRow?.notes || '').trim();
        patch.notes = prefix ? `${prefix}\n\n${entry}` : entry;
      }

      const { data: acct } = await supabase.from('accounts').update(patch).eq('id', current.accountId).select().single();
      if (acct) dispatch({ type: 'UPSERT_ACCOUNT', account: acct });
    }

    // Callback → open task modal for follow-up scheduling
    if (meta?.openTask && current?.accountId) {
      dispatch({ type: 'OPEN_MODAL', modal: 'create_task', props: { accountId: current.accountId } });
    }

    // Auto-advance
    if (autoAdvance > 0) {
      let s = autoAdvance;
      setCountdown(s);
      countdownRef.current = setInterval(() => {
        s -= 1;
        if (s <= 0) {
          teardownCountdown();
          dispatch({ type: 'ADVANCE_DIAL_QUEUE' });
        } else {
          setCountdown(s);
        }
      }, 1000);
    } else {
      dispatch({ type: 'ADVANCE_DIAL_QUEUE' });
    }
  }

  function skipCurrent() {
    teardownCountdown();
    teardownCall();
    dispatch({ type: 'ADVANCE_DIAL_QUEUE' });
  }
  function pause() {
    teardownCountdown();
    dispatch({ type: 'PAUSE_DIAL_QUEUE' });
  }
  function resume() {
    teardownCountdown();
    dispatch({ type: 'RESUME_DIAL_QUEUE' });
  }
  function stop() {
    teardownCountdown();
    teardownCall();
    dispatch({ type: 'STOP_DIAL_QUEUE' });
  }

  // Auto-save notes on the in-progress call as user types (debounced)
  useEffect(() => {
    if (!sidRef.current || !notes) return;
    const t = setTimeout(() => {
      supabase.from('calls').update({ notes: notes.trim() || null }).eq('twilio_call_sid', sidRef.current);
    }, 1000);
    return () => clearTimeout(t);
  }, [notes]);

  // ---- render ----------------------------------------------------------
  if (!q && !open) {
    // Idle pin — small tab on the right edge that opens an empty panel
    return (
      <button
        onClick={() => dispatch({ type: 'TOGGLE_DIALER_PANEL' })}
        className="fixed right-0 top-1/2 -translate-y-1/2 z-30 bg-gray-900 text-white px-2 py-3 rounded-l text-xs writing-mode-vertical hover:bg-gray-700"
        style={{ writingMode: 'vertical-rl' }}
        title="Open power dialer">
        📞 Dialer
      </button>
    );
  }

  return (
    <div className="border-l border-gray-200 bg-white flex flex-col" style={{ width: '360px' }}>
      <div className="flex items-center justify-between px-3 py-2 border-b border-gray-200">
        <div className="flex items-center gap-2">
          <span className="text-sm font-semibold text-gray-900">📞 Power dialer</span>
          {q && <span className="text-xs text-gray-500">{q.position + (q.status === 'done' ? 0 : 1)} of {q.items.length}</span>}
        </div>
        <button onClick={() => dispatch({ type: 'TOGGLE_DIALER_PANEL' })} className="text-gray-400 hover:text-gray-700 text-lg leading-none">−</button>
      </div>

      <div className="flex-1 overflow-y-auto scrollbar-thin p-3 space-y-3">
        {!q && (
          <div className="text-sm text-gray-600 space-y-2">
            <p>No active queue.</p>
            <p className="text-xs">Click <b>Start dialing</b> on the Accounts, Contacts, or Tasks list to begin. The queue follows whatever filter and sort you have applied.</p>
          </div>
        )}

        {q && q.status === 'done' && (
          <div className="space-y-3">
            <div className="text-center">
              <div className="text-3xl mb-1">🎉</div>
              <div className="text-base font-semibold text-gray-900">Queue complete</div>
              <div className="text-xs text-gray-500">{q.items.length} of {q.items.length} done</div>
            </div>
            <div className="bg-gray-50 border border-gray-200 rounded p-3 text-sm space-y-1">
              {DIALER_OUTCOMES.map(o => (
                <div key={o.value} className="flex justify-between">
                  <span className="text-gray-700">{o.label}</span>
                  <span className="font-medium text-gray-900">{q.outcomeCounts[o.value] || 0}</span>
                </div>
              ))}
            </div>
            <Button className="w-full justify-center" onClick={stop}>Close</Button>
          </div>
        )}

        {q && q.status !== 'done' && current && (
          <>
            <div className="bg-gray-50 border border-gray-200 rounded p-3">
              <div className="text-xs text-gray-500">Calling</div>
              <div className="text-base font-semibold text-gray-900 truncate">
                {current.contactName || current.accountName || formatPhone(current.phone)}
              </div>
              {current.contactName && current.accountName && (
                <div className="text-xs text-gray-600 truncate">{current.accountName}</div>
              )}
              <div className="text-sm text-gray-700 mt-1">{formatPhone(current.phone)}</div>
              {current.accountId && (
                <a href={`#/accounts/${current.accountId}`} className="text-xs text-blue-600 hover:underline">Open account →</a>
              )}
            </div>

            <div className="min-h-[1.25rem] text-sm">
              {callStatus === 'idle'         && state.twilio.status !== 'ready' && <span className="text-gray-600">Initializing phone…</span>}
              {callStatus === 'connecting'   && <span className="text-blue-700">Dialing…</span>}
              {callStatus === 'on_call'      && <span className="text-green-700">● Connected · {fmtDur(duration)}</span>}
              {callStatus === 'awaiting_outcome' && <span className="text-gray-700">Call ended{duration > 0 ? ` · ${fmtDur(duration)}` : ''}</span>}
              {callStatus === 'error'        && <span className="text-red-700">Error: {errorMsg}</span>}
            </div>

            {(callStatus === 'connecting' || callStatus === 'on_call') && (
              <div className="flex gap-2">
                <Button variant="secondary" className="flex-1 justify-center" onClick={toggleMute}>{isMuted ? 'Unmute' : 'Mute'}</Button>
                <Button variant="danger" className="flex-1 justify-center" onClick={hangup}>Hang up</Button>
              </div>
            )}

            <Textarea
              label="Notes (auto-saves)"
              rows={4}
              value={notes}
              onChange={e => setNotes(e.target.value)}
              placeholder="Type as you talk…"
            />

            {callStatus === 'awaiting_outcome' && countdown == null && (
              <div className="space-y-1">
                <div className="text-xs text-gray-500 mb-1">Outcome</div>
                {DIALER_OUTCOMES.map(o => (
                  <button key={o.value} onClick={() => chooseOutcome(o.value)}
                    className="w-full text-left px-3 py-1.5 text-sm rounded border border-gray-200 hover:bg-gray-50 hover:border-gray-300">
                    {o.label}
                  </button>
                ))}
                <button onClick={skipCurrent}
                  className="w-full text-left px-3 py-1.5 text-sm rounded text-gray-500 hover:bg-gray-50">
                  Skip without logging →
                </button>
              </div>
            )}

            {countdown != null && (
              <div className="bg-blue-50 border border-blue-200 rounded p-3 text-sm flex items-center justify-between">
                <span className="text-blue-900">Next call in {countdown}s…</span>
                <button onClick={teardownCountdown} className="text-xs text-blue-700 hover:underline">Cancel</button>
              </div>
            )}

            {upcoming.length > 0 && (
              <div className="pt-2 border-t border-gray-200">
                <div className="text-xs text-gray-500 mb-1">Coming up</div>
                <ol className="text-xs text-gray-700 space-y-0.5">
                  {upcoming.map((u, i) => (
                    <li key={i} className="truncate">{q.position + 2 + i}. {u.contactName || u.accountName || formatPhone(u.phone)}</li>
                  ))}
                </ol>
              </div>
            )}
          </>
        )}
      </div>

      {q && q.status !== 'done' && (
        <div className="border-t border-gray-200 p-2 flex items-center gap-2">
          {q.status === 'paused' ? (
            <Button size="sm" className="flex-1 justify-center" onClick={resume}>Resume</Button>
          ) : (
            <Button size="sm" variant="secondary" className="flex-1 justify-center" onClick={pause}>Pause</Button>
          )}
          <Button size="sm" variant="ghost" className="flex-1 justify-center" onClick={skipCurrent}>Skip</Button>
          <Button size="sm" variant="danger" className="flex-1 justify-center" onClick={stop}>Stop</Button>
        </div>
      )}

      {q && (
        <div className="border-t border-gray-200 px-3 py-2 text-xs text-gray-600 flex items-center gap-2">
          <span>Auto-advance:</span>
          <input
            type="number"
            min="0" max="60"
            value={autoAdvance}
            onChange={e => { const n = Math.max(0, Math.min(60, parseInt(e.target.value || '0', 10))); setAutoAdvance(n); saveAutoAdvance(n); }}
            className="w-14 px-2 py-0.5 border border-gray-300 rounded text-sm"
          />
          <span>seconds</span>
        </div>
      )}
    </div>
  );
}

// Helper: open the dialer modal from anywhere with a clean payload.
function openDialer(dispatch, { to, accountId, contactId, accountName, contactName }) {
  const e164 = (() => {
    const d = digitsOnly(to);
    if (!d) return null;
    if (d.length === 11 && d.startsWith('1')) return '+' + d;
    if (d.length === 10) return '+1' + d;
    return null;
  })();
  if (!e164) { return; }
  dispatch({ type: 'OPEN_MODAL', modal: 'dialer', props: { to: e164, accountId, contactId, accountName, contactName } });
}

/* =====================================================================
   EMAIL COMPOSER MODAL — send via the rep's Gmail
   ===================================================================== */
function EmailModal() {
  const { state, dispatch } = useApp();
  const { accountId, contactId, accountName, contactName, defaultTo, replyToActivity } = state.modalProps || {};

  const isReply = !!replyToActivity;
  const [to, setTo] = useState(defaultTo || '');
  const [subject, setSubject] = useState(isReply
    ? (replyToActivity.email_subject?.startsWith('Re: ')
        ? replyToActivity.email_subject
        : `Re: ${replyToActivity.email_subject || ''}`)
    : '');
  const [body, setBody] = useState('');
  const [status, setStatus] = useState('idle'); // idle | sending | sent | error
  const [errorMsg, setErrorMsg] = useState('');

  function withTimeout(promise, ms, label) {
    return Promise.race([
      promise,
      new Promise((_, reject) => setTimeout(() => reject(new Error(`${label} timed out after ${ms / 1000}s`)), ms)),
    ]);
  }

  async function send() {
    if (!to.trim()) { setStatus('error'); setErrorMsg('Recipient required.'); return; }
    if (!state.googleConnected) {
      setStatus('error');
      setErrorMsg('Google not connected. Open the user menu (top-right) and click Reconnect Google.');
      return;
    }
    setStatus('sending'); setErrorMsg('');
    try {
      const sent = await withTimeout(gmail.send({
        to: to.trim(),
        subject: subject.trim(),
        body,
        threadId: replyToActivity?.gmail_thread_id || null,
        replyToMessageId: replyToActivity?.gmail_message_id || null,
      }), 20000, 'Gmail send');

      // Log the activity but don't let a slow Supabase response leave the
      // modal stuck — cap the wait and continue if it overruns.
      try {
        const insertPromise = supabase.from('activities').insert({
          account_id: accountId,
          contact_id: contactId || null,
          user_id: state.profile.id,
          type: 'email',
          subject: subject.trim() || '(no subject)',
          body,
          occurred_at: new Date().toISOString(),
          gmail_thread_id: sent.threadId || null,
          gmail_message_id: sent.id || null,
          email_to: to.trim(),
          email_from: state.user.email || null,
          email_subject: subject.trim() || null,
        }).select().single();
        const { data: activity, error } = await withTimeout(insertPromise, 10000, 'Activity log');
        if (error) console.error('[email] activity insert failed', error);
        else if (activity) dispatch({ type: 'ADD_ACTIVITY', activity });
      } catch (logErr) {
        console.error('[email] activity log skipped', logErr);
      }

      setStatus('sent');
      notify(dispatch, 'Email sent.');
      // Auto-advance any active cadence whose current step is personal_email for this account
      if (accountId) {
        try { await autoAdvanceCadenceOnActivity({ accountId, activityType: 'personal_email', state, dispatch }); } catch {}
      }
      setTimeout(() => dispatch({ type: 'CLOSE_MODAL' }), 600);
    } catch (e) {
      setStatus('error');
      setErrorMsg(e?.message || 'Failed to send.');
    }
  }

  return (
    <Modal open={true} onClose={() => dispatch({ type: 'CLOSE_MODAL' })} title={isReply ? 'Reply' : 'New email'} width="max-w-2xl">
      <div className="space-y-3">
        {accountName && (
          <div className="text-xs text-gray-500">
            {contactName ? <>To <span className="font-medium text-gray-700">{contactName}</span> at <span className="font-medium text-gray-700">{accountName}</span></> : <>At <span className="font-medium text-gray-700">{accountName}</span></>}
          </div>
        )}
        <Input label="To" value={to} onChange={e => setTo(e.target.value)} placeholder="prospect@example.com" />
        <Input label="Subject" value={subject} onChange={e => setSubject(e.target.value)} />
        <Textarea label="Body" rows={10} value={body} onChange={e => setBody(e.target.value)} placeholder="Type your message…" />
        {!state.googleConnected && (
          <div className="text-xs text-amber-700 bg-amber-50 border border-amber-200 rounded px-2 py-1.5">
            Google isn't connected for this user yet. Click Connect Google in the user menu (top-right), then reopen this dialog.
          </div>
        )}
        {status === 'error' && <div className="text-xs text-red-600">{errorMsg}</div>}
        {status === 'sent'  && <div className="text-xs text-green-700">Sent.</div>}
        <div className="flex justify-end gap-2 pt-2 border-t border-gray-200">
          <Button variant="secondary" onClick={() => dispatch({ type: 'CLOSE_MODAL' })}>Cancel</Button>
          <Button onClick={send} disabled={status === 'sending' || status === 'sent'}>
            {status === 'sending' ? 'Sending…' : status === 'sent' ? 'Sent' : 'Send'}
          </Button>
        </div>
      </div>
    </Modal>
  );
}

function openEmail(dispatch, { accountId, contactId, accountName, contactName, defaultTo, replyToActivity }) {
  dispatch({
    type: 'OPEN_MODAL',
    modal: 'email',
    props: { accountId, contactId, accountName, contactName, defaultTo: defaultTo || '', replyToActivity: replyToActivity || null },
  });
}

/* =====================================================================
   EMAIL THREAD VIEWER — fetches the live thread from Gmail
   ===================================================================== */
function EmailThreadModal() {
  const { state, dispatch } = useApp();
  const { activity } = state.modalProps || {};
  const [thread, setThread] = useState(null);
  const [loading, setLoading] = useState(true);
  const [err, setErr] = useState('');

  useEffect(() => {
    if (!activity?.gmail_thread_id) { setLoading(false); setErr('No thread ID on this email.'); return; }
    (async () => {
      try {
        const t = await gmail.getThread(activity.gmail_thread_id);
        setThread(t);
      } catch (e) {
        setErr(e?.message || 'Failed to load thread.');
      } finally {
        setLoading(false);
      }
    })();
  }, [activity?.id]);

  function replyAll() {
    if (!thread?.messages?.length) return;
    const last = thread.messages[thread.messages.length - 1];
    const myEmail = (state.user?.email || '').toLowerCase();
    // Reply target: whoever isn't us in the From line
    const target = last.from && !last.from.toLowerCase().includes(myEmail)
      ? last.from
      : last.to;
    dispatch({ type: 'CLOSE_MODAL' });
    setTimeout(() => openEmail(dispatch, {
      accountId: activity.account_id, contactId: activity.contact_id,
      accountName: null, contactName: null,
      defaultTo: target,
      replyToActivity: { ...activity, gmail_message_id: last.id, gmail_thread_id: thread.id },
    }), 50);
  }

  return (
    <Modal open={true} onClose={() => dispatch({ type: 'CLOSE_MODAL' })} title={activity?.email_subject || activity?.subject || 'Email thread'} width="max-w-3xl">
      <div className="space-y-3 max-h-[70vh] overflow-y-auto scrollbar-thin">
        {loading && <div className="text-sm text-gray-500">Loading thread…</div>}
        {err && <div className="text-sm text-red-600">{err}</div>}
        {thread?.messages?.map((m, i) => (
          <div key={m.id} className={classNames('border rounded p-3', i === thread.messages.length - 1 ? 'border-blue-200 bg-blue-50/40' : 'border-gray-200 bg-white')}>
            <div className="text-xs text-gray-600 flex flex-wrap gap-x-3">
              <span><b>From:</b> {m.from}</span>
              <span><b>To:</b> {m.to}</span>
              {m.internalDate && <span>{m.internalDate.toLocaleString()}</span>}
            </div>
            <div className="text-sm text-gray-800 mt-2 whitespace-pre-wrap">{m.body || m.snippet}</div>
          </div>
        ))}
        {thread && thread.messages?.length === 0 && <div className="text-sm text-gray-500">Thread is empty.</div>}
      </div>
      <div className="flex justify-end gap-2 pt-3 border-t border-gray-200 mt-3">
        <Button variant="secondary" onClick={() => dispatch({ type: 'CLOSE_MODAL' })}>Close</Button>
        {thread?.messages?.length > 0 && <Button onClick={replyAll}>Reply</Button>}
      </div>
    </Modal>
  );
}

function ImportModal() {
  const { state, dispatch } = useApp();
  const [step, setStep] = useState(1);
  const [file, setFile] = useState(null);
  const [headers, setHeaders] = useState([]);
  const [rows, setRows] = useState([]);
  const [mapping, setMapping] = useState({});
  const [dedup, setDedup] = useState('domain');
  const [busy, setBusy] = useState(false);
  const [progress, setProgress] = useState({ done: 0, total: 0 });
  const [summary, setSummary] = useState(null);

  function onFile(f) {
    setFile(f);
    Papa.parse(f, {
      header: true, skipEmptyLines: true,
      complete: (res) => {
        const hdrs = (res.meta.fields || []).map(h => h.replace(/^﻿/, ''));
        const data = res.data.map(r => {
          const o = {};
          hdrs.forEach(h => { o[h] = (r[h] ?? r['﻿' + h] ?? '').toString().trim(); });
          return o;
        });
        setHeaders(hdrs);
        setRows(data);
        const m = {};
        hdrs.forEach(h => { m[h] = autoMap(h); });
        setMapping(m);
        setStep(2);
      }
    });
  }

  function rowToAccount(r) {
    const out = {};
    Object.entries(mapping).forEach(([header, field]) => {
      if (field === '__ignore__') return;
      let v = (r[header] ?? '').toString().trim();
      if (!v) return;
      if (field === 'phone') v = digitsOnly(v);
      if (field === 'website') v = v.replace(/^https?:\/\//,'').replace(/^www\./,'').replace(/\/+$/,'').toLowerCase();
      out[field] = v;
    });
    return out;
  }

  const proposed = useMemo(() => rows.map(rowToAccount), [rows, mapping]);
  const missingName = proposed.filter(p => !p.name).length;
  const dupesInUpload = useMemo(() => {
    const seen = new Set(); let n = 0;
    proposed.forEach(p => {
      const k = dedup === 'domain' ? normalizeDomain(p.website || '') : digitsOnly(p.phone || '');
      if (!k) return;
      if (seen.has(k)) n++; else seen.add(k);
    });
    return n;
  }, [proposed, dedup]);

  async function execute() {
    setBusy(true);
    setProgress({ done: 0, total: 0 });
    const errors = [];
    let created = 0, updated = 0, skipped = 0;

    // 1. Pre-fetch full existing accounts (one round trip)
    const { data: existing, error: exErr } = await supabase
      .from('accounts')
      .select('*')
      .neq('status', 'deleted');
    if (exErr) {
      errors.push(`Could not read existing accounts: ${exErr.message}`);
    }
    const byDomain = new Map();
    const byPhone = new Map();
    (existing || []).forEach(a => {
      if (a.website_domain) byDomain.set(a.website_domain, a);
      if (a.phone) byPhone.set(a.phone, a);
    });

    // 2. Partition into inserts and update patches
    const toInsert = [];
    const toUpdate = []; // { id, patch }
    for (const r of proposed) {
      if (!r.name) { skipped++; continue; }
      const dKey = normalizeDomain(r.website || '');
      const pKey = digitsOnly(r.phone || '');
      const match = dedup === 'domain' ? (dKey && byDomain.get(dKey))
                  : dedup === 'phone'  ? (pKey && byPhone.get(pKey))
                  : null;
      if (match) {
        const patch = {};
        Object.entries(r).forEach(([k, v]) => {
          if (v && (match[k] === null || match[k] === undefined || match[k] === '')) patch[k] = v;
        });
        if (Object.keys(patch).length === 0) { skipped++; continue; }
        patch.updated_by = state.profile.id;
        toUpdate.push({ id: match.id, patch });
      } else {
        toInsert.push({
          ...r,
          owner_id: state.profile.id,
          lead_source: r.lead_source || null,
          created_by: state.profile.id,
          updated_by: state.profile.id,
        });
      }
    }

    setProgress({ done: 0, total: toInsert.length + toUpdate.length });

    // 3. Batched inserts
    const BATCH = 50;
    for (let i = 0; i < toInsert.length; i += BATCH) {
      const batch = toInsert.slice(i, i + BATCH);
      const { data, error } = await supabase.from('accounts').insert(batch).select('id');
      if (error) {
        // Fall back to per-row inserts so one bad row doesn't kill the batch
        for (const row of batch) {
          const { error: e2 } = await supabase.from('accounts').insert(row);
          if (e2) { errors.push(`${row.name}: ${e2.message}`); skipped++; }
          else created++;
        }
      } else {
        created += (data || batch).length;
      }
      setProgress(p => ({ ...p, done: p.done + batch.length }));
    }

    // 4. Updates (one per row — Supabase has no batch update without RPC)
    for (const { id, patch } of toUpdate) {
      const { error } = await supabase.from('accounts').update(patch).eq('id', id);
      if (error) { errors.push(`update ${id}: ${error.message}`); skipped++; }
      else updated++;
      setProgress(p => ({ ...p, done: p.done + 1 }));
    }

    // 5. Audit + reload
    await supabase.from('prospect_imports').insert({
      user_id: state.profile.id,
      filename: file?.name || 'upload.csv',
      total_rows: proposed.length, created_count: created, updated_count: updated, skipped_count: skipped,
    });
    const { data: all } = await supabase.from('accounts').select('*').neq('status', 'deleted').order('updated_at', { ascending: false });
    if (all) dispatch({ type: 'LOAD_ACCOUNTS', accounts: all });

    setSummary({ created, updated, skipped, total: proposed.length, errors });
    setBusy(false);
    setStep(4);
  }

  return (
    <Modal open={true} onClose={() => dispatch({ type: 'CLOSE_MODAL' })} title="Import accounts from CSV" width="max-w-4xl">
      {step === 1 && (
        <div>
          <label className="block border-2 border-dashed border-gray-300 rounded p-10 text-center cursor-pointer hover:border-blue-400">
            <input type="file" accept=".csv,text/csv" className="hidden" onChange={e => e.target.files[0] && onFile(e.target.files[0])} />
            <div className="text-sm text-gray-700 mb-1">Drop a CSV here or click to choose</div>
            <div className="text-xs text-gray-500">First row should be headers. UTF-8 / UTF-8 BOM both fine.</div>
          </label>
        </div>
      )}
      {step === 2 && (
        <div>
          <div className="text-sm font-medium text-gray-900 mb-2">Map your columns</div>
          <div className="overflow-x-auto max-h-96 overflow-y-auto scrollbar-thin border border-gray-200 rounded">
            <table className="w-full text-sm">
              <thead className="bg-gray-50 sticky top-0">
                <tr><th className="px-3 py-2 text-left text-xs text-gray-600">CSV column</th><th className="px-3 py-2 text-left text-xs text-gray-600">Maps to</th><th className="px-3 py-2 text-left text-xs text-gray-600">Sample</th></tr>
              </thead>
              <tbody>
                {headers.map(h => (
                  <tr key={h} className="border-t border-gray-100">
                    <td className="px-3 py-1.5 text-xs font-mono text-gray-700">{h}</td>
                    <td className="px-3 py-1.5">
                      <select value={mapping[h] || '__ignore__'} onChange={e => setMapping(m => ({ ...m, [h]: e.target.value }))} className="text-xs border border-gray-300 rounded px-1.5 py-1 bg-white">
                        {CSV_FIELDS.map(f => <option key={f.key} value={f.key}>{f.label}</option>)}
                      </select>
                    </td>
                    <td className="px-3 py-1.5 text-xs text-gray-500 truncate-cell">{(rows[0]?.[h] || '').toString().slice(0,80)}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
          <div className="flex justify-between mt-3">
            <Button variant="secondary" onClick={() => setStep(1)}>Back</Button>
            <Button onClick={() => setStep(3)}>Next: Preview</Button>
          </div>
        </div>
      )}
      {step === 3 && (
        <div>
          <div className="grid grid-cols-2 gap-3 mb-3">
            <div className="bg-gray-50 border border-gray-200 rounded p-3 text-sm">
              <div className="font-medium text-gray-900 mb-1">Validation</div>
              <ul className="text-xs text-gray-700 space-y-0.5">
                <li>Rows: <span className="font-mono">{proposed.length}</span></li>
                <li>Missing name (will skip): <span className="font-mono">{missingName}</span></li>
                <li>Duplicates within upload: <span className="font-mono">{dupesInUpload}</span></li>
              </ul>
            </div>
            <div className="bg-gray-50 border border-gray-200 rounded p-3 text-sm">
              <div className="font-medium text-gray-900 mb-1">Dedup strategy</div>
              <label className="flex items-center gap-2 text-sm py-0.5"><input type="radio" checked={dedup === 'domain'} onChange={() => setDedup('domain')} /> Match on normalized website domain (recommended)</label>
              <label className="flex items-center gap-2 text-sm py-0.5"><input type="radio" checked={dedup === 'phone'} onChange={() => setDedup('phone')} /> Match on phone</label>
              <label className="flex items-center gap-2 text-sm py-0.5"><input type="radio" checked={dedup === 'none'} onChange={() => setDedup('none')} /> No dedup (create all)</label>
              <div className="text-xs text-gray-500 mt-1.5">Existing accounts are filled in empty fields only — your data is never overwritten.</div>
            </div>
          </div>
          <div className="text-sm font-medium text-gray-900 mb-1">Preview (first 10)</div>
          <div className="overflow-x-auto max-h-80 overflow-y-auto scrollbar-thin border border-gray-200 rounded">
            <table className="w-full text-xs">
              <thead className="bg-gray-50 sticky top-0">
                <tr>
                  {Object.values(mapping).filter(v => v !== '__ignore__').filter((v,i,a) => a.indexOf(v) === i).map(field => (
                    <th key={field} className="px-2 py-1.5 text-left text-gray-600">{CSV_FIELDS.find(f => f.key === field)?.label || field}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {proposed.slice(0,10).map((p, i) => (
                  <tr key={i} className="border-t border-gray-100">
                    {Object.values(mapping).filter(v => v !== '__ignore__').filter((v,i,a) => a.indexOf(v) === i).map(field => (
                      <td key={field} className="px-2 py-1 text-gray-700 truncate-cell">{p[field] || ''}</td>
                    ))}
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
          <div className="flex justify-between mt-3">
            <Button variant="secondary" onClick={() => setStep(2)}>Back</Button>
            <Button disabled={busy} onClick={execute}>
              {busy
                ? (progress.total > 0
                    ? `Importing ${progress.done} of ${progress.total}…`
                    : 'Preparing…')
                : `Import ${proposed.length - missingName} rows`}
            </Button>
          </div>
        </div>
      )}
      {step === 4 && summary && (
        <div className="py-6">
          <div className="text-lg font-semibold text-gray-900 mb-2 text-center">Import complete</div>
          <div className="text-sm text-gray-700 mb-4 text-center">
            Imported {summary.total} rows: <span className="font-medium">{summary.created} new</span>,{' '}
            <span className="font-medium">{summary.updated} updated</span>,{' '}
            <span className="font-medium">{summary.skipped} skipped</span>.
          </div>
          {summary.errors && summary.errors.length > 0 && (
            <details className="border border-amber-200 bg-amber-50 rounded p-2 mb-4 text-xs">
              <summary className="cursor-pointer font-medium text-amber-900">
                {summary.errors.length} row{summary.errors.length === 1 ? '' : 's'} had errors — click to view
              </summary>
              <ul className="mt-2 space-y-0.5 max-h-48 overflow-y-auto scrollbar-thin font-mono">
                {summary.errors.map((e, i) => <li key={i}>{e}</li>)}
              </ul>
            </details>
          )}
          <div className="text-center">
            <Button onClick={() => dispatch({ type: 'CLOSE_MODAL' })}>Done</Button>
          </div>
        </div>
      )}
    </Modal>
  );
}

/* =====================================================================
   APP ROOT

function App() {
  const [state, dispatch] = useReducer(appReducer, initialState);

  // restore column visibility
  useEffect(() => {
    try {
      const raw = localStorage.getItem('crm.cols');
      if (raw) dispatch({ type: 'SET_COLS', cols: { ...initialState.columnVisibility, ...JSON.parse(raw) } });
    } catch {}
  }, []);

  // Google Calendar: reflect stored token state, poll for GIS readiness so the
  // "Connect" button activates the moment the gsi/client script finishes loading.
  useEffect(() => {
    function check() {
      const connected = gcal.isConnected();
      dispatch({ type: 'SET_GOOGLE', connected });
    }
    check();
    const t = setInterval(check, 5000);
    return () => clearInterval(t);
  }, []);

  // auth bootstrap
  useEffect(() => {
    let unsub;
    (async () => {
      const { data: { session } } = await supabase.auth.getSession();
      if (session?.user) {
        const { data: profile } = await supabase.from('profiles').select('*').eq('id', session.user.id).single();
        dispatch({ type: 'AUTH_READY', user: session.user, profile });
      } else {
        dispatch({ type: 'AUTH_READY', user: null, profile: null });
      }
      const { data } = supabase.auth.onAuthStateChange(async (event, sess) => {
        if (sess?.user) {
          const { data: profile } = await supabase.from('profiles').select('*').eq('id', sess.user.id).single();
          dispatch({ type: 'AUTH_READY', user: sess.user, profile });
        } else {
          dispatch({ type: 'AUTH_READY', user: null, profile: null });
        }
      });
      unsub = data?.subscription;
    })();
    return () => unsub?.unsubscribe();
  }, []);

  // load profiles + accounts after auth
  useEffect(() => {
    if (!state.user) return;
    (async () => {
      dispatch({ type: 'SET_LOADING', loading: true });
      const [
        { data: profs },
        { data: accs },
        { data: ctcs },
        { data: tsks },
        { data: cls },
        { data: acts },
        { data: chs },
        { data: cadList },
        { data: cadSteps },
        { data: enrolls },
        { data: execs },
      ] = await Promise.all([
        supabase.from('profiles').select('*').order('full_name', { ascending: true }),
        supabase.from('accounts').select('*').neq('status', 'deleted').order('updated_at', { ascending: false }),
        supabase.from('contacts').select('*').order('created_at', { ascending: false }),
        supabase.from('tasks').select('*').order('due_at', { ascending: true, nullsFirst: false }),
        supabase.from('calls').select('*').order('started_at', { ascending: false }).limit(1000),
        supabase.from('activities').select('*').order('occurred_at', { ascending: false }).limit(1000),
        supabase.from('stage_changes').select('*').order('changed_at', { ascending: false }).limit(2000),
        supabase.from('cadences').select('*').order('created_at', { ascending: true }),
        supabase.from('cadence_steps').select('*').order('cadence_id').order('step_order'),
        supabase.from('cadence_enrollments').select('*').order('enrolled_at', { ascending: false }),
        supabase.from('cadence_step_executions').select('*').order('executed_at', { ascending: false }).limit(1000),
      ]);
      if (profs) dispatch({ type: 'SET_PROFILES', profiles: profs });
      if (accs) dispatch({ type: 'LOAD_ACCOUNTS', accounts: accs });
      if (ctcs) dispatch({ type: 'SET_ALL_CONTACTS', contacts: ctcs });
      if (tsks) dispatch({ type: 'SET_ALL_TASKS', tasks: tsks });
      if (cls) dispatch({ type: 'SET_ALL_CALLS', calls: cls });
      if (acts) dispatch({ type: 'SET_ALL_ACTIVITIES', activities: acts });
      if (chs) dispatch({ type: 'SET_STAGE_CHANGES', changes: chs });
      if (cadList)  dispatch({ type: 'SET_CADENCES', cadences: cadList });
      if (cadSteps) dispatch({ type: 'SET_CADENCE_STEPS', steps: cadSteps });
      if (enrolls)  dispatch({ type: 'SET_CADENCE_ENROLLMENTS', enrollments: enrolls });
      if (execs)    dispatch({ type: 'SET_CADENCE_EXECUTIONS', executions: execs });
      dispatch({ type: 'SET_LOADING', loading: false });
    })();
  }, [state.user?.id]);

  // Auto-report runner — scans for due auto_email_report cadence tasks
  // assigned to the current user and fires them in the background.
  const autoReportRunningRef = useRef(new Set());
  useEffect(() => {
    if (!state.profile?.id) return;
    if (!state.cadenceEnrollments.length) return;

    let cancelled = false;

    async function runDueAutoReports() {
      const now = new Date();
      const myUid = state.profile.id;
      const eligible = state.cadenceEnrollments.filter(e => {
        if (e.status !== 'active' || !e.current_task_id) return false;
        const steps = state.cadenceSteps.filter(s => s.cadence_id === e.cadence_id);
        const cur = steps.find(s => s.step_order === e.current_step_order);
        if (!cur || cur.step_type !== 'auto_email_report') return false;
        const task = state.allTasks.find(t => t.id === e.current_task_id);
        if (!task || task.completed_at) return false;
        if (!task.due_at || new Date(task.due_at) > now) return false;
        const acct = state.accounts.find(a => a.id === e.account_id);
        if (!acct || acct.owner_id !== myUid) return false; // only owner fires
        if (autoReportRunningRef.current.has(task.id)) return false;
        return true;
      });

      for (const enrollment of eligible) {
        if (cancelled) return;
        const task = state.allTasks.find(t => t.id === enrollment.current_task_id);
        if (!task) continue;
        autoReportRunningRef.current.add(task.id);
        try {
          const account = state.accounts.find(a => a.id === enrollment.account_id);
          const contacts = state.allContacts.filter(c => c.account_id === account.id);
          const primary = contacts.find(c => c.is_primary) || contacts[0];
          const sendTo = primary?.email || account.email;
          if (!sendTo) {
            await supabase.from('tasks').update({
              notes: ((task.notes || '') + `\n[${new Date().toLocaleString()}] Auto-report skipped: no recipient email on account or primary contact.`).trim(),
            }).eq('id', task.id);
            continue;
          }
          const prospectName = primary?.first_name || '';
          notify(dispatch, `Generating auto-report for ${account.name}…`);
          const result = await runAutoReportForAccount(account, { sendTo, prospectName, dispatch });
          if (result.ok) {
            const completedAt = new Date().toISOString();
            const { data: updatedTask } = await supabase.from('tasks').update({ completed_at: completedAt }).eq('id', task.id).select().single();
            if (updatedTask) dispatch({ type: 'UPSERT_TASK', task: updatedTask });
            const { data: act } = await supabase.from('activities').insert({
              account_id: account.id,
              contact_id: primary?.id || null,
              user_id: account.owner_id,
              type: 'email',
              subject: result.subject || 'SEO Report sent',
              body: `Auto-sent SEO report to ${sendTo}`,
              occurred_at: completedAt,
              email_to: sendTo,
              email_from: 'ben@crocsandclicks.com',
              email_subject: result.subject,
            }).select().single();
            if (act) dispatch({ type: 'ADD_ACTIVITY', activity: act });
            await advanceCadenceFromCompletedTask({ taskId: task.id, state, dispatch });
            notify(dispatch, `📊 Auto-report sent to ${sendTo} (${account.name})`);
          } else {
            await supabase.from('tasks').update({
              notes: ((task.notes || '') + `\n[${new Date().toLocaleString()}] Auto-report failed: ${result.error}`).trim(),
            }).eq('id', task.id);
            notify(dispatch, `Auto-report failed for ${account.name}: ${result.error}`, 'error');
          }
        } catch (err) {
          console.error('[auto-report] uncaught', err);
        } finally {
          autoReportRunningRef.current.delete(task.id);
        }
      }
    }

    // Run once on mount/data-change, then every 10 minutes while CRM is open
    runDueAutoReports();
    const intervalId = setInterval(runDueAutoReports, 10 * 60 * 1000);
    return () => { cancelled = true; clearInterval(intervalId); };
  }, [state.profile?.id, state.cadenceEnrollments.length, state.allTasks.length]);

  // Twilio Voice — register a Device for this user once authed, refresh token before expiry.
  const twilioDeviceRef = useRef(null);
  useEffect(() => {
    if (!state.user) return;
    let cancelled = false;
    let refreshTimer = null;

    async function fetchToken() {
      const { data: { session } } = await supabase.auth.getSession();
      const jwt = session?.access_token;
      if (!jwt) throw new Error('Not signed in.');
      const res = await fetch(CALL_FUNCTION_URL + '/token', {
        method: 'POST',
        headers: { 'Authorization': 'Bearer ' + jwt, 'Content-Type': 'application/json' },
      });
      if (!res.ok) throw new Error('Token endpoint failed (' + res.status + ')');
      return await res.json();
    }

    (async () => {
      if (!window.Twilio?.Device) {
        if (!cancelled) dispatch({ type: 'SET_TWILIO', twilio: { status: 'error', error: 'Twilio SDK not loaded' } });
        return;
      }
      try {
        if (!cancelled) dispatch({ type: 'SET_TWILIO', twilio: { status: 'registering', error: null } });
        const { token } = await fetchToken();
        if (cancelled) return;
        const device = new window.Twilio.Device(token, { logLevel: 'warn', closeProtection: true });
        twilioDeviceRef.current = device;
        device.on('registered', () => { if (!cancelled) dispatch({ type: 'SET_TWILIO', twilio: { status: 'ready', error: null } }); });
        device.on('error', (err) => {
          console.error('Twilio Device error', err);
          if (!cancelled) dispatch({ type: 'SET_TWILIO', twilio: { status: 'error', error: err?.message || 'Device error' } });
        });
        device.on('tokenWillExpire', async () => {
          try {
            const { token: fresh } = await fetchToken();
            device.updateToken(fresh);
          } catch (e) { console.error('Token refresh failed', e); }
        });
        await device.register();
        window.__twilioDevice = device;
      } catch (e) {
        const msg = e?.message || (e ? String(e) : 'Failed to initialize Twilio Device');
        if (!cancelled) dispatch({ type: 'SET_TWILIO', twilio: { status: 'error', error: msg } });
      }
    })();

    return () => {
      cancelled = true;
      if (refreshTimer) clearInterval(refreshTimer);
      try { twilioDeviceRef.current?.destroy(); } catch {}
      twilioDeviceRef.current = null;
      window.__twilioDevice = null;
    };
  }, [state.user?.id]);

  // hash routing
  useEffect(() => {
    function onHash() { dispatch({ type: 'SET_ROUTE', route: parseHash(window.location.hash) }); }
    window.addEventListener('hashchange', onHash);
    if (!window.location.hash) window.location.hash = '#/accounts';
    return () => window.removeEventListener('hashchange', onHash);
  }, []);

  // keyboard shortcuts
  useEffect(() => {
    function onKey(e) {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') return;
      if (e.key === '/') { e.preventDefault(); document.getElementById('global-search')?.focus(); }
      else if (e.key === 'n') { e.preventDefault(); dispatch({ type: 'OPEN_MODAL', modal: 'add_account' }); }
      else if (e.key === 'i') { e.preventDefault(); dispatch({ type: 'OPEN_MODAL', modal: 'import' }); }
      else if (e.key === 'Escape') { dispatch({ type: 'CLOSE_MODAL' }); }
    }
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, []);

  const ctx = useMemo(() => ({ state, dispatch }), [state]);

  if (!state.authReady) {
    return <div className="h-full flex items-center justify-center text-sm text-gray-500">Loading…</div>;
  }
  if (!state.user || !state.profile) {
    return (
      <AppCtx.Provider value={ctx}>
        <LoginView />
        <Toast />
      </AppCtx.Provider>
    );
  }

  return (
    <AppCtx.Provider value={ctx}>
      <div className="h-full flex flex-col">
        <TopBar />
        <div className="flex-1 flex overflow-hidden">
          <div className="flex-1 flex flex-col overflow-hidden">
            {state.route.name === 'calendar'
              ? <CalendarView />
              : state.route.name === 'detail'
                ? <AccountDetailView accountId={state.route.accountId} />
                : state.route.tab === 'contacts'
                  ? <ContactListView />
                  : state.route.tab === 'tasks'
                    ? <TaskListView />
                    : state.route.tab === 'activity'
                      ? <ActivityListView />
                      : state.route.tab === 'cadence'
                        ? <CadenceListView />
                        : state.route.tab === 'dashboard'
                          ? <DashboardView />
                          : <AccountListView />}
          </div>
          <DialerSidebar />
        </div>
      </div>
      {state.modal === 'add_account' && <AddAccountModal />}
      {state.modal === 'add_contact' && <ContactModal />}
      {state.modal === 'log_activity' && <LogActivityModal />}
      {state.modal === 'import' && <ImportModal />}
      {state.modal === 'create_meeting' && <MeetingModal />}
      {state.modal === 'create_task' && <TaskModal />}
      {state.modal === 'edit_task' && <TaskModal />}
      {state.modal === 'dialer' && <DialerModal />}
      {state.modal === 'email' && <EmailModal />}
      {state.modal === 'email_thread' && <EmailThreadModal />}
      {state.modal === 'enroll_cadence' && <CadenceEnrollModal />}
      <Toast />
    </AppCtx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
