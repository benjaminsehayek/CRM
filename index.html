function digitsOnly(s) { return (s || '').replace(/\D/g, ''); }
function formatPhone(raw) {
  const d = digitsOnly(raw);
  if (d.length === 10) return `(${d.slice(0,3)}) ${d.slice(3,6)}-${d.slice(6)}`;
  if (d.length === 11 && d.startsWith('1')) return `(${d.slice(1,4)}) ${d.slice(4,7)}-${d.slice(7)}`;

}
function normalizeDomain(url) {

function relativeTime(input) {
  if (!input) return '—';
  const d = new Date(input);
  if (isNaN(d)) return '—';
  const secs = Math.floor((Date.now() - d.getTime()) / 1000);
  if (secs < 60) return 'just now';
  if (secs < 3600) return `${Math.floor(secs/60)}m ago`;
  if (secs < 86400) return `${Math.floor(secs/3600)}h ago`;
  if (secs < 86400*30) return `${Math.floor(secs/86400)}d ago`;
  if (secs < 86400*365) return `${Math.floor(secs/86400/30)}mo ago`;
  return `${Math.floor(secs/86400/365)}y ago`;
}
function fmtDate(d) {

}
function fmtDateTime(d) {

/* =====================================================================
   GOOGLE CALENDAR — browser-only OAuth via Google Identity Services
   ===================================================================== */
const GCAL_STORAGE_KEY = 'crm.gcal.token';

const gcal = {
  tokenClient: null,
  loaded: false,

  init() {
    if (this.loaded || !window.google?.accounts?.oauth2 || !GOOGLE_CLIENT_ID) return;
    this.tokenClient = window.google.accounts.oauth2.initTokenClient({
      client_id: GOOGLE_CLIENT_ID,
      scope: GOOGLE_CALENDAR_SCOPE,
      callback: () => {}, // set per-call
    });
    this.loaded = true;
  },

  saveToken(tok) {
    const record = { access_token: tok.access_token, expires_at: Date.now() + (tok.expires_in - 60) * 1000 };
    try { localStorage.setItem(GCAL_STORAGE_KEY, JSON.stringify(record)); } catch {}
    return record;
  },

  loadToken() {
    try {
      const raw = localStorage.getItem(GCAL_STORAGE_KEY);
      if (!raw) return null;
      const rec = JSON.parse(raw);
      if (!rec.access_token || !rec.expires_at) return null;
      return rec;
    } catch { return null; }
  },

  clearToken() { try { localStorage.removeItem(GCAL_STORAGE_KEY); } catch {} },

  isConnected() {
    const t = this.loadToken();
    return !!(t && t.expires_at > Date.now());
  },

  // Returns a valid access token, doing a silent (prompt='') refresh if needed.
  // Falls back to a user-visible consent popup if silent refresh fails.
  async getAccessToken({ interactive = false } = {}) {
    this.init();
    if (!this.tokenClient) throw new Error('Google Identity Services not loaded yet — try again in a second, or check that GOOGLE_CLIENT_ID is set.');

    const cached = this.loadToken();
    if (cached && cached.expires_at > Date.now() + 30 * 1000) return cached.access_token;

    return new Promise((resolve, reject) => {
      const timeout = setTimeout(() => {
        this.clearToken();
        reject(new Error(interactive
          ? 'Google sign-in popup did not complete (allow popups for this site?).'
          : 'Google silent refresh failed — click Reconnect Calendar in the user menu.'));
      }, 30000);
      this.tokenClient.callback = (resp) => {
        clearTimeout(timeout);
        if (resp.error) {
          this.clearToken();
          return reject(new Error(resp.error_description || resp.error));
        }
        const rec = this.saveToken(resp);
        resolve(rec.access_token);
      };
      try {
        this.tokenClient.requestAccessToken({ prompt: interactive ? 'consent' : '' });
      } catch (e) {
        clearTimeout(timeout);
        reject(e);
      }
    });
  },

  signOut() {
    const t = this.loadToken();
    if (t?.access_token && window.google?.accounts?.oauth2) {
      try { window.google.accounts.oauth2.revoke(t.access_token, () => {}); } catch {}
    }
    this.clearToken();
  },

  async apiFetch(path, { method = 'GET', body = null, query = null, interactive = false } = {}) {
    const token = await this.getAccessToken({ interactive });
    const url = new URL('https://www.googleapis.com/calendar/v3' + path);
    if (query) Object.entries(query).forEach(([k, v]) => v != null && url.searchParams.append(k, v));
    const res = await fetch(url.toString(), {
      method,
      headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
      body: body ? JSON.stringify(body) : null,
    });
    if (res.status === 401) {
      this.clearToken();
      throw new Error('Google session expired — click Reconnect Calendar.');
    }
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error?.message || `Google API error ${res.status}`);
    }
    if (res.status === 204) return null;
    return res.json();
  },

  async listEvents({ timeMin, timeMax, maxResults = 100 }) {
    const data = await this.apiFetch('/calendars/primary/events', {
      query: {
        timeMin: timeMin.toISOString(),
        timeMax: timeMax.toISOString(),
        singleEvents: true,
        orderBy: 'startTime',
        maxResults,
      },
    });
    return data.items || [];
  },

  async createEvent({ summary, description, startISO, endISO, attendees, location, virtual }) {
    return this.apiFetch('/calendars/primary/events', {
      method: 'POST',
      query: { sendUpdates: 'all', conferenceDataVersion: virtual ? 1 : 0 },
      body: {
        summary, description,
        location: virtual ? undefined : location,
        start: { dateTime: startISO },
        end:   { dateTime: endISO },
        attendees: (attendees || []).filter(Boolean).map(email => ({ email })),
        source: { title: 'Crocs & Clicks CRM', url: window.location.origin + window.location.pathname },
        conferenceData: virtual ? {
          createRequest: {
            requestId: 'crm-' + Date.now() + '-' + Math.random().toString(36).slice(2, 8),
            conferenceSolutionKey: { type: 'hangoutsMeet' },
          },
        } : undefined,
      },
    });
  },
};

/* =====================================================================
   CROCS REPORT — auto-generated Local SEO + Site Audit report
   Ports the standalone Prospect Report Generator pipeline into the CRM,

   Resend send path stays on the existing Cloudflare Worker.

const CROCS_WORKER_URL  = 'https://crocs-clicks-proxy.benjamin-sehayek.workers.dev';
const CROCS_ADMIN_TOKEN = 'ccadmin2026';

const crocsReport = {
  // industry → (primary, secondary) keyword templates. Secondary gets the
  // account's city appended when present. Used when account.report_keywords
  // is not overridden.
  INDUSTRY_KW: {
    auto_body:     { p: 'auto body shop',   s: 'auto body repair' },
    auto_repair:   { p: 'auto repair',      s: 'mechanic' },
    paint:         { p: 'house painter',    s: 'painting contractor' },
    electrical:    { p: 'electrician',      s: 'electrical contractor' },
    plumbing:      { p: 'plumber',          s: 'emergency plumber' },
    hvac:          { p: 'hvac',             s: 'heating and cooling' },
    roofing:       { p: 'roofer',           s: 'roof repair' },
    remodeling:    { p: 'general contractor', s: 'home remodeling' },
    landscaping:   { p: 'landscaper',       s: 'landscaping' },
    janitorial:    { p: 'janitorial services', s: 'commercial cleaning' },
    flooring:      { p: 'flooring',         s: 'flooring installer' },
    concrete:      { p: 'concrete contractor', s: 'concrete repair' },

    garage_door:   { p: 'garage door repair', s: 'garage door installation' },
    window_door:   { p: 'window installation', s: 'door installation' },
    solar:         { p: 'solar installer',  s: 'solar panel installation' },
    tree_service:  { p: 'tree service',     s: 'tree removal' },
    cleaning:      { p: 'house cleaning',   s: 'cleaning service' },
    powersports:   { p: 'powersports dealer', s: 'atv repair' },
    other:         { p: 'local services',   s: 'contractor' },
  },

  // ─── Worker API helpers ────────────────────────────────────────────────
  async workerPost(path, body) {
    const r = await fetch(CROCS_WORKER_URL + path, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Admin-Token': CROCS_ADMIN_TOKEN },
      body: JSON.stringify(body),
    });
    if (!r.ok) throw new Error('Worker ' + path + ' → ' + r.status);
    return r.json();
  },
  async workerGet(path) {
    const r = await fetch(CROCS_WORKER_URL + path, {
      headers: { 'X-Admin-Token': CROCS_ADMIN_TOKEN },
    });
    if (!r.ok) throw new Error('Worker ' + path + ' → ' + r.status);
    return r.json();
  },

  // ─── Misc helpers ───────────────────────────────────────────────────────
  esc(s) { return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); },
  digitsOnly(s) { return (s || '').replace(/\D/g, ''); },
  sleep(ms) { return new Promise(r => setTimeout(r, ms)); },
  normalizeCompName(name) {
    return (name || '').toLowerCase()
      .replace(/[.,'"!?#@]/g, '')
      .replace(/\b(inc|llc|co|corp|ltd|limited|company|the|and|dba|pllc|lp)\b/g, '')
      .replace(/\s+/g, ' ').trim();
  },

  // ─── Validators (ported from the standalone tool) ──────────────────────
  validCoords(lat, lng) {
    const a = parseFloat(lat), b = parseFloat(lng);
    if (!a || !b) return false;
    // US + Canada bounding box
    if (a < 24 || a > 72) return false;
    if (b < -170 || b > -50) return false;
    return true;
  },
  validDomain(domain) {
    if (!domain) return false;
    if (/[\/\&#?=%@]/.test(domain)) return false;
    return /^[a-zA-Z0-9][a-zA-Z0-9\-.]*\.[a-zA-Z]{2,}$/.test(domain);
  },
  NEIGHBOR_STATES: {
    WA: ['WA','OR','ID'],
    OR: ['OR','WA','ID','CA','NV'],
    ID: ['ID','WA','OR','MT','WY','UT','NV'],
    CA: ['CA','OR','NV','AZ'],
    MT: ['MT','ID','WY','ND','SD'],
    NV: ['NV','OR','ID','UT','AZ','CA'],
    AZ: ['AZ','CA','NV','UT','NM'],
  },
  locationPlausible(candidate, expectedState) {
    if (!expectedState) return true;
    if (!candidate.state) return true; // unknown state — accept with caveat
    const cs = candidate.state.trim().toUpperCase();
    const accepted = this.NEIGHBOR_STATES[expectedState.toUpperCase()] || [expectedState.toUpperCase()];
    return accepted.includes(cs);
  },
  namePlausible(foundName, hint) {
    if (!foundName || !hint) return false;
    const foundClean = foundName.toLowerCase().replace(/[^a-z0-9]/g, '');
    const hintClean  = hint.toLowerCase().replace(/[^a-z0-9]/g, '');
    if (foundClean.includes(hintClean) || hintClean.includes(foundClean)) return true;
    const foundWords = foundName.toLowerCase().replace(/[^a-z0-9\s]/g, ' ').split(/\s+/).filter(w => w.length >= 4);
    const hintWords  = hint.toLowerCase().replace(/[^a-z0-9\s]/g, ' ').split(/\s+/).filter(w => w.length >= 4);
    return foundWords.some(w => hintClean.includes(w)) || hintWords.some(w => foundClean.includes(w));
  },

  // ─── parseMapsUrl: extract lat/lng/cid/placeId/name from a Maps URL ────
  parseMapsUrl(url) {
    const out = {};
    if (!url) return out;
    let m = url.match(/@(-?\d+\.?\d*),(-?\d+\.?\d*)/);
    if (m) { out.lat = parseFloat(m[1]); out.lng = parseFloat(m[2]); }
    m = url.match(/!3d(-?\d+\.?\d*)!4d(-?\d+\.?\d*)/);
    if (m) { out.lat = parseFloat(m[1]); out.lng = parseFloat(m[2]); }
    m = url.match(/[?&]cid=(\d+)/) || url.match(/\/maps\?.*?cid=(\d+)/);
    if (m) out.cid = m[1];
    m = url.match(/place_id=([A-Za-z0-9_\-]+)/);
    if (m) out.placeId = m[1];
    m = url.match(/\/place\/([^/@?]+)/);
    if (m) out.name = decodeURIComponent(m[1].replace(/\+/g, ' '));
    return out;
  },

  // ─── Derive keywords from an account ──────────────────────────────────
  deriveKeywords(account) {
    if (account.report_keywords && account.report_keywords.trim()) {
      const overrides = account.report_keywords.split('\n').map(s => s.trim()).filter(Boolean).slice(0, 2);
      if (overrides.length) return overrides;
    }
    const meta = this.INDUSTRY_KW[account.industry] || this.INDUSTRY_KW.other;
    const city = (account.city || '').trim();
    const primary   = `${meta.p} near me`;
    const secondary = city ? `${meta.s} ${city}` : meta.s;
    return [primary, secondary];
  },

  // ─── Business lookup (Google Maps via DataForSEO) ─────────────────────
  async lookupByName(name) {
    const body = [{ keyword: name, location_name: 'United States', language_code: 'en', device: 'desktop', depth: 10 }];
    const d = await this.workerPost('/v3/serp/google/maps/live/advanced', body);
    const items = (d.tasks?.[0]?.result?.[0]?.items || []).filter(i => i.type === 'maps_search');
    if (!items.length) return [];
    return items.slice(0, 5).map(i => this.mapItemToResult(i));
  },
  async lookupByNameLocated(name, city, state) {
    const stateMap = { WA: 'Washington,United States', OR: 'Oregon,United States' };
    const locationName = stateMap[(state || '').toUpperCase()] || 'United States';
    const keyword = [name, city, state].filter(Boolean).join(' ');
    const body = [{ keyword, location_name: locationName, language_code: 'en', device: 'desktop', depth: 10 }];
    const d = await this.workerPost('/v3/serp/google/maps/live/advanced', body);
    const items = (d.tasks?.[0]?.result?.[0]?.items || []).filter(i => i.type === 'maps_search');
    if (!items.length) return [];
    return items.slice(0, 5).map(i => this.mapItemToResult(i));
  },
  async lookupByDomain(input, opts = {}) {
    const domain = input.replace(/^https?:\/\//, '').replace(/^www\./, '').split('/')[0];
    if (!this.validDomain(domain)) return [];
    const d = await this.workerPost('/v3/business_data/business_listings/search/live', [{
      categories: [], filters: [['domain', '=', domain]], language_code: 'en', limit: 5,
    }]);
    const items = d.tasks?.[0]?.result?.[0]?.items || [];
    if (!items.length) {
      // Name fallback: derive a seed from the domain (or opts.hint) and search by name.
      // Tag the result with plausibility so the caller can reject obviously wrong matches.
      const seedName = (opts.hint || domain.replace(/\.[a-z]{2,}$/, '').replace(/[.-]/g, ' ')).trim();
      const nameResults = await this.lookupByName(seedName);
      if (nameResults.length) {
        nameResults[0]._nameSearchFallback = true;
        nameResults[0]._fallbackPlausible  = this.namePlausible(nameResults[0].name, domain) || this.namePlausible(nameResults[0].name, seedName);
      }
      return nameResults;
    }
    return items.map(i => this.listingToResult(i));
  },
  async lookupByPhone(input) {
    const digits = (input || '').replace(/\D/g, '');
    const last10 = digits.slice(-10);
    if (last10.length < 10) return [];
    const d = await this.workerPost('/v3/business_data/business_listings/search/live', [{
      categories: [], filters: [['phone', 'like', `%${last10}%`]], language_code: 'en', limit: 5,
    }]);
    const items = d.tasks?.[0]?.result?.[0]?.items || [];
    return items.map(i => this.listingToResult(i));
  },
  async lookupFromMapsUrl(url) {
    const parsed = this.parseMapsUrl(url);
    // If the URL embeds a name, prefer a SERP search anchored to the parsed
    // coordinates so the cid/placeId can be resolved by Google.
    if (parsed.name) {
      const locParam = parsed.lat && parsed.lng ? `${parsed.lat.toFixed(7)},${parsed.lng.toFixed(7)},14z` : undefined;
      const body = [{ keyword: parsed.name, language_code: 'en', depth: 5, ...(locParam ? { location_coordinate: locParam } : { location_name: 'United States' }) }];
      const d = await this.workerPost('/v3/serp/google/maps/live/advanced', body);
      const items = (d.tasks?.[0]?.result?.[0]?.items || []).filter(i => i.type === 'maps_search');
      if (items.length) {
        const results = items.slice(0, 5).map(i => this.mapItemToResult(i));
        if (parsed.cid || parsed.placeId) {
          const match = results.find(r => (parsed.cid && r.cid === parsed.cid) || (parsed.placeId && r.placeId === parsed.placeId));
          if (match) return [match];
        }
        return results;
      }
    }
    // Bare coords with no name match — return a stub.
    if (parsed.lat && parsed.lng) {
      return [{
        name: parsed.name || 'Business from Maps URL',
        address: '', city: '', state: '',
        latitude: parsed.lat, longitude: parsed.lng,
        placeId: parsed.placeId, cid: parsed.cid,
        _fromMapsUrl: true,
      }];
    }
    return [];
  },
  mapItemToResult(item) {
    const ap = (item.address || '').split(',').map(s => s.trim());
    return {
      name: item.title || '',
      address: ap[0] || item.address || '',
      city: ap[1] || '',
      state: ap[2]?.split(' ')[0] || '',
      latitude: item.gps_coordinates?.latitude || item.latitude || 0,
      longitude: item.gps_coordinates?.longitude || item.longitude || 0,
      phone: item.phone || null,
      website: item.url || null,
      placeId: item.place_id || null,
      cid: item.cid || null,
      category: item.category || null,
    };
  },
  listingToResult(item) {
    return {
      name: item.title || '',
      address: item.address || '',
      city: item.address_info?.city || '',
      state: item.address_info?.region || '',
      latitude: item.latitude || 0,
      longitude: item.longitude || 0,
      phone: item.phone || null,
      website: item.url || (item.domain ? `https://${item.domain}` : null),
      placeId: item.place_id || null,
      cid: item.cid || null,
      category: item.category || null,
    };
  },

  // ─── Resolve a business location for an account (cache on the row) ────
  // Full strategy ladder, mirroring the standalone tool's batch-mode resolver:
  //   0. Cached gbp_lat/lng on the account
  //   1. account.website if it's a Maps URL → lookupFromMapsUrl
  //   2. Domain lookup (with name-fallback plausibility check)
  //   3. Phone lookup
  //   4. Name search with city + state context
  //   5. Name search broad (US-wide)
  // Each candidate is validated for coord bounds, location plausibility
  // (must be in the expected state or a neighbor), and name plausibility
  // (when the result came via the domain → name fallback path).
  async _cacheCandidate(account, candidate, dispatch) {
    const patch = {
      gbp_lat: candidate.latitude,
      gbp_lng: candidate.longitude,
      gbp_cid: candidate.cid,
      gbp_place_id: candidate.placeId,
    };
    const { data } = await supabase.from('accounts').update(patch).eq('id', account.id).select().single();
    if (data && dispatch) dispatch({ type: 'UPSERT_ACCOUNT', account: data });
    return {
      name: candidate.name || account.name,
      latitude: candidate.latitude,
      longitude: candidate.longitude,
      cid: candidate.cid || null,
      placeId: candidate.placeId || null,
      website: account.website || candidate.website || null,
      city:    candidate.city  || account.city  || '',
      state:   candidate.state || account.state || '',
      address: candidate.address || account.street || '',
    };
  },

  async resolveBusinessLocation(account, dispatch) {
    // 0. Cached coords on the account
    if (account.gbp_lat && account.gbp_lng) {
      return {
        name: account.name,
        latitude: parseFloat(account.gbp_lat),
        longitude: parseFloat(account.gbp_lng),
        cid: account.gbp_cid || null,
        placeId: account.gbp_place_id || null,
        website: account.website || null,
        city: account.city || '', state: account.state || '',
        address: account.street || '',
      };
    }

    const expectedState = (account.state || '').toUpperCase();
    const city = account.city || '';

    // 1. If account.website is a Maps URL, parse it.
    if (account.website && /maps\.app\.goo\.gl|google\.com\/maps|maps\.google\.com/i.test(account.website)) {
      try {
        const r = await this.lookupFromMapsUrl(account.website);
        const c = r[0];
        if (c && this.validCoords(c.latitude, c.longitude) && this.locationPlausible(c, expectedState)) {
          return await this._cacheCandidate(account, c, dispatch);
        }
      } catch {}
    }

    // 2-5. Lookup ladder with validation
    let domain = '';
    if (account.website && !/maps\.app\.goo\.gl|google\.com\/maps/i.test(account.website)) {
      const cleaned = account.website.replace(/^https?:\/\//, '').replace(/^www\./, '').split('/')[0];
      if (this.validDomain(cleaned)) domain = cleaned;
    }

    const strategies = [];
    if (domain)         strategies.push(() => this.lookupByDomain(domain, { hint: account.name }));
    if (account.phone)  strategies.push(() => this.lookupByPhone(account.phone));
    strategies.push(() => this.lookupByNameLocated(account.name, city, expectedState));
    strategies.push(() => this.lookupByName(account.name));

    for (const run of strategies) {
      let results = [];
      try { results = await run() || []; } catch { continue; }
      for (const c of results.slice(0, 3)) {
        if (!this.validCoords(c.latitude, c.longitude)) continue;
        // Name fallback (from lookupByDomain) requires plausibility
        if (c._nameSearchFallback && !c._fallbackPlausible) continue;
        // For name-based strategies, also require name plausibility against account.name
        // (avoids picking a different business with a vaguely similar name in the wrong state)
        if (!this.locationPlausible(c, expectedState)) continue;
        return await this._cacheCandidate(account, c, dispatch);
      }
    }

    throw new Error('Could not locate business on Google Maps');
  },

  // ─── Reverse geocode → neighborhood label (Nominatim, free) ───────────
  async reverseGeocode(lat, lon) {
    const zooms = [16, 15, 14];
    for (const zoom of zooms) {
      try {
        const r = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json&zoom=${zoom}&addressdetails=1`,
          { headers: { 'User-Agent': 'CrocsAndClicksCRM/1.0' } });
        if (!r.ok) continue;
        const d = await r.json();
        const a = d.address || {};
        const name = a.neighbourhood || a.suburb || a.city_district || a.quarter
                  || a.hamlet || a.village || a.town || a.city || '';
        if (name && name !== (a.county || '') && name !== (a.state || '')) return name;
        if (name && zoom < 16) return name;
      } catch {}
      if (zoom > 14) await this.sleep(300);
    }
    return '';
  },
  async getHoodLabels(pts, sz) {
    const mid = Math.floor(sz / 2);
    const edges = [
      { key: 'n', idx: mid },
      { key: 's', idx: (sz - 1) * sz + mid },
      { key: 'w', idx: mid * sz },
      { key: 'e', idx: mid * sz + (sz - 1) },
    ];
    const labels = { n: '', s: '', w: '', e: '' };
    for (const { key, idx } of edges) {
      const pt = pts[idx];
      if (pt && pt.lat && pt.lng) {
        labels[key] = await this.reverseGeocode(pt.lat, pt.lng);
        await this.sleep(1200);
      }
    }
    return labels;
  },

  // ─── Grid generation ──────────────────────────────────────────────────
  genGrid(lat, lng, mi, sz) {
    const pts = [], km = mi * 1.60934, step = km * 2 / (sz - 1), R = 6371;
    for (let i = 0; i < sz; i++) for (let j = 0; j < sz; j++) {
      const x = -km + j * step, y = km - i * step;
      pts.push({
        lat: lat + y / R * 180 / Math.PI,
        lng: lng + x / R * 180 / Math.PI / Math.cos(lat * Math.PI / 180),
        ctr: i === Math.floor(sz / 2) && j === Math.floor(sz / 2),
        rk: {},
      });
    }
    return pts;
  },

  // ─── Grid scan (5×5 × 2 keywords, 20-way concurrency) ────────────────
  async runGridScan(biz, kws, rad) {
    const SZ = 5;
    const primaryKw    = kws[0];
    const secondaryKws = kws[1] ? [kws[1]] : [];
    const lat = biz.latitude, lng = biz.longitude;
    const primaryPts   = this.genGrid(lat, lng, rad, SZ);
    const secondaryPts = this.genGrid(lat, lng, rad, SZ);
    const initPt = (pt) => {
      pt.rk = {}; pt.comps = {};
      [primaryKw, ...secondaryKws].forEach(k => { pt.rk[k] = null; });
    };
    primaryPts.forEach(initPt);
    secondaryPts.forEach(initPt);

    const bizNormalized = this.normalizeCompName(biz.name);
    const bl = biz.name.toLowerCase().trim();
    const compsByKw = {};
    [primaryKw, ...secondaryKws].forEach(k => compsByKw[k] = {});

    const tasks = [];
    primaryPts.forEach(pt => tasks.push({ pt, kw: primaryKw }));
    secondaryPts.forEach(pt => secondaryKws.forEach(kw => tasks.push({ pt, kw })));

    const processTask = async ({ pt, kw }) => {
      try {
        const d = await this.workerPost('/v3/serp/google/maps/live/advanced', [{
          keyword: kw,
          location_coordinate: `${pt.lat.toFixed(7)},${pt.lng.toFixed(7)},11z`,
          language_code: 'en', device: 'desktop', depth: 10, search_places: false,
        }]);
        if (d.status_code !== 20000 || d.tasks?.[0]?.status_code !== 20000) { pt.rk[kw] = null; return; }
        const items = (d.tasks?.[0]?.result?.[0]?.items || []).filter(i => i.type === 'maps_search');
        let rank = null; const comps = [];
        for (const it of items) {
          if (!it.title || !it.title.trim() || !it.rank_group || it.rank_group < 1) continue;
          const title = it.title.toLowerCase().trim();
          const norm  = this.normalizeCompName(it.title);
          const isBiz = norm === bizNormalized
            || (biz.cid && it.cid && String(it.cid) === String(biz.cid))
            || title === bl;
          if (rank === null && isBiz) rank = it.rank_group;
          if (isBiz) continue;
          comps.push({ name: it.title.trim(), norm, rank: it.rank_group });
        }
        pt.rk[kw] = rank;
        pt.comps = pt.comps || {};
        pt.comps[kw] = comps;
        comps.forEach(c => {
          if (!compsByKw[kw][c.norm]) compsByKw[kw][c.norm] = { n: c.name, norm: c.norm, sum: 0, cnt: 0 };
          else if (c.name.length > compsByKw[kw][c.norm].n.length) compsByKw[kw][c.norm].n = c.name;
          compsByKw[kw][c.norm].sum += c.rank;
          compsByKw[kw][c.norm].cnt++;
        });
      } catch {
        pt.rk[kw] = null;
      }
    };

    const SCAN_TIMEOUT_MS = 3 * 60 * 1000;
    const deadline = Date.now() + SCAN_TIMEOUT_MS;
    let idx = 0, timedOut = false;
    const worker = async () => {
      while (idx < tasks.length) {
        if (Date.now() > deadline) { timedOut = true; break; }
        await processTask(tasks[idx++]);
      }
    };
    await Promise.all(Array.from({ length: Math.min(20, tasks.length) }, worker));

    const topCompsByKw = {};
    [primaryKw, ...secondaryKws].forEach(k => {
      topCompsByKw[k] = Object.values(compsByKw[k])
        .filter(c => c.cnt >= 1)
        .map(c => ({ ...c, avg: c.sum / c.cnt, score: c.cnt * (21 - Math.min(c.sum / c.cnt, 20)) }))
        .sort((a, b) => b.score - a.score || a.avg - b.avg)
        .slice(0, 5);
    });

    let hoodLabels = { n: '', s: '', w: '', e: '' };
    try { hoodLabels = await this.getHoodLabels(primaryPts, SZ); } catch {}

    return {
      ts: Date.now(),
      biz: biz.name, addr: biz.address || '',
      lat, lng, rad,
      kws: [primaryKw, ...secondaryKws],
      hoodLabels,
      pts: primaryPts,
      ptsSec: secondaryPts,
      sz: SZ, szSec: SZ,
      compsByKw: topCompsByKw,
      scanTimedOut: timedOut,
    };
  },

  // ─── Site audit ───────────────────────────────────────────────────────
  async runSiteAudit(domain) {
    if (!domain) return null;
    try {
      const taskBody = [{
        target: domain, max_crawl_pages: 20, load_resources: true,
        enable_javascript: false, enable_browser_rendering: false,
        switch_pool: true, support_cookies: true,
      }];
      const taskResp = await this.workerPost('/v3/on_page/task_post', taskBody);
      if (taskResp.status_code !== 20000) throw new Error('Crawl task failed: ' + taskResp.status_message);
      const taskId = taskResp.tasks?.[0]?.id;
      if (!taskId) throw new Error('No task ID');

      let attempts = 0, pollInterval = 2000;
      const maxAttempts = 60;
      while (attempts < maxAttempts) {
        await this.sleep(pollInterval);
        attempts++;
        if (attempts === 8)  pollInterval = 4000;
        if (attempts === 18) pollInterval = 8000;
        try {
          const summResp = await fetch(CROCS_WORKER_URL + '/v3/on_page/summary/' + taskId, {
            headers: { 'X-Admin-Token': CROCS_ADMIN_TOKEN },
          });
          const summData = await summResp.json();
          if (summData.status_code !== 20000) break;
          const result = summData.tasks?.[0]?.result?.[0];
          if (!result) continue;
          const crawled = result.crawl_status?.pages_crawled || 0;
          const queued  = result.crawl_status?.pages_in_queue || 0;
          if (result.crawl_progress === 'finished') break;
          if (attempts >= 10 && crawled === 0 && queued === 0) break;
        } catch {}
      }

      const [finalSumm, pagesResp] = await Promise.all([
        fetch(CROCS_WORKER_URL + '/v3/on_page/summary/' + taskId, {
          headers: { 'X-Admin-Token': CROCS_ADMIN_TOKEN },
        }).then(r => r.json()),
        this.workerPost('/v3/on_page/pages', [{ id: taskId, limit: 60, filters: [['resource_type', '=', 'html']] }]),
      ]);

      const summResult  = finalSumm.tasks?.[0]?.result?.[0] || {};
      const pagesResult = pagesResp.tasks?.[0]?.result?.[0]?.items || [];
      let criticalIssues = 0, warnings = 0, notices = 0;
      const issueTypes = {};
      pagesResult.forEach(page => {
        const checks = page.checks || {};
        Object.entries(checks).forEach(([key, val]) => {
          if (val === true) {
            if (!issueTypes[key]) issueTypes[key] = 0;
            issueTypes[key]++;
            const critical = ['is_broken','has_redirect_chain','is_4xx_code','is_5xx_code','has_duplicate_title','has_duplicate_description','has_no_title','has_no_description','has_no_h1_tags','has_no_content_encoding','is_http','is_https_redirect_invalid','has_no_canonical'];
            const warning  = ['has_duplicate_meta_tags','has_flash','has_frames','has_deprecated_tags','has_no_image_alt','has_multiple_h1_tags','has_low_content_rate','has_no_micromarkup','has_no_og_tags'];
            if (critical.includes(key)) criticalIssues++;
            else if (warning.includes(key)) warnings++;
            else notices++;
          }
        });
      });
      const topIssuesFull = Object.entries(issueTypes).map(([k,v]) => ({ key: k, count: v }))
        .sort((a,b) => b.count - a.count).slice(0, 12);

      const totalPages    = summResult.crawl_status?.pages_crawled || pagesResult.length;
      const onpageSummary = summResult.page_metrics || {};
      const broken        = (onpageSummary.broken_resources || 0) + (onpageSummary.broken_links || 0);
      const crawlBlocked  = totalPages === 0 || (totalPages <= 1 && criticalIssues === 0 && warnings === 0 && notices === 0);
      const crawlTimedOut = attempts >= maxAttempts;
      const issueRatio    = (criticalIssues + warnings * 0.5) / Math.max(1, totalPages);
      const healthScore   = crawlBlocked ? null : Math.max(10, Math.round(100 - Math.min(90, issueRatio * 60)));
      const httpPages     = pagesResult.filter(p => p.url && p.url.startsWith('http://')).length;
      const hasSSL        = pagesResult.length === 0 ? null : httpPages === 0;
      const noindexPages  = pagesResult.filter(p => {
        const m = p.meta || {};
        return m.robots_info && (m.robots_info.noindex === true || (typeof m.robots_info === 'string' && m.robots_info.includes('noindex')));
      }).length;
      const missingCanonical = issueTypes['has_no_canonical'] || 0;
      const thinContent      = pagesResult.filter(p => {
        const wc = p.meta?.content?.plain_text_word_count || p.meta?.content?.words_count || 0;
        return wc > 10 && wc < 100;
      }).length;
      const missingSchema = issueTypes['has_no_micromarkup'] || 0;
      const missingOG     = issueTypes['has_no_og_tags']     || 0;
      const mixedContent  = issueTypes['has_mixed_content']  || 0;

      let hasSitemap = null, hasRobots = null;
      try {
        const [sm, rb] = await Promise.all([
          fetch(`${CROCS_WORKER_URL}/probe?url=https://${domain}/sitemap.xml`, { headers: { 'X-Admin-Token': CROCS_ADMIN_TOKEN } }).then(r => r.json()).catch(() => ({ ok: null })),
          fetch(`${CROCS_WORKER_URL}/probe?url=https://${domain}/robots.txt`,  { headers: { 'X-Admin-Token': CROCS_ADMIN_TOKEN } }).then(r => r.json()).catch(() => ({ ok: null })),
        ]);
        hasSitemap = sm.ok === true ? true : sm.ok === false ? false : null;
        hasRobots  = rb.ok === true ? true : rb.ok === false ? false : null;
      } catch {}

      return {
        domain, totalPages, crawled: totalPages,
        criticalIssues, warnings, notices, broken, healthScore,
        topIssues: topIssuesFull, onpageSummary,
        crawlBlocked, crawlTimedOut,
        hasSSL, httpPages, noindexPages, missingCanonical, thinContent,
        missingSchema, missingOG, hasSitemap, hasRobots, mixedContent,
      };
    } catch (e) {
      console.error('[report] audit failed:', e.message);
      return null;
    }
  },

  // ─── Audit category scoring (5-category weighted overall) ─────────────
  computeAuditScores(audit) {
    if (!audit) return null;
    if (audit.crawlBlocked) return { blocked: true, seoScore: null, techScore: null, contentScore: null, linkScore: null, localSeoScore: null, overallScore: null };
    const imap = {};
    (audit.topIssues || []).forEach(i => { imap[i.key] = i.count; });
    const total = Math.max(1, audit.totalPages);

    const seoRaw = (imap['has_no_title'] || 0) * 1.5
      + (imap['has_no_description'] || 0) * 1.2
      + (imap['has_no_h1_tags'] || 0) * 1.0
      + (imap['has_duplicate_title'] || 0) * 0.6
      + (imap['has_duplicate_description'] || 0) * 0.4
      + (imap['has_no_canonical'] || 0) * 0.8
      + (imap['has_no_micromarkup'] || 0) * 0.3
      + (imap['has_no_og_tags'] || 0) * 0.2;
    const seoScore = Math.max(5, Math.round(100 - Math.min(95, (seoRaw / total) * 90)));

    const techRaw = (imap['is_broken'] || 0) * 2.5
      + (imap['is_4xx_code'] || 0) * 2.0
      + (imap['is_5xx_code'] || 0) * 3.0
      + (imap['has_redirect_chain'] || 0) * 1.2
      + (imap['has_no_content_encoding'] || 0) * 0.4
      + (imap['has_mixed_content'] || 0) * 1.5
      + (imap['is_http'] || 0) * 2.0
      + (audit.broken || 0) * 0.5
      + (audit.hasSSL === false ? total * 0.5 : 0)
      + (audit.hasSitemap === false && (audit.totalPages || 0) > 3 ? 5 : 0)
      + (audit.hasRobots === false ? 3 : 0);
    const techScore = Math.max(5, Math.round(100 - Math.min(95, (techRaw / total) * 75)));

    const contentRaw = (imap['has_no_h1_tags'] || 0) * 1.2
      + (imap['has_multiple_h1_tags'] || 0) * 0.8
      + (imap['has_no_description'] || 0) * 0.5
      + (audit.thinContent || 0) * 0.9
      + (audit.noindexPages || 0) * 0.4;
    const contentScore = Math.max(5, Math.round(100 - Math.min(95, (contentRaw / total) * 70)));

    const linkRaw = (imap['has_no_image_alt'] || 0) * 0.6
      + (audit.broken || 0) * 0.8
      + (imap['has_mixed_content'] || 0) * 0.5;
    const linkScore = Math.max(5, Math.round(100 - Math.min(95, (linkRaw / total) * 60)));

    const localSeoRaw = (audit.missingSchema || 0) * 1.2
      + (audit.missingOG || 0) * 0.5
      + (audit.hasSitemap === false && (audit.totalPages || 0) > 3 ? 10 : 0)
      + (audit.hasRobots === false ? 5 : 0);
    const localSeoScore = Math.max(5, Math.round(100 - Math.min(95, (localSeoRaw / total) * 80)));

    const overallScore = Math.round(
      seoScore     * 0.25 +
      techScore    * 0.25 +
      contentScore * 0.20 +
      linkScore    * 0.15 +
      localSeoScore * 0.15
    );

    return { seoScore, techScore, contentScore, linkScore, localSeoScore, overallScore };
  },
};

/* =====================================================================
   CROCS REPORT — HTML builders + orchestrator
   Ported verbatim from the standalone Prospect Report Generator
   (buildGridSectionsHTML + buildFullEmailHTML) so the auto-sent cadence
   email is byte-identical to what the rep would produce manually.
   ===================================================================== */
function buildReportGridSections(sd) {
  const eH = (s) => String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  const pts    = sd.pts    || [];
  const ptsSec = sd.ptsSec || sd.pts || [];
  const kws    = sd.kws    || [];
  const sz     = sd.sz     || 5;
  const szSec  = sd.szSec  || 5;

  function rankColor(r) { if (r === null) return '#9ca3af'; if (r <= 3) return '#22c55e'; if (r <= 7) return '#84cc16'; if (r <= 10) return '#f59e0b'; if (r <= 20) return '#ef4444'; return '#7c3aed'; }
  function rankBg(r)    { if (r === null) return '#f3f4f6'; if (r <= 3) return '#dcfce7'; if (r <= 7) return '#ecfccb'; if (r <= 10) return '#fef9c3'; if (r <= 20) return '#fee2e2'; return '#e6f7f6'; }
  function getZone(i, sz, hl) {
    if (hl && (hl.n || hl.s || hl.w || hl.e)) {
      const row = Math.floor(i / sz), col = i % sz, mid = Math.floor(sz / 2);
      if (row === mid && col === mid) return hl.n || hl.s || hl.w || hl.e || 'Center';
      const dN = row, dS = sz - 1 - row, dW = col, dE = sz - 1 - col;
      const minD = Math.min(dN, dS, dW, dE);
      if (minD === dN && hl.n) return hl.n;
      if (minD === dS && hl.s) return hl.s;
      if (minD === dW && hl.w) return hl.w;
      if (minD === dE && hl.e) return hl.e;
      if (row < mid && col < mid) return hl.w || hl.n || '';
      if (row < mid && col > mid) return hl.e || hl.n || '';
      if (row > mid && col < mid) return hl.w || hl.s || '';
      return hl.e || hl.s || '';
    }
    const row = Math.floor(i / sz), col = i % sz, mid = Math.floor(sz / 2);
    const rl = row < mid ? 'North' : row > mid ? 'South' : 'Central';
    const cl = col < mid ? 'West'  : col > mid ? 'East'  : '';
    if (row === mid && col === mid) return 'Center';
    return (rl + (cl ? ' ' + cl : '')).trim();
  }
  function gradeLabel(vis, top3Pct) {
    if (vis >= 0.7 && top3Pct >= 0.4) return { g: 'Strong',   c: '#F06478', bg: '#FAE8E0' };
    if (vis >= 0.4)                   return { g: 'Moderate', c: '#f59e0b', bg: '#fef9c3' };
    return                                   { g: 'Limited',  c: '#ef4444', bg: '#fee2e2' };
  }
  function miniGrid(ptsArr, kw, sz, cs) {
    cs = cs || 48;
    let g = '<table cellpadding="0" cellspacing="0" style="margin:0 auto;border-collapse:separate;border-spacing:4px;"><tr>';
    ptsArr.forEach((pt, i) => {
      if (i > 0 && i % sz === 0) g += '</tr><tr>';
      const r   = pt.rk && pt.rk[kw] !== undefined ? pt.rk[kw] : null;
      const bg  = rankBg(r);
      const clr = rankColor(r);
      const borderStyle = pt.ctr ? '3px solid #F06478' : '2px solid ' + clr;
      const rankTxt = r === null ? '&mdash;' : '#' + r;
      const inner = pt.ctr
        ? '<div style="font-size:8px;font-weight:800;color:#F06478;line-height:1;margin-bottom:2px;letter-spacing:.02em;">&#9733; YOU</div><div style="font-size:13px;font-weight:900;color:' + clr + ';line-height:1;">' + rankTxt + '</div>'
        : '<div style="font-size:14px;font-weight:900;color:' + clr + ';line-height:1;">' + rankTxt + '</div>';
      g += '<td style="width:' + cs + 'px;height:' + cs + 'px;background:' + bg + ';border:' + borderStyle + ';border-radius:10px;text-align:center;vertical-align:middle;">' + inner + '</td>';
    });
    g += '</tr></table>';
    return g;
  }
  function kwStats(kw) {
    const kwIdx = kws.indexOf(kw);
    const arr = kwIdx > 0 ? ptsSec : pts;
    const sizeA = kwIdx > 0 ? szSec : sz;
    const ranks = arr.map(p => p.rk[kw]).filter(r => r !== null);
    const top3 = ranks.filter(r => r <= 3).length;
    const found = ranks.length, total = arr.length, invisible = total - found;
    const avg = ranks.length ? ranks.reduce((a, b) => a + b, 0) / ranks.length : null;
    const mid = Math.floor(sizeA / 2);
    const innerR = [], outerR = [];
    arr.forEach((pt, i) => {
      const row = Math.floor(i / sizeA), col = i % sizeA;
      if (Math.abs(row - mid) <= 1 && Math.abs(col - mid) <= 1 && pt.rk[kw] !== null) innerR.push(pt.rk[kw]);
      if ((Math.abs(row - mid) > 1 || Math.abs(col - mid) > 1) && pt.rk[kw] !== null) outerR.push(pt.rk[kw]);
    });
    const weakZones = [], strongZones = [], seen = {};
    arr.forEach((pt, i) => {
      const r = pt.rk[kw], z = getZone(i, sizeA, sd.hoodLabels);
      if (!seen[z]) { seen[z] = true; if (r !== null && r <= 3) strongZones.push(z); else if (r === null || r > 10) weakZones.push(z); }
    });
    return {
      ranks, top3, found, total, invisible, avg,
      vis: found / total, top3Pct: top3 / total,
      weakZones, strongZones,
      innerAvg: innerR.length ? innerR.reduce((a, b) => a + b) / innerR.length : null,
      outerAvg: outerR.length ? outerR.reduce((a, b) => a + b) / outerR.length : null,
    };
  }

  const allStats     = kws.map(kw => ({ kw, s: kwStats(kw) }));
  const totalAreas   = pts.length;
  const overallFound = Math.round(allStats.reduce((a, x) => a + x.s.found, 0) / kws.length);
  const overallTop3  = Math.round(allStats.reduce((a, x) => a + x.s.top3,  0) / kws.length);
  const visStats     = allStats.filter(x => x.s.avg !== null);
  const overallAvg   = visStats.length ? visStats.reduce((a, x) => a + x.s.avg, 0) / visStats.length : null;
  const overallGrade = gradeLabel(overallFound / totalAreas, overallTop3 / totalAreas);

  // EXEC SUMMARY (lite — full one is in buildReportEmail)
  let execSummary = '';

  // KW SECTION
  let kwSection = '';
  kws.forEach(kw => {
    const s = kwStats(kw);
    const gl = gradeLabel(s.vis, s.top3Pct);
    const gradeIcon = gl.g === 'Strong' ? '&#9650;' : gl.g === 'Moderate' ? '&#9670;' : '&#9660;';
    const isSecondary = kws.indexOf(kw) > 0;
    const kwPts  = isSecondary ? ptsSec : pts;
    const kwSz   = isSecondary ? szSec  : sz;
    const visPct = Math.round(s.vis * 100);
    const visBarColor = '#F06478';

    kwSection += '<tr><td style="background:#FAF7F4;padding:14px 28px 18px;">';
    kwSection += '<div style="background:#FDF5F2;border:1px solid #EDD8D0;border-left:4px solid ' + gl.c + ';border-radius:0 12px 12px 0;padding:18px 20px;">';
    kwSection += '<div style="margin-bottom:16px;">';
    kwSection += '<div style="font-size:16px;font-weight:900;color:#1a1a2e;margin-bottom:8px;">' + eH(kw) + '</div>';
    kwSection += '<table cellpadding="0" cellspacing="0"><tr>';
    kwSection += '<td style="vertical-align:middle;padding-right:10px;">';
    kwSection += '<span style="display:inline-block;background:' + gl.bg + ';color:' + gl.c + ';font-size:10px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;padding:3px 10px;border-radius:20px;">' + gradeIcon + ' ' + gl.g + '</span>';
    kwSection += '</td>';
    kwSection += '<td style="vertical-align:middle;font-size:11px;color:#9ca3af;">';
    kwSection += s.found + ' of ' + s.total + ' areas visible &nbsp;·&nbsp; ' + s.top3 + ' in top 3';
    if (s.avg) kwSection += ' &nbsp;·&nbsp; avg #' + s.avg.toFixed(1);
    kwSection += '</td></tr></table>';
    kwSection += '</div>';

    const statCards = [
      { val: s.top3, label: 'Top 3', color: '#F06478' },
      { val: visPct + '%', label: 'Visible', color: '#F06478' },
      { val: s.avg ? '#' + s.avg.toFixed(1) : '—', label: 'Avg rank', color: '#6b7280' },
      { val: s.invisible, label: 'Invisible', color: s.invisible > s.total / 2 ? '#ef4444' : '#f59e0b' },
    ];
    kwSection += '<table cellpadding="0" cellspacing="0" width="100%" style="margin-bottom:16px;border-collapse:separate;border-spacing:8px 0;"><tr>';
    statCards.forEach(sc => {
      kwSection += '<td width="25%" style="background:#ffffff;border:1px solid #EDD8D0;border-radius:10px;padding:10px 8px;text-align:center;vertical-align:middle;">';
      kwSection += '<div style="font-size:20px;font-weight:900;color:' + sc.color + ';line-height:1;margin-bottom:4px;">' + sc.val + '</div>';
      kwSection += '<div style="font-size:9px;color:#9ca3af;text-transform:uppercase;letter-spacing:.05em;font-weight:700;">' + sc.label + '</div>';
      kwSection += '</td>';
    });
    kwSection += '</tr></table>';

    kwSection += '<table cellpadding="0" cellspacing="0" width="100%" style="margin-bottom:16px;">';
    kwSection += '<tr><td style="font-size:11px;color:#6b7280;padding-bottom:5px;">Visibility across ' + sd.rad + '-mile service area</td>';
    kwSection += '<td style="font-size:11px;font-weight:800;color:#1a1a2e;text-align:right;padding-bottom:5px;">' + visPct + '% visible</td></tr>';
    kwSection += '<tr><td colspan="2" style="padding:0;">';
    kwSection += '<table cellpadding="0" cellspacing="0" width="100%" style="background:#EDD8D0;border-radius:4px;height:8px;"><tr>';
    kwSection += '<td width="' + visPct + '%" style="background:' + visBarColor + ';border-radius:4px;height:8px;"></td>';
    kwSection += '<td></td></tr></table>';
    kwSection += '</td></tr></table>';

    const hl = sd.hoodLabels || {};
    const labelStyle = 'font-size:10px;font-weight:800;color:#8B6070;letter-spacing:.04em;text-align:center;padding:4px 0;';
    const sideStyle  = 'font-size:10px;font-weight:800;color:#8B6070;writing-mode:vertical-rl;';
    kwSection += '<table cellpadding="0" cellspacing="0" style="margin:0 auto 14px;">';
    if (hl.n) kwSection += '<tr><td></td><td style="' + labelStyle + '">' + eH(hl.n) + '</td><td></td></tr>';
    kwSection += '<tr>';
    if (hl.w) kwSection += '<td style="padding-right:6px;"><div style="' + sideStyle + 'transform:rotate(180deg);">' + eH(hl.w) + '</div></td>';
    else kwSection += '<td></td>';
    kwSection += '<td>' + miniGrid(kwPts, kw, kwSz, 48) + '</td>';
    if (hl.e) kwSection += '<td style="padding-left:6px;"><div style="' + sideStyle + '">' + eH(hl.e) + '</div></td>';
    else kwSection += '<td></td>';
    kwSection += '</tr>';
    if (hl.s) kwSection += '<tr><td></td><td style="' + labelStyle + '">' + eH(hl.s) + '</td><td></td></tr>';
    kwSection += '</table>';

    const legendItems = [
      { bg:'#dcfce7', border:'#22c55e', label:'#1–3' },
      { bg:'#ecfccb', border:'#84cc16', label:'#4–7' },
      { bg:'#fef9c3', border:'#f59e0b', label:'#8–10' },
      { bg:'#fee2e2', border:'#ef4444', label:'#11–20' },
      { bg:'#f3f4f6', border:'#d1d5db', label:'Not found' },
      { bg:'#f3f4f6', border:'#F06478', label:'Your location', borderW:'2px' },
    ];
    kwSection += '<table cellpadding="0" cellspacing="0" style="margin:0 auto 14px;"><tr>';
    legendItems.forEach(li => {
      kwSection += '<td style="padding:0 7px;text-align:center;white-space:nowrap;">';
      kwSection += '<table cellpadding="0" cellspacing="0" style="display:inline-table;"><tr>';
      kwSection += '<td style="width:10px;height:10px;background:' + li.bg + ';border:' + (li.borderW || '1.5px') + ' solid ' + li.border + ';border-radius:2px;vertical-align:middle;"></td>';
      kwSection += '<td style="font-size:10px;color:#6b7280;font-weight:600;padding-left:4px;vertical-align:middle;">' + li.label + '</td>';
      kwSection += '</tr></table></td>';
    });
    kwSection += '</tr></table>';

    if (s.weakZones.length > 0) {
      kwSection += '<div style="background:#FAE8E0;border-left:3px solid #F06478;border-radius:0 8px 8px 0;padding:10px 14px;font-size:11px;color:#374151;">';
      kwSection += '<strong style="color:#D94060;">Weak zones:</strong> ' + s.weakZones.join(', ') + '. These are the areas that need the most work.';
      kwSection += '</div>';
    }
    kwSection += '</div></td></tr>';
  });

  // COMPETITORS
  let compSection = '<tr><td style="background:#FAF7F4;padding:14px 28px 18px;">';
  const primaryKw = kws[0];
  const topComps = (sd.compsByKw && sd.compsByKw[primaryKw]) || [];
  if (!topComps.length) {
    compSection += '<div style="text-align:center;padding:24px;color:#6b7280;font-size:13px;background:#fafafa;border:1px solid #e8e8e8;border-radius:12px;">No competitor data available — Google Maps returned limited results for this keyword.</div>';
  }
  topComps.slice(0, 3).forEach((comp, ci) => {
    const compPts = pts.map(pt => {
      const rawComps = pt.comps && pt.comps[primaryKw];
      let rank = null;
      if (Array.isArray(rawComps)) {
        const f = rawComps.find(c => c.norm === comp.norm);
        rank = f ? f.rank : null;
      } else if (rawComps && typeof rawComps === 'object') {
        rank = rawComps[comp.norm] !== undefined ? rawComps[comp.norm] : null;
      }
      return { rk: { [primaryKw]: rank }, ctr: false };
    });
    const compRanks = compPts.map(p => p.rk[primaryKw]).filter(r => r !== null);
    const compTop3   = compRanks.filter(r => r <= 3).length;
    const compVisible = compRanks.length;
    const compAvg = compRanks.length ? (compRanks.reduce((a, b) => a + b) / compRanks.length).toFixed(1) : comp.avg.toFixed(1);
    const compVisRatio = compVisible / pts.length, compTop3Ratio = compTop3 / pts.length;
    const compGrade = compVisRatio >= 0.7 && compTop3Ratio >= 0.4
      ? { g: 'Strong', c: '#22c55e', bg: '#dcfce7' }
      : compVisRatio >= 0.4 ? { g: 'Moderate', c: '#f59e0b', bg: '#fef9c3' }
      : { g: 'Limited', c: '#ef4444', bg: '#fee2e2' };

    compSection += '<div style="background:#ffffff;border:1px solid #e8e8e8;border-radius:12px;padding:16px;margin-bottom:12px;">';
    compSection += '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;"><div>';
    compSection += '<div style="font-size:13px;font-weight:800;color:#1a1a2e;">' + (ci + 1) + '. ' + eH(comp.n) + '</div>';
    compSection += '<div style="font-size:11px;color:#6b7280;margin-top:3px;">Visible in <strong>' + compVisible + '</strong> of ' + pts.length + ' areas &middot; Top 3 in <strong>' + compTop3 + '</strong> &middot; Avg rank <strong>#' + compAvg + '</strong></div>';
    compSection += '</div>';
    compSection += '<span style="background:' + compGrade.bg + ';color:' + compGrade.c + ';border:1px solid ' + compGrade.c + '40;padding:3px 10px;border-radius:10px;font-size:11px;font-weight:700;flex-shrink:0;margin-left:8px;">' + compGrade.g + '</span>';
    compSection += '</div>';
    compSection += '<div style="text-align:center;">' + miniGrid(compPts, primaryKw, sz, 38) + '</div>';
    compSection += '<div style="font-size:10px;color:#9ca3af;text-align:center;margin-top:8px;"><span style="color:#22c55e;">&#9632;</span> #1-3 &nbsp;<span style="color:#84cc16;">&#9632;</span> #4-7 &nbsp;<span style="color:#f59e0b;">&#9632;</span> #8-10 &nbsp;<span style="color:#ef4444;">&#9632;</span> #11-20 &nbsp;<span style="color:#9ca3af;">&#9632;</span> Not in top 20</div>';
    compSection += '</div>';
  });
  compSection += '</td></tr>';

  // STRATEGY
  let stratSection = '<tr><td style="padding:8px 32px 0;">';
  stratSection += '<div style="background:#FEFAF8;border:1px solid #EDD8D0;border-radius:12px;padding:20px 24px;margin-bottom:12px;">';
  stratSection += '<div style="font-size:13px;font-weight:800;color:#1a1a2e;margin-bottom:12px;">Your 3 Biggest Opportunities</div>';
  const targetZones = [...new Set(allStats.flatMap(x => x.s.weakZones))];
  const opps = [];
  if (totalAreas - overallFound > 0) opps.push({
    title: "You're invisible in " + (targetZones.slice(0, 2).join(' & ') || 'parts of your service area'),
    desc: 'Customers in ' + (totalAreas - overallFound) + " areas can't find you on Google Maps at all — they're calling your competitors instead.",
  });
  if (overallTop3 < totalAreas * 0.4) opps.push({
    title: 'Move up to the top 3',
    desc: "You appear in searches, but you're not in the top 3 in most areas. The top 3 results get 75%+ of clicks. Ranking #7 is nearly as bad as not ranking at all.",
  });
  if (topComps.length) opps.push({
    title: 'Take back customers from ' + eH(topComps[0].n),
    desc: eH(topComps[0].n) + ' is ranking #' + (topComps[0].avg?.toFixed(1) || '?') + " across your whole service area — here's how you can outrank them.",
  });
  opps.slice(0, 3).forEach(opp => {
    stratSection += '<div style="display:flex;gap:12px;margin-bottom:14px;"><div style="font-size:20px;flex-shrink:0;"></div><div><div style="font-size:12px;font-weight:800;color:#1a1a2e;margin-bottom:3px;">' + opp.title + '</div><div style="font-size:11px;color:#6b7280;line-height:1.6;">' + opp.desc + '</div></div></div>';
  });
  stratSection += '</div></td></tr>';

  return { execSummary, kwSection, stratSection, compSection };
}

function buildReportEmail(sd, audit, sections, prospectName) {
  const eH = (s) => String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  const date = new Date().toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
  const catScores = crocsReport.computeAuditScores(audit);
  if (audit && catScores && !catScores.blocked && audit.healthScore !== null) {
    audit = { ...audit, healthScore: catScores.overallScore };
  }

  const sc = (n) => n == null ? '#9ca3af' : n >= 80 ? '#22c55e' : n >= 55 ? '#f59e0b' : '#ef4444';
  const sb = (n) => n == null ? '#f3f4f6' : n >= 80 ? '#dcfce7' : n >= 55 ? '#fef9c3' : '#fee2e2';
  const sl = (n) => n == null ? 'Blocked' : n >= 80 ? 'Strong' : n >= 55 ? 'Fair' : 'Weak';

  function sectionHeader(title, num) {
    return `<tr><td style="background:#FAF7F4;height:8px;font-size:0;line-height:0;">&nbsp;</td></tr>
    <tr><td style="background:#ffffff;padding:22px 28px 0;">
      <table cellpadding="0" cellspacing="0" width="100%"><tr>
        <td style="width:3px;background:#F06478;border-radius:2px;vertical-align:top;padding:0;"><div style="width:3px;height:20px;background:#F06478;border-radius:2px;"></div></td>
        <td style="padding-left:10px;vertical-align:middle;">
          <div style="font-size:9px;color:#F06478;font-weight:800;text-transform:uppercase;letter-spacing:.1em;">${num} ${title}</div>
        </td>
      </tr></table>
      <div style="height:1.5px;background:linear-gradient(90deg,#F06478,#FAE8E0,transparent);margin-top:10px;margin-bottom:0;border-radius:1px;"></div>
    </td></tr>`;
  }
  function scoreBar(label, score) {
    const c = sc(score), bg = sb(score), lbl = sl(score);
    const barW = score + '%';
    const barColor = score >= 80 ? 'linear-gradient(90deg,#22c55e,#4ade80)' : score >= 55 ? 'linear-gradient(90deg,#f59e0b,#fbbf24)' : 'linear-gradient(90deg,#ef4444,#f87171)';
    return `<div style="margin-bottom:16px;">
      <table cellpadding="0" cellspacing="0" width="100%" style="margin-bottom:5px;"><tr>
        <td style="font-size:12px;font-weight:700;color:#1a1a2e;">${label}</td>
        <td style="text-align:right;white-space:nowrap;">
          <span style="font-size:10px;font-weight:700;color:${c};background:${bg};padding:2px 8px;border-radius:10px;">${lbl}</span>
          &nbsp;<span style="font-family:monospace;font-size:13px;font-weight:900;color:${c};">${score}/100</span>
        </td>
      </tr></table>
      <div style="background:#f3f4f6;border-radius:4px;height:8px;overflow:hidden;"><div style="height:8px;width:${barW};background:${barColor};border-radius:4px;"></div></div>
    </div>`;
  }

  // ─── SECTION 1: EXECUTIVE SUMMARY ────────────────────────────────────
  const kw0 = sd.kws[0];
  const pts0 = sd.pts || [];
  const allRanks = pts0.map(p => p.rk[kw0]).filter(r => r !== null);
  const top3Count = allRanks.filter(r => r <= 3).length;
  const invisCount = pts0.length - allRanks.length;
  const avgRank = allRanks.length ? (allRanks.reduce((a, b) => a + b) / allRanks.length).toFixed(1) : null;
  const visPct = Math.round(allRanks.length / pts0.length * 100);
  const overallGrade = visPct >= 70 && (top3Count / pts0.length) >= 0.4
    ? { g: 'Strong',   c: '#F06478', bg: '#FAE8E0' }
    : visPct >= 40
      ? { g: 'Moderate', c: '#f59e0b', bg: '#fef9c3' }
      : { g: 'Limited',  c: '#ef4444', bg: '#fee2e2' };

  const execSummarySection = `
  <tr><td style="background:#FAF7F4;padding:14px 28px 16px;">
    <table width="100%" cellpadding="0" cellspacing="0"><tr>
      <td width="48%" style="vertical-align:top;padding-right:8px;">
        <div style="background:${overallGrade.bg};border:2px solid ${overallGrade.c};border-radius:14px;padding:18px 16px;text-align:center;height:100%;box-sizing:border-box;">
          <div style="font-size:10px;font-weight:800;color:${overallGrade.c};text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;">Google Maps Ranking</div>
          <div style="font-size:44px;font-weight:900;color:${overallGrade.c};line-height:1;margin-bottom:4px;">${overallGrade.g}</div>
          <div style="font-size:11px;color:#6b7280;">5&times;5 &middot; 2 keywords &middot; ${sd.rad}mi radius</div>
        </div>
      </td>
      <td width="48%" style="vertical-align:top;padding-left:8px;">
        ${audit ? `<div style="background:${sb(audit.healthScore)};border:2px solid ${sc(audit.healthScore)};border-radius:14px;padding:18px 16px;text-align:center;">
          <div style="font-size:10px;font-weight:800;color:${sc(audit.healthScore)};text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;">Website Score</div>
          ${audit.crawlBlocked || audit.healthScore === null

  // ─── SECTION 3: STRATEGIC ANALYSIS (priority pills) ─────────────────
  const _kwsSd = sd.kws || [];

// Orchestrator: runs grid scan + audit + builds HTML + sends via Worker.
// Returns { ok, messageId, error }.
async function runAutoReportForAccount(account, { contact, sendTo, prospectName, dispatch }) {
  // 1. Validate inputs
  if (!sendTo || !sendTo.includes('@')) return { ok: false, error: 'No recipient email' };

  // 2. Derive keywords
  const kws = crocsReport.deriveKeywords(account);
  if (!kws.length) return { ok: false, error: 'No keywords derivable from account' };

  // 3. Resolve business location (cached or fresh lookup)
  let biz;
  try { biz = await crocsReport.resolveBusinessLocation(account, dispatch); }
  catch (e) { return { ok: false, error: 'GBP lookup: ' + e.message }; }

  // 4. Run grid scan + site audit in parallel
  const domain = (account.website || '').replace(/^https?:\/\//, '').replace(/^www\./, '').split('/')[0];
  const [gridSettled, auditSettled] = await Promise.allSettled([
    crocsReport.runGridScan(biz, kws, 5),
    domain ? crocsReport.runSiteAudit(domain) : Promise.resolve(null),
  ]);
  if (gridSettled.status !== 'fulfilled' || !gridSettled.value?.pts?.length) {
    return { ok: false, error: 'Grid scan failed: ' + (gridSettled.reason?.message || 'no data') };
  }
  const grid  = gridSettled.value;
  const audit = auditSettled.status === 'fulfilled' ? auditSettled.value : null;

  // 5. Build HTML
  const sections = buildReportGridSections(grid);
  const html     = buildReportEmail(grid, audit, sections, prospectName);

  // 6. Send via Worker → Resend
  const subject = `${new Date().toLocaleDateString('en-US', { month: 'long' })} SEO Report — Croc's & Clicks`;
  try {
    const sent = await crocsReport.workerPost('/send-html-email', {
      to: sendTo,
      name: prospectName || '',
      subject,
      html,
      biz: account.name,
    });
    return { ok: true, messageId: sent.id || null, subject };
  } catch (e) {
    return { ok: false, error: 'Send: ' + e.message };
  }
}

/* =====================================================================
   GMAIL — reuses the same Google OAuth token as gcal (one consent grants
   both calendar.events + gmail.send + gmail.readonly).
   ===================================================================== */
const gmail = {
  // base64url encoding for the raw RFC2822 message body
  encodeRaw(str) {
    // UTF-8 safe encoding via TextEncoder, then base64url
    const bytes = new TextEncoder().encode(str);
    let bin = '';
    for (const b of bytes) bin += String.fromCharCode(b);
    return btoa(bin).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
  },

  buildRawMessage({ to, from, subject, body, replyToMessageId, references }) {
    const headers = [
      `To: ${to}`,
      from ? `From: ${from}` : null,
      `Subject: ${subject || '(no subject)'}`,
      'MIME-Version: 1.0',
      'Content-Type: text/plain; charset=UTF-8',
      replyToMessageId ? `In-Reply-To: <${replyToMessageId}>` : null,
      references ? `References: <${references}>` : null,
    ].filter(Boolean).join('\r\n');
    return this.encodeRaw(`${headers}\r\n\r\n${body || ''}`);
  },

  async apiFetch(path, { method = 'GET', body = null, query = null } = {}) {
    const token = await gcal.getAccessToken();
    const url = new URL('https://gmail.googleapis.com/gmail/v1' + path);
    if (query) Object.entries(query).forEach(([k, v]) => v != null && url.searchParams.append(k, v));
    const res = await fetch(url.toString(), {
      method,
      headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
      body: body ? JSON.stringify(body) : null,
    });
    if (res.status === 401) {
      gcal.clearToken();
      throw new Error('Google session expired — click Reconnect Google.');
    }
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error?.message || `Gmail API error ${res.status}`);
    }
    if (res.status === 204) return null;
    return res.json();
  },

  // Send a new email or a reply if threadId is provided.
  async send({ to, subject, body, threadId = null, replyToMessageId = null }) {
    const raw = this.buildRawMessage({
      to, subject, body, replyToMessageId, references: replyToMessageId,
    });
    return this.apiFetch('/users/me/messages/send', {
      method: 'POST',
      body: threadId ? { raw, threadId } : { raw },
    });
  },

  // Fetch all messages in a thread; returns parsed headers + bodies.
  async getThread(threadId) {
    const data = await this.apiFetch(`/users/me/threads/${threadId}`, {
      query: { format: 'full' },
    });
    const messages = (data.messages || []).map(m => this.parseMessage(m));
    return { id: data.id, messages };
  },

  // Pull a Gmail message into a simple shape: { id, threadId, from, to, subject, snippet, body, internalDate }
  parseMessage(msg) {
    const headers = Object.fromEntries((msg.payload?.headers || []).map(h => [h.name.toLowerCase(), h.value]));
    return {
      id: msg.id,
      threadId: msg.threadId,
      from: headers.from || '',
      to: headers.to || '',
      subject: headers.subject || '',
      snippet: msg.snippet || '',
      body: this.extractBody(msg.payload),
      internalDate: msg.internalDate ? new Date(parseInt(msg.internalDate, 10)) : null,
    };
  },

  extractBody(payload) {
    if (!payload) return '';
    if (payload.body?.data) {
      try { return this.decodeBase64Url(payload.body.data); } catch { return ''; }
    }
    for (const part of (payload.parts || [])) {
      if (part.mimeType === 'text/plain' && part.body?.data) {
        try { return this.decodeBase64Url(part.body.data); } catch {}
      }
    }
    for (const part of (payload.parts || [])) {
      const nested = this.extractBody(part);
      if (nested) return nested;
    }
    return '';
  },

  decodeBase64Url(s) {
    const padded = s.replace(/-/g, '+').replace(/_/g, '/');
    return new TextDecoder('utf-8').decode(Uint8Array.from(atob(padded + '==='.slice((padded.length + 3) % 4)), c => c.charCodeAt(0)));
  },
};

function parseHash(hash) {
  const h = (hash || '').replace(/^#\/?/, '');
  if (!h || h === 'accounts') return { name: 'list', tab: 'accounts' };
  if (h === 'contacts') return { name: 'list', tab: 'contacts' };
  if (h === 'tasks') return { name: 'list', tab: 'tasks' };
  if (h === 'activity' || h === 'calls') return { name: 'list', tab: 'activity' };
  if (h === 'cadence' || h === 'cadences') return { name: 'list', tab: 'cadence' };
  if (h === 'dashboard') return { name: 'list', tab: 'dashboard' };
  if (h === 'calendar') return { name: 'calendar' };
  const m = h.match(/^accounts\/([0-9a-fA-F-]{36})$/);
  if (m) return { name: 'detail', accountId: m[1] };
  return { name: 'list', tab: 'accounts' };
}

function appReducer(state, action) {
  switch (action.type) {
    case 'AUTH_READY':       return { ...state, authReady: true, user: action.user, profile: action.profile };
    case 'SET_PROFILE':      return { ...state, profile: action.profile };
    case 'SET_PROFILES':     return { ...state, profiles: action.profiles };
    case 'LOAD_ACCOUNTS':    return { ...state, accounts: action.accounts };
    case 'UPSERT_ACCOUNT': {
      const i = state.accounts.findIndex(a => a.id === action.account.id);
      const next = state.accounts.slice();
      if (i >= 0) next[i] = { ...next[i], ...action.account };
      else next.unshift(action.account);
      return { ...state, accounts: next };
    }
    case 'REMOVE_ACCOUNT':   return { ...state, accounts: state.accounts.filter(a => a.id !== action.id) };
    case 'SET_FILTERS':      return { ...state, filters: { ...state.filters, ...action.filters } };
    case 'RESET_FILTERS':    return { ...state, filters: initialState.filters };
    case 'SET_SORT':         return { ...state, sort: action.sort };
    case 'TOGGLE_SELECT': {
      const has = state.selectedIds.includes(action.id);
      return { ...state, selectedIds: has ? state.selectedIds.filter(x => x !== action.id) : [...state.selectedIds, action.id] };
    }
    case 'SET_SELECTION':    return { ...state, selectedIds: action.ids };
    case 'CLEAR_SELECTION':  return { ...state, selectedIds: [] };
    case 'SET_COLS':         return { ...state, columnVisibility: action.cols };
    case 'SET_LOADING':      return { ...state, loading: action.loading };
    case 'SET_TOAST':        return { ...state, toast: action.toast };
    case 'OPEN_MODAL':       return { ...state, modal: action.modal, modalProps: action.props || {} };
    case 'CLOSE_MODAL':      return { ...state, modal: null, modalProps: {} };
    case 'LOAD_CONTACTS':    return { ...state, contacts: { ...state.contacts, [action.accountId]: action.contacts } };
    case 'LOAD_ACTIVITIES':  return { ...state, activities: { ...state.activities, [action.accountId]: action.activities } };
    case 'ADD_CONTACT': {
      const arr = state.contacts[action.contact.account_id] || [];
      return { ...state, contacts: { ...state.contacts, [action.contact.account_id]: [...arr, action.contact] } };
    }
    case 'UPDATE_CONTACT': {
      const arr = state.contacts[action.contact.account_id] || [];
      return { ...state, contacts: { ...state.contacts, [action.contact.account_id]: arr.map(c => c.id === action.contact.id ? action.contact : c) } };
    }
    case 'REMOVE_CONTACT': {
      const arr = state.contacts[action.accountId] || [];
      return { ...state, contacts: { ...state.contacts, [action.accountId]: arr.filter(c => c.id !== action.id) } };
    }
    case 'ADD_ACTIVITY': {
      const arr = state.activities[action.activity.account_id] || [];
      return {
        ...state,
        activities: { ...state.activities, [action.activity.account_id]: [action.activity, ...arr] },
        allActivities: [action.activity, ...state.allActivities],
      };
    }
    case 'SET_SAVED_VIEWS':  return { ...state, savedViews: action.views };
    case 'SET_ROUTE':        return { ...state, route: action.route };
    case 'SET_GOOGLE':       return { ...state, googleConnected: !!action.connected };
    case 'SET_ALL_CONTACTS': return { ...state, allContacts: action.contacts };
    case 'UPSERT_ALL_CONTACT': {
      const i = state.allContacts.findIndex(c => c.id === action.contact.id);
      const next = state.allContacts.slice();
      if (i >= 0) next[i] = action.contact;
      else next.unshift(action.contact);
      return { ...state, allContacts: next };
    }
    case 'REMOVE_ALL_CONTACT': return { ...state, allContacts: state.allContacts.filter(c => c.id !== action.id) };
    case 'SET_CONTACT_FILTERS':   return { ...state, contactFilters: { ...state.contactFilters, ...action.filters } };
    case 'RESET_CONTACT_FILTERS': return { ...state, contactFilters: initialState.contactFilters };
    case 'SET_CONTACT_SORT':      return { ...state, contactSort: action.sort };
    case 'TOGGLE_CONTACT_SELECT': {
      const has = state.contactSelectedIds.includes(action.id);
      return { ...state, contactSelectedIds: has ? state.contactSelectedIds.filter(x => x !== action.id) : [...state.contactSelectedIds, action.id] };
    }
    case 'SET_CONTACT_SELECTION':   return { ...state, contactSelectedIds: action.ids };
    case 'CLEAR_CONTACT_SELECTION': return { ...state, contactSelectedIds: [] };
    case 'APPLY_CONTACT_VIEW':      return { ...state, contactFilters: { ...initialState.contactFilters, ...action.filters }, contactSort: action.sort || state.contactSort };

    case 'SET_ALL_TASKS': return { ...state, allTasks: action.tasks };
    case 'UPSERT_TASK': {
      const i = state.allTasks.findIndex(t => t.id === action.task.id);
      const next = state.allTasks.slice();
      if (i >= 0) next[i] = { ...next[i], ...action.task };

      return { ...state, allTasks: next };

      const has = state.taskSelectedIds.includes(action.id);
      return { ...state, taskSelectedIds: has ? state.taskSelectedIds.filter(x => x !== action.id) : [...state.taskSelectedIds, action.id] };
    }
    case 'SET_TASK_SELECTION':   return { ...state, taskSelectedIds: action.ids };
    case 'CLEAR_TASK_SELECTION': return { ...state, taskSelectedIds: [] };
    case 'APPLY_TASK_VIEW':      return { ...state, taskFilters: { ...initialState.taskFilters, ...action.filters }, taskSort: action.sort || state.taskSort };
    case 'APPLY_VIEW':       return { ...state, filters: { ...initialState.filters, ...action.filters }, sort: action.sort || state.sort };

    case 'SET_ALL_CALLS': return { ...state, allCalls: action.calls };
    case 'UPSERT_CALL': {
      const i = state.allCalls.findIndex(c => c.id === action.call.id);
      const next = state.allCalls.slice();
      if (i >= 0) next[i] = { ...next[i], ...action.call };
      else next.unshift(action.call);
      return { ...state, allCalls: next };
    }
    case 'REMOVE_CALL': return { ...state, allCalls: state.allCalls.filter(c => c.id !== action.id) };

    case 'SET_STAGE_CHANGES': return { ...state, stageChanges: action.changes };

    case 'START_DIAL_QUEUE': {
      return {
        ...state,
        dialerQueue: {
          items: action.items,
          position: 0,
          status: 'starting',
          source: action.source || 'accounts',
          outcomeCounts: { no_answer: 0, voicemail: 0, interested: 0, not_interested: 0, bad_number: 0, callback: 0 },
        },
        dialerPanelOpen: true,
      };
    }
    case 'ADVANCE_DIAL_QUEUE': {
      if (!state.dialerQueue) return state;
      const nextPos = state.dialerQueue.position + 1;
      const atEnd = nextPos >= state.dialerQueue.items.length;
      return {
        ...state,
        dialerQueue: {
          ...state.dialerQueue,
          position: atEnd ? state.dialerQueue.position : nextPos,
          status: atEnd ? 'done' : 'starting',
        },
      };
    }
    case 'PAUSE_DIAL_QUEUE':
      return state.dialerQueue ? { ...state, dialerQueue: { ...state.dialerQueue, status: 'paused' } } : state;
    case 'RESUME_DIAL_QUEUE':
      return state.dialerQueue ? { ...state, dialerQueue: { ...state.dialerQueue, status: 'starting' } } : state;
    case 'STOP_DIAL_QUEUE':
      return { ...state, dialerQueue: null };
    case 'LOG_DIAL_OUTCOME': {
      if (!state.dialerQueue) return state;
      const counts = { ...state.dialerQueue.outcomeCounts };
      counts[action.outcome] = (counts[action.outcome] || 0) + 1;
      return { ...state, dialerQueue: { ...state.dialerQueue, outcomeCounts: counts } };
    }
    case 'TOGGLE_DIALER_PANEL':
      return { ...state, dialerPanelOpen: !state.dialerPanelOpen };
    case 'SET_DIALER_PANEL_OPEN':
      return { ...state, dialerPanelOpen: !!action.open };

    case 'SET_CADENCES':       return { ...state, cadences: action.cadences };
    case 'SET_CADENCE_STEPS':  return { ...state, cadenceSteps: action.steps };
    case 'SET_CADENCE_ENROLLMENTS': return { ...state, cadenceEnrollments: action.enrollments };
    case 'UPSERT_CADENCE_ENROLLMENT': {
      const i = state.cadenceEnrollments.findIndex(e => e.id === action.enrollment.id);
      const next = state.cadenceEnrollments.slice();
      if (i >= 0) next[i] = { ...next[i], ...action.enrollment };
      else next.unshift(action.enrollment);
      return { ...state, cadenceEnrollments: next };
    }
    case 'REMOVE_CADENCE_ENROLLMENT':
      return { ...state, cadenceEnrollments: state.cadenceEnrollments.filter(e => e.id !== action.id) };
    case 'SET_CADENCE_EXECUTIONS': return { ...state, cadenceExecutions: action.executions };
    case 'ADD_CADENCE_EXECUTION': return { ...state, cadenceExecutions: [action.execution, ...state.cadenceExecutions] };
    case 'SET_ALL_ACTIVITIES': return { ...state, allActivities: action.activities };
    case 'UPSERT_ALL_ACTIVITY': {
      const i = state.allActivities.findIndex(a => a.id === action.activity.id);
      const next = state.allActivities.slice();
      if (i >= 0) next[i] = { ...next[i], ...action.activity };
      else next.unshift(action.activity);
      return { ...state, allActivities: next };
    }
    case 'SET_ACTIVITY_FILTERS':   return { ...state, activityFilters: { ...state.activityFilters, ...action.filters } };
    case 'RESET_ACTIVITY_FILTERS': return { ...state, activityFilters: initialState.activityFilters };
    case 'SET_ACTIVITY_SORT':      return { ...state, activitySort: action.sort };

    case 'SET_TWILIO': return { ...state, twilio: { ...state.twilio, ...action.twilio } };

    default: return state;
  }
}

/* =====================================================================

   ===================================================================== */
function Pill({ children, className }) {
  return <span className={classNames('inline-flex items-center px-2 py-0.5 rounded text-xs font-medium', className)}>{children}</span>;
}

function Button({ children, variant='primary', size='md', className, ...rest }) {
  const variants = {
    primary: 'bg-blue-600 text-white hover:bg-blue-700',
    secondary: 'bg-white text-gray-800 border border-gray-300 hover:bg-gray-50',
    danger: 'bg-red-600 text-white hover:bg-red-700',
    ghost: 'text-gray-700 hover:bg-gray-100',
  };
  const sizes = { sm: 'px-2.5 py-1 text-xs', md: 'px-3 py-1.5 text-sm', lg: 'px-4 py-2 text-sm' };
  return (
    <button {...rest} className={classNames('rounded font-medium inline-flex items-center gap-1.5 whitespace-nowrap disabled:opacity-50 disabled:cursor-not-allowed', variants[variant], sizes[size], className)}>
      {children}
    </button>
  );
}

function Input({ label, error, className, ...rest }) {
  return (
    <label className="block">
      {label && <span className="block text-xs font-medium text-gray-700 mb-1">{label}</span>}
      <input {...rest} className={classNames('w-full px-2.5 py-1.5 text-sm border border-gray-300 rounded ring-focus', className)} />
      {error && <span className="block text-xs text-red-600 mt-1">{error}</span>}
    </label>
  );
}

function Textarea({ label, ...rest }) {
  return (
    <label className="block">
      {label && <span className="block text-xs font-medium text-gray-700 mb-1">{label}</span>}
      <textarea {...rest} className="w-full px-2.5 py-1.5 text-sm border border-gray-300 rounded ring-focus" />
    </label>
  );
}

function Select({ label, options, includeBlank, blankLabel='—', ...rest }) {
  return (
    <label className="block">
      {label && <span className="block text-xs font-medium text-gray-700 mb-1">{label}</span>}
      <select {...rest} className="w-full px-2.5 py-1.5 text-sm border border-gray-300 rounded bg-white ring-focus">
        {includeBlank && <option value="">{blankLabel}</option>}
        {options.map(o => <option key={o.value} value={o.value}>{o.label}</option>)}
      </select>
    </label>
  );
}

function MultiCheckGroup({ label, options, values, onChange }) {
  function toggle(v) {
    onChange(values.includes(v) ? values.filter(x => x !== v) : [...values, v]);
  }
  return (
    <div>
      <div className="text-xs font-medium text-gray-700 mb-1">{label}</div>
      <div className="space-y-1 max-h-40 overflow-y-auto scrollbar-thin pr-1 border border-gray-200 rounded p-1.5 bg-white">
        {options.map(o => (
          <label key={o.value} className="flex items-center gap-2 text-sm text-gray-800 cursor-pointer">
            <input type="checkbox" checked={values.includes(o.value)} onChange={() => toggle(o.value)} />
            <span>{o.label}</span>
          </label>
        ))}
      </div>
    </div>
  );
}

function Toast() {
  const { state, dispatch } = useApp();
  useEffect(() => {
    if (!state.toast) return;
    const t = setTimeout(() => dispatch({ type: 'SET_TOAST', toast: null }), 4000);
    return () => clearTimeout(t);
  }, [state.toast]);
  if (!state.toast) return null;
  const tone = state.toast.kind === 'error' ? 'bg-red-600' : state.toast.kind === 'warn' ? 'bg-amber-600' : 'bg-gray-900';
  return (
    <div className="fixed top-4 right-4 z-50">
      <div className={classNames('text-white text-sm px-3.5 py-2 rounded shadow-lg max-w-sm', tone)}>
        {state.toast.text}
      </div>
    </div>
  );
}

function notify(dispatch, text, kind='ok') {
  dispatch({ type: 'SET_TOAST', toast: { text, kind } });
}

function Modal({ open, onClose, title, children, width='max-w-lg' }) {
  if (!open) return null;
  return (
    <div className="fixed inset-0 z-40 flex items-start justify-center bg-black/40 overflow-y-auto py-10 px-4" onClick={onClose}>
      <div className={classNames('bg-white rounded-lg shadow-xl w-full', width)} onClick={e => e.stopPropagation()}>
        <div className="flex items-center justify-between px-4 py-3 border-b border-gray-200">
          <h2 className="text-base font-semibold text-gray-900">{title}</h2>
          <button onClick={onClose} className="text-gray-400 hover:text-gray-600 text-xl leading-none">×</button>
        </div>
        <div className="p-4">{children}</div>
      </div>
    </div>
  );
}
