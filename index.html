  );
}

/* =====================================================================
   ACTIVITY TAB
   ===================================================================== */
function ActivityTab({ account, activities, contacts }) {
  const { state, dispatch } = useApp();
  const [typeFilter, setTypeFilter] = useState('all');
  const profileMap = useMemo(() => Object.fromEntries(state.profiles.map(p => [p.id, p])), [state.profiles]);
  const contactMap = useMemo(() => Object.fromEntries(contacts.map(c => [c.id, c])), [contacts]);
  const accountCalls = useMemo(() => state.allCalls.filter(c => c.account_id === account.id), [state.allCalls, account.id]);
  const events = useMemo(() => {
    const merged = mergeEvents(accountCalls, activities);
    return merged.sort((a, b) => new Date(b.occurred_at) - new Date(a.occurred_at));
  }, [accountCalls, activities]);
  const filtered = typeFilter === 'all' ? events : events.filter(ev => ev.type === typeFilter);

  return (
    <div>
      <div className="flex items-center justify-between mb-3">
        <Select value={typeFilter} onChange={e => setTypeFilter(e.target.value)} options={[{value:'all',label:'All types'}, ...ACTIVITY_TYPES.map(t => ({ value: t.value, label: t.label }))]} />
        <div className="flex items-center gap-2">
          {account.caller_id_number && (
            <span className="text-xs text-gray-500">Caller-ID: <span className="font-medium text-gray-700">{formatPhone(account.caller_id_number)}</span></span>
          )}
          <Button size="sm" onClick={() => dispatch({ type: 'OPEN_MODAL', modal: 'log_activity', props: { accountId: account.id } })}>Log activity</Button>
        </div>
      </div>
      {filtered.length === 0 ? (
        <div className="bg-white border border-gray-200 rounded p-8 text-center">
          <div className="text-sm text-gray-600 mb-3">No activity yet.</div>
          <Button size="sm" onClick={() => dispatch({ type: 'OPEN_MODAL', modal: 'log_activity', props: { accountId: account.id } })}>Log the first touch</Button>
        </div>
      ) : (
        <div className="space-y-2">
          {filtered.map(ev => {
            const t = ACTIVITY_TYPES.find(x => x.value === ev.type);
            const contact = ev.contact_id ? contactMap[ev.contact_id] : null;
            const user = ev.user_id ? profileMap[ev.user_id] : null;
            const r = ev.raw;
            return (
              <div key={ev.id} className="bg-white border border-gray-200 rounded p-3 flex gap-3">
                <div className="w-8 h-8 rounded bg-gray-100 flex items-center justify-center text-base shrink-0">{t?.icon || '•'}</div>
                <div className="flex-1 min-w-0">
                  <div className="flex items-center gap-2 flex-wrap">
                    {ev.kind === 'call' ? (
                      <>
                        <span className="font-medium text-gray-900 text-sm">{ev.direction === 'inbound' ? 'Inbound call' : 'Outbound call'}</span>
                        <Pill className="bg-gray-100 text-gray-700">{t?.label}</Pill>
                        <CallStatusPill value={r.status} />
                        {r.duration_seconds != null && <span className="text-xs text-gray-500">{fmtCallDuration(r.duration_seconds)}</span>}
                      </>
                    ) : (
                      <>
                        <span className="font-medium text-gray-900 text-sm">{r.subject || '(no subject)'}</span>
                        <Pill className="bg-gray-100 text-gray-700">{t?.label}</Pill>
                      </>
                    )}
                    {contact && <span className="text-xs text-gray-600">with {contact.first_name} {contact.last_name || ''}</span>}
                  </div>
                  {ev.kind === 'call' ? (
                    <>
                      <div className="text-xs text-gray-500 mt-1">
                        {formatPhone(r.from_number)} → {formatPhone(r.to_number)}
                      </div>
                      {r.voicemail_url && (
                        <div className="text-xs mt-1">
                          <a href={r.voicemail_url} target="_blank" rel="noopener" className="text-purple-700 hover:underline">▶ Voicemail{r.voicemail_duration_seconds ? ` (${r.voicemail_duration_seconds}s)` : ''}</a>
                        </div>
                      )}
                      {r.voicemail_transcription && <div className="text-sm italic text-gray-700 mt-1">"{r.voicemail_transcription}"</div>}
                      {r.notes && <div className="text-sm text-gray-700 mt-1 whitespace-pre-wrap">{r.notes}</div>}
                    </>
                  ) : (
                    <>
                      {r.email_to && <div className="text-xs text-gray-500 mt-1">To: {r.email_to}</div>}
                      {r.body && <div className="text-sm text-gray-700 mt-1 whitespace-pre-wrap">{r.body}</div>}
                    </>
                  )}
                  <div className="text-xs text-gray-500 mt-1 flex items-center gap-2">
                    <span>{user?.full_name || 'Unknown'}</span>
                    <span>·</span>
                    <span title={fmtDateTime(ev.occurred_at)}>{relativeTime(ev.occurred_at)}</span>
                    {ev.type === 'email' && r.gmail_thread_id && (
                      <button onClick={() => dispatch({ type: 'OPEN_MODAL', modal: 'email_thread', props: { activity: r } })}
                        className="ml-auto text-blue-600 hover:underline">View thread</button>
                    )}
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

/* =====================================================================
   TASKS TAB (on account detail) — scoped to one account
   ===================================================================== */
function TasksTab({ account }) {
  const { state, dispatch } = useApp();
  const [showDone, setShowDone] = useState(false);
  const tasks = state.allTasks.filter(t => t.account_id === account.id);
  const visible = (showDone ? tasks : tasks.filter(t => !t.completed_at))
    .slice().sort((a,b) => (a.due_at || '9999') < (b.due_at || '9999') ? -1 : 1);

  async function toggleDone(t) {
    const completing = !t.completed_at;
    const patch = { completed_at: completing ? new Date().toISOString() : null };
    const { data, error } = await supabase.from('tasks').update(patch).eq('id', t.id).select().single();
    if (error) return notify(dispatch, error.message, 'error');
    dispatch({ type: 'UPSERT_TASK', task: data });
    if (completing) await advanceCadenceFromCompletedTask({ taskId: t.id, state, dispatch });
  }

  return (
    <div>
      <div className="flex items-center justify-between mb-3">
        <div className="flex items-center gap-3">
          <div className="text-sm text-gray-600">
            {tasks.filter(t => !t.completed_at).length} open · {tasks.filter(t => t.completed_at).length} done
          </div>
          <label className="text-xs text-gray-600 flex items-center gap-1.5">
            <input type="checkbox" checked={showDone} onChange={e => setShowDone(e.target.checked)} />
            Show completed
          </label>
        </div>
        <Button size="sm" onClick={() => dispatch({ type: 'OPEN_MODAL', modal: 'create_task', props: { accountId: account.id } })}>+ Add task</Button>
      </div>
      {visible.length === 0 ? (
        <div className="bg-white border border-gray-200 rounded p-8 text-center">
          <div className="text-sm text-gray-600 mb-3">No tasks yet for this account.</div>
          <Button size="sm" onClick={() => dispatch({ type: 'OPEN_MODAL', modal: 'create_task', props: { accountId: account.id } })}>Add the first task</Button>
        </div>
      ) : (
        <div className="bg-white border border-gray-200 rounded divide-y divide-gray-100">
          {visible.map(t => {
            const assignee = state.profiles.find(p => p.id === t.assignee_id);
            return (
              <div key={t.id} className="px-4 py-3 flex items-start gap-3">
                <input type="checkbox" checked={!!t.completed_at} onChange={() => toggleDone(t)} className="mt-1" />
                <div className="flex-1 min-w-0">
                  <button onClick={() => dispatch({ type: 'OPEN_MODAL', modal: 'edit_task', props: { task: t } })}
                    className={classNames('text-sm text-left hover:underline',
                      t.completed_at ? 'text-gray-500 line-through' : 'text-gray-900 font-medium')}>
                    {t.title}
                  </button>
                  {t.notes && <div className="text-xs text-gray-600 mt-0.5 whitespace-pre-wrap">{t.notes}</div>}
                  <div className="mt-1 flex items-center gap-3 flex-wrap">
                    <DueBadge due_at={t.due_at} completed_at={t.completed_at} />
                    {assignee && <span className="text-xs text-gray-600">· {assignee.full_name}</span>}
                  </div>
                </div>
                <button onClick={() => dispatch({ type: 'OPEN_MODAL', modal: 'edit_task', props: { task: t } })} className="text-xs text-blue-600 hover:underline">Edit</button>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

/* =====================================================================
   NOTES TAB
   ===================================================================== */
function NotesTab({ account, canEdit }) {
  const { state, dispatch } = useApp();
  const [draft, setDraft] = useState(account.notes || '');
  useEffect(() => { setDraft(account.notes || ''); }, [account.id, account.notes]);

  async function save() {
    if ((account.notes || '') === draft) return;
    const { data, error } = await supabase.from('accounts').update({ notes: draft, updated_by: state.profile.id }).eq('id', account.id).select().single();
    if (error) return notify(dispatch, error.message, 'error');
    dispatch({ type: 'UPSERT_ACCOUNT', account: data });
    notify(dispatch, 'Notes saved.');
  }

  return (
    <div className="bg-white border border-gray-200 rounded p-4">
      <textarea
        rows={16}
        disabled={!canEdit}
        value={draft}
        onChange={e => setDraft(e.target.value)}
        onBlur={save}
        placeholder="Anything that doesn't fit the structured fields. Saves automatically when you click away."
        className="w-full px-3 py-2 text-sm border border-gray-300 rounded ring-focus disabled:bg-gray-50"
      />
    </div>
  );
}

function AddAccountModal() {
  const { state, dispatch } = useApp();
  const [form, setForm] = useState({
    name: '', phone: '', email: '', website: '',
    street: '', city: '', state: '', zip: '',
    industry: '', services: '',
    annual_revenue_range: '', employee_count_range: '',
    current_agency: '', monthly_marketing_spend_range: '',
    fit: 'unrated', deal_stage: 'target', lead_source: '',
    owner_id: state.profile?.id || '',
  });
  const [busy, setBusy] = useState(false);
  const set = (k) => (e) => setForm(f => ({ ...f, [k]: e?.target ? e.target.value : e }));

  async function submit(e) {
    e.preventDefault();
    if (!form.name.trim()) return notify(dispatch, 'Name is required.', 'error');
    setBusy(true);
    const payload = {
      ...form,
      name: form.name.trim(),
      phone: digitsOnly(form.phone) || null,
      website: form.website || null,
      industry: form.industry || null,
      annual_revenue_range: form.annual_revenue_range || null,
      employee_count_range: form.employee_count_range || null,

      lead_source: form.lead_source || null,
      created_by: state.profile.id,
      updated_by: state.profile.id,
    };
    Object.keys(payload).forEach(k => payload[k] === '' && (payload[k] = null));
    const { data, error } = await supabase.from('accounts').insert(payload).select().single();
    setBusy(false);
    if (error) return notify(dispatch, error.message, 'error');

        <Input label="City" value={form.city} onChange={set('city')} />
        <Select label="State" value={form.state} onChange={set('state')} options={US_STATES.map(s => ({value:s,label:s}))} includeBlank />
        <Input label="ZIP" value={form.zip} onChange={set('zip')} />

/* =====================================================================
   ADD/EDIT CONTACT MODAL
   ===================================================================== */
function ContactModal() {
  const { state, dispatch } = useApp();
  const { accountId, contact } = state.modalProps;
  const editing = !!contact;
  const [form, setForm] = useState(() => contact ? { ...contact } : {
    first_name: '', last_name: '', title: '',
    email: '', phone: '', mobile: '',
    is_primary: false, notes: '',
  });
  const [busy, setBusy] = useState(false);
  const set = (k) => (e) => setForm(f => ({ ...f, [k]: e?.target ? (e.target.type === 'checkbox' ? e.target.checked : e.target.value) : e }));

  async function submit(e) {
    e.preventDefault();
    if (!form.first_name.trim()) return notify(dispatch, 'First name required.', 'error');
    setBusy(true);
    const payload = {
      account_id: accountId,
      first_name: form.first_name.trim(),
      last_name: form.last_name?.trim() || null,
      title: form.title || null,
      email: form.email || null,
      phone: digitsOnly(form.phone) || null,
      mobile: digitsOnly(form.mobile) || null,
      is_primary: !!form.is_primary,
      notes: form.notes || null,
    };
    let result;
    if (editing) result = await supabase.from('contacts').update(payload).eq('id', contact.id).select().single();
    else result = await supabase.from('contacts').insert(payload).select().single();
    setBusy(false);
    if (result.error) return notify(dispatch, result.error.message, 'error');
    // Refresh contacts to handle primary trigger side effects
    const { data: list } = await supabase.from('contacts').select('*').eq('account_id', accountId).order('is_primary', { ascending: false });
    if (list) {
      dispatch({ type: 'LOAD_CONTACTS', accountId, contacts: list });
      list.forEach(c => dispatch({ type: 'UPSERT_ALL_CONTACT', contact: c }));
    }
    dispatch({ type: 'CLOSE_MODAL' });
    notify(dispatch, editing ? 'Contact updated.' : 'Contact added.');
  }

  return (
    <Modal open={true} onClose={() => dispatch({ type: 'CLOSE_MODAL' })} title={editing ? 'Edit contact' : 'Add contact'} width="max-w-xl">
      <form onSubmit={submit} className="grid grid-cols-2 gap-3">
        <Input label="First name *" value={form.first_name} onChange={set('first_name')} required autoFocus />
        <Input label="Last name" value={form.last_name || ''} onChange={set('last_name')} />
        <div className="col-span-2"><Input label="Title" value={form.title || ''} onChange={set('title')} placeholder="Owner / Manager / Marketing lead" /></div>
        <Input label="Email" type="email" value={form.email || ''} onChange={set('email')} />
        <Input label="Phone" value={form.phone || ''} onChange={set('phone')} />
        <Input label="Mobile" value={form.mobile || ''} onChange={set('mobile')} />
        <div className="col-span-2">
          <label className="flex items-center gap-2 text-sm">
            <input type="checkbox" checked={!!form.is_primary} onChange={set('is_primary')} />
            <span>Primary contact</span>
          </label>
        </div>
        <div className="col-span-2"><Textarea label="Notes" value={form.notes || ''} onChange={set('notes')} rows={3} /></div>
        <div className="col-span-2 flex justify-end gap-2 pt-2 border-t border-gray-200">
          <Button type="button" variant="secondary" onClick={() => dispatch({ type: 'CLOSE_MODAL' })}>Cancel</Button>
          <Button type="submit" disabled={busy}>{busy ? 'Saving…' : (editing ? 'Save' : 'Add contact')}</Button>
        </div>
      </form>
    </Modal>
  );
}

/* =====================================================================
   LOG ACTIVITY MODAL
   ===================================================================== */
function LogActivityModal() {
  const { state, dispatch } = useApp();
  const { accountId } = state.modalProps;
  const account = state.accounts.find(a => a.id === accountId);
  const contacts = state.contacts[accountId] || [];
  const [type, setType] = useState('call');
  const [contactId, setContactId] = useState('');
  const [subject, setSubject] = useState('');
  const [body, setBody] = useState('');
  const [occurredAt, setOccurredAt] = useState(new Date().toISOString().slice(0, 16));
  const [busy, setBusy] = useState(false);

  async function submit(e) {
    e.preventDefault();
    if (!subject.trim()) return notify(dispatch, 'Subject required.', 'error');
    setBusy(true);
    const { data, error } = await supabase.from('activities').insert({
      account_id: accountId,
      contact_id: contactId || null,
      user_id: state.profile.id,
      type,
      subject: subject.trim(),
      body: body || null,
      occurred_at: new Date(occurredAt).toISOString(),
    }).select().single();
    if (error) { setBusy(false); return notify(dispatch, error.message, 'error'); }
    dispatch({ type: 'ADD_ACTIVITY', activity: data });
    // Reflect last_contact_date in local state
    dispatch({ type: 'UPSERT_ACCOUNT', account: { ...account, last_contact_date: new Date(occurredAt).toISOString().slice(0,10) } });

    if (type === 'meeting' && !account.meeting_set) {
      if (window.confirm('You logged a meeting. Flip "meeting set" to true on this account?')) {
        const { data: upd } = await supabase.from('accounts').update({ meeting_set: true, meeting_at: new Date(occurredAt).toISOString() }).eq('id', accountId).select().single();
        if (upd) dispatch({ type: 'UPSERT_ACCOUNT', account: upd });
      }
    }
    setBusy(false);
    dispatch({ type: 'CLOSE_MODAL' });
    notify(dispatch, 'Activity logged.');
  }

  return (
    <Modal open={true} onClose={() => dispatch({ type: 'CLOSE_MODAL' })} title={`Log activity${account ? ` — ${account.name}` : ''}`} width="max-w-xl">
      <form onSubmit={submit} className="space-y-3">
        <div>
          <div className="text-xs font-medium text-gray-700 mb-1">Type</div>
          <div className="flex flex-wrap gap-1.5">
            {ACTIVITY_TYPES.map(t => (
              <button type="button" key={t.value}
                onClick={() => setType(t.value)}
                className={classNames('px-2.5 py-1 rounded text-xs font-medium border',
                  type === t.value ? 'bg-blue-600 border-blue-600 text-white' : 'bg-white border-gray-300 text-gray-700 hover:bg-gray-50')}>
                <span className="mr-1">{t.icon}</span>{t.label}
              </button>
            ))}
          </div>
        </div>
        <Select label="Contact (optional)" value={contactId} onChange={e => setContactId(e.target.value)}
                includeBlank blankLabel="Account-level (no specific contact)"
                options={contacts.map(c => ({ value: c.id, label: `${c.first_name} ${c.last_name || ''}`.trim() }))} />
        <Input label="Subject *" value={subject} onChange={e => setSubject(e.target.value)} required autoFocus />
        <Textarea label="Notes" rows={4} value={body} onChange={e => setBody(e.target.value)} placeholder="What happened, next steps…" />
        <Input label="Occurred at" type="datetime-local" value={occurredAt} onChange={e => setOccurredAt(e.target.value)} />
        <div className="flex justify-end gap-2 pt-2 border-t border-gray-200">
          <Button type="button" variant="secondary" onClick={() => dispatch({ type: 'CLOSE_MODAL' })}>Cancel</Button>
          <Button type="submit" disabled={busy}>{busy ? 'Saving…' : 'Log activity'}</Button>
        </div>
      </form>
    </Modal>
  );
}

const CSV_FIELDS = [
  { key: '__ignore__', label: '— Ignore —' },
  { key: 'name', label: 'Name *' },
  { key: 'phone', label: 'Phone' },
  { key: 'email', label: 'Email' },
  { key: 'website', label: 'Website' },
  { key: 'street', label: 'Street' },
  { key: 'city', label: 'City' },
  { key: 'state', label: 'State' },
  { key: 'zip', label: 'ZIP' },
  { key: 'industry', label: 'Industry (enum)' },
  { key: 'services', label: 'Services (freeform)' },
  { key: 'annual_revenue_range', label: 'Annual revenue (enum)' },
  { key: 'employee_count_range', label: 'Employees (enum)' },
  { key: 'current_agency', label: 'Current agency' },
  { key: 'monthly_marketing_spend_range', label: 'Monthly spend (enum)' },
  { key: 'competitor_agencies_mentioned', label: 'Competitor agencies' },
  { key: 'budget_range', label: 'Budget range' },
  { key: 'seasonality', label: 'Seasonality' },
  { key: 'lead_source', label: 'Lead source (enum)' },
  { key: 'notes', label: 'Notes' },
];

const HEADER_ALIASES = {
  name: ['name','company','business','biz name','business name','account','account name','company name'],
  website: ['website','web','url','site','homepage','domain'],
  phone: ['phone','phone number','telephone','tel','main phone','phone1'],
  email: ['email','e-mail','email address'],
  street: ['street','address','address 1','address1','street address'],
  city: ['city','town'],
  state: ['state','province','region'],
  zip: ['zip','postal','zip code','postcode','postal code'],
  industry: ['industry','category','type','vertical'],
  services: ['services','offerings'],
  notes: ['notes','description','comments','remarks'],
  current_agency: ['agency','current agency','incumbent'],
};

function autoMap(header) {
  const norm = header.toLowerCase().replace(/[_\-]+/g, ' ').trim();
  for (const [field, aliases] of Object.entries(HEADER_ALIASES)) {
    if (aliases.includes(norm)) return field;
  }
  // try field key itself
  const exact = CSV_FIELDS.find(f => f.key.toLowerCase() === norm);
  if (exact) return exact.key;
  return '__ignore__';
}

/* =====================================================================
   TASK MODAL — create or edit a task
   ===================================================================== */
function TaskModal() {
  const { state, dispatch } = useApp();
  const { task, accountId: initialAccountId } = state.modalProps;
  const editing = !!task;

  const [accountId, setAccountId] = useState(task?.account_id || initialAccountId || '');
  const [title, setTitle] = useState(task?.title || '');
  const [notes, setNotes] = useState(task?.notes || '');
  const [assigneeId, setAssigneeId] = useState(task?.assignee_id || state.profile?.id || '');
  const [dueDate, setDueDate] = useState(task?.due_at ? task.due_at.slice(0,10) : '');
  const [dueTime, setDueTime] = useState(task?.due_at ? new Date(task.due_at).toTimeString().slice(0,5) : '');
  const [busy, setBusy] = useState(false);

  async function submit(e) {
    e.preventDefault();
    if (!title.trim()) return notify(dispatch, 'Title required.', 'error');
    if (!accountId) return notify(dispatch, 'Account required.', 'error');
    if (!assigneeId) return notify(dispatch, 'Assignee required.', 'error');

    setBusy(true);
    const due_at = dueDate ? new Date(`${dueDate}T${dueTime || '17:00'}`).toISOString() : null;
    const payload = {
      account_id: accountId,
      assignee_id: assigneeId,
      title: title.trim(),
      notes: notes || null,
      due_at,
    };
    let result;
    if (editing) {
      result = await supabase.from('tasks').update(payload).eq('id', task.id).select().single();
    } else {
      result = await supabase.from('tasks').insert({ ...payload, created_by: state.profile.id }).select().single();
    }
    setBusy(false);
    if (result.error) return notify(dispatch, result.error.message, 'error');
    dispatch({ type: 'UPSERT_TASK', task: result.data });
    dispatch({ type: 'CLOSE_MODAL' });
    notify(dispatch, editing ? 'Task updated.' : 'Task added.');
  }

  async function deleteTask() {
    if (!editing) return;
    if (!window.confirm('Delete this task?')) return;
    const { error } = await supabase.from('tasks').delete().eq('id', task.id);
    if (error) return notify(dispatch, error.message, 'error');
    dispatch({ type: 'REMOVE_TASK', id: task.id });
    dispatch({ type: 'CLOSE_MODAL' });
    notify(dispatch, 'Deleted.');
  }

  return (
    <Modal open={true} onClose={() => dispatch({ type: 'CLOSE_MODAL' })} title={editing ? 'Edit task' : 'New task'} width="max-w-xl">
      <form onSubmit={submit} className="space-y-3">
        <Input label="Title *" value={title} onChange={e => setTitle(e.target.value)} required autoFocus placeholder="Follow up on proposal, send pricing, etc." />
        <Select label="Account *" value={accountId} onChange={e => setAccountId(e.target.value)} includeBlank
                options={state.accounts.filter(a => a.status === 'active').map(a => ({ value: a.id, label: a.name }))} />
        <div className="grid grid-cols-2 gap-3">
          <Input label="Due date" type="date" value={dueDate} onChange={e => setDueDate(e.target.value)} />
          <Input label="Due time" type="time" value={dueTime} onChange={e => setDueTime(e.target.value)} />
        </div>
        <Select label="Assignee *" value={assigneeId} onChange={e => setAssigneeId(e.target.value)}
                options={state.profiles.map(p => ({ value: p.id, label: p.full_name }))} />
        <Textarea label="Notes" rows={3} value={notes} onChange={e => setNotes(e.target.value)} />
        <div className="flex items-center justify-between pt-2 border-t border-gray-200">
          {editing
            ? <Button type="button" variant="ghost" onClick={deleteTask} className="text-red-600">Delete</Button>
            : <span />}
          <div className="flex gap-2">
            <Button type="button" variant="secondary" onClick={() => dispatch({ type: 'CLOSE_MODAL' })}>Cancel</Button>
            <Button type="submit" disabled={busy}>{busy ? 'Saving…' : (editing ? 'Save' : 'Add task')}</Button>
          </div>
        </div>
      </form>
    </Modal>
  );
}

function MeetingModal() {
  const { state, dispatch } = useApp();
  const { startISO, accountId: initialAccountId } = state.modalProps;
  const initialStart = startISO ? new Date(startISO) : new Date(Math.ceil(Date.now() / (15*60000)) * 15*60000);

  const [accountId, setAccountId] = useState(initialAccountId || '');
  const [subject, setSubject] = useState('');
  const [date, setDate] = useState(() => {
    const local = new Date(initialStart.getTime() - initialStart.getTimezoneOffset() * 60000);
    return local.toISOString().slice(0,10);
  });
  const [time, setTime] = useState(() => {
    const hh = String(initialStart.getHours()).padStart(2,'0');
    const mm = String(initialStart.getMinutes()).padStart(2,'0');
    return `${hh}:${mm}`;
  });
  const [duration, setDuration] = useState(30);
  const [attendeeEmail, setAttendeeEmail] = useState('');
  const [meetingType, setMeetingType] = useState('virtual'); // 'physical' | 'virtual'
  const [location, setLocation] = useState('');
  const [notes, setNotes] = useState('');
  const [busy, setBusy] = useState(false);

  const account = state.accounts.find(a => a.id === accountId);
  const contacts = state.contacts[accountId] || [];

  // When an account is picked, autofill subject + location + load contacts
  useEffect(() => {
    if (!accountId || !account) return;
    setSubject(prev => prev || `Meeting · ${account.name}`);
    const addr = [account.street, account.city, account.state].filter(Boolean).join(', ');
    if (addr) setLocation(prev => prev || addr);
    if (!state.contacts[accountId]) {
      supabase.from('contacts').select('*').eq('account_id', accountId)
        .order('is_primary', { ascending: false }).order('created_at', { ascending: true })
        .then(({ data }) => { if (data) dispatch({ type: 'LOAD_CONTACTS', accountId, contacts: data }); });
    }
  }, [accountId]);

  useEffect(() => {
    if (!contacts.length || attendeeEmail) return;
    const primary = contacts.find(c => c.is_primary) || contacts[0];
    if (primary?.email) setAttendeeEmail(primary.email);
  }, [contacts]);

  function isValidEmail(s) {
    return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test((s || '').trim());
  }

  const emailOk = isValidEmail(attendeeEmail);
  const physicalOk = meetingType !== 'physical' || location.trim().length > 0;
  const canSubmit = emailOk && physicalOk && subject.trim() && date && time && !busy;

  async function submit(e) {
    e.preventDefault();
    if (!state.googleConnected) return notify(dispatch, 'Connect Google Calendar first (top-right menu).', 'error');
    if (!emailOk) return notify(dispatch, 'A valid attendee email is required.', 'error');
    if (!physicalOk) return notify(dispatch, 'Enter a physical address.', 'error');

    setBusy(true);
    const start = new Date(`${date}T${time}`);
    const end = new Date(start.getTime() + duration * 60000);
    try {
      const description = [
        notes,
        accountId ? `Crocs & Clicks CRM\nAccount: ${account?.name}\n${window.location.origin}${window.location.pathname}#/accounts/${accountId}` : 'Crocs & Clicks CRM',
      ].filter(Boolean).join('\n\n');

      const ev = await gcal.createEvent({
        summary: subject.trim(),
        description,
        startISO: start.toISOString(),
        endISO: end.toISOString(),
        attendees: [attendeeEmail.trim()],
        location: meetingType === 'physical' ? location.trim() : null,
        virtual: meetingType === 'virtual',
      });

      const meetLink = ev?.conferenceData?.entryPoints?.find(p => p.entryPointType === 'video')?.uri;

      if (accountId) {
        const { data: upd } = await supabase.from('accounts').update({
          meeting_set: true,
          meeting_at: start.toISOString(),
          updated_by: state.profile.id,
        }).eq('id', accountId).select().single();
        if (upd) dispatch({ type: 'UPSERT_ACCOUNT', account: upd });

        const body = [
          `Invite sent to ${attendeeEmail.trim()}`,
          meetingType === 'physical' ? `Location: ${location.trim()}` : `Google Meet: ${meetLink || '(link in calendar event)'}`,
        ].join('\n');

        await supabase.from('activities').insert({
          account_id: accountId, user_id: state.profile.id, type: 'meeting',
          subject: `Meeting scheduled: ${subject.trim()}`,
          body,
          occurred_at: new Date().toISOString(),
        });
      }

      notify(dispatch, meetingType === 'virtual' && meetLink ? 'Meeting created. Meet link added.' : 'Meeting created on Google Calendar.');
      dispatch({ type: 'CLOSE_MODAL' });
      window.dispatchEvent(new CustomEvent('gcal-refresh'));
    } catch (e2) {
      console.error('[CRM] Meeting creation failed:', e2);
      notify(dispatch, e2.message || 'Meeting creation failed — see console for details.', 'error');
    } finally { setBusy(false); }
  }

  return (
    <Modal open={true} onClose={() => dispatch({ type: 'CLOSE_MODAL' })} title="New meeting" width="max-w-xl">
      <form onSubmit={submit} className="space-y-3">
        <Select label="Account (optional)" value={accountId} onChange={e => setAccountId(e.target.value)}
                includeBlank blankLabel="— No account (personal / internal) —"
                options={state.accounts.filter(a => a.status === 'active').map(a => ({ value: a.id, label: a.name }))} />
        <Input label="Subject *" value={subject} onChange={e => setSubject(e.target.value)} required autoFocus />
        <div className="grid grid-cols-3 gap-3">
          <Input label="Date" type="date" value={date} onChange={e => setDate(e.target.value)} />
          <Input label="Start time" type="time" value={time} onChange={e => setTime(e.target.value)} />
          <Select label="Duration" value={String(duration)} onChange={e => setDuration(parseInt(e.target.value,10))}
                  options={[
                    {value:'15',label:'15 min'},
                    {value:'30',label:'30 min'},
                    {value:'45',label:'45 min'},
                    {value:'60',label:'1 hour'},
                    {value:'90',label:'1.5 hours'},
                    {value:'120',label:'2 hours'},
                  ]} />
        </div>
        <div>
          <Input label="Attendee email *" type="email" value={attendeeEmail} onChange={e => setAttendeeEmail(e.target.value)} required placeholder="prospect@example.com — Google sends them an invite" />
          {!emailOk && attendeeEmail && <div className="text-xs text-red-600 mt-1">Enter a valid email address.</div>}
        </div>
        <div>
          <div className="text-xs font-medium text-gray-700 mb-1">Meeting type</div>
          <div className="flex gap-2">
            <button type="button" onClick={() => setMeetingType('virtual')}
              className={classNames('flex-1 px-3 py-2 rounded border text-sm text-left',
                meetingType === 'virtual' ? 'border-blue-600 bg-blue-50 text-blue-900' : 'border-gray-300 bg-white text-gray-700 hover:bg-gray-50')}>
              <div className="font-medium">Virtual</div>
              <div className="text-xs opacity-80">Google Meet link added automatically</div>
            </button>
            <button type="button" onClick={() => setMeetingType('physical')}
              className={classNames('flex-1 px-3 py-2 rounded border text-sm text-left',
                meetingType === 'physical' ? 'border-blue-600 bg-blue-50 text-blue-900' : 'border-gray-300 bg-white text-gray-700 hover:bg-gray-50')}>
              <div className="font-medium">Physical</div>
              <div className="text-xs opacity-80">Enter an address or room</div>
            </button>
          </div>
        </div>
        {meetingType === 'physical' && (
          <Input label="Address / location *" value={location} onChange={e => setLocation(e.target.value)} required placeholder="123 Main St, Vancouver WA" />
        )}
        <Textarea label="Notes" rows={3} value={notes} onChange={e => setNotes(e.target.value)} />
        <div className="flex justify-end gap-2 pt-2 border-t border-gray-200">
          <Button type="button" variant="secondary" onClick={() => dispatch({ type: 'CLOSE_MODAL' })}>Cancel</Button>
          <Button type="submit" disabled={!canSubmit}>{busy ? 'Creating…' : 'Create meeting'}</Button>
        </div>
      </form>
    </Modal>
  );
}

/* =====================================================================
   DIALER MODAL — Twilio Voice click-to-call
   ===================================================================== */
function DialerModal() {
  const { state, dispatch } = useApp();
  const { to, accountId, contactId, accountName, contactName } = state.modalProps || {};
  const account = useMemo(() => accountId ? state.accounts.find(a => a.id === accountId) : null, [accountId, state.accounts]);

  // 'idle' | 'connecting' | 'on_call' | 'ended' | 'error'
  const [status, setStatus] = useState('idle');
  const [errorMsg, setErrorMsg] = useState('');
  const [duration, setDuration] = useState(0);
  const [isMuted, setIsMuted] = useState(false);
  const [notes, setNotes] = useState('');
  const callRef = useRef(null);
  const timerRef = useRef(null);
  const sidRef = useRef(null);

  function fmtDur(s) { return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`; }

  function teardown() {
    if (timerRef.current) { clearInterval(timerRef.current); timerRef.current = null; }
    if (callRef.current) { try { callRef.current.disconnect(); } catch {} }
  }

  async function persistNotes() {
    const trimmed = notes.trim();
    if (!trimmed) return;
    // 1) Save to the calls row (keyed by Twilio Call SID)
    const sid = sidRef.current;
    if (sid) {
      await supabase.from('calls').update({ notes: trimmed }).eq('twilio_call_sid', sid);
    }
    // 2) Append to account.notes with a timestamp so the Notes tab on the
    //    account becomes a running call-history log.
    if (accountId) {
      const { data: acct } = await supabase.from('accounts').select('notes').eq('id', accountId).single();
      const ts = new Date().toLocaleString('en-US', { month: 'short', day: 'numeric', year: 'numeric', hour: 'numeric', minute: '2-digit' });
      const who = contactName ? ` with ${contactName}` : '';
      const entry = `[${ts}] Call${who}:\n${trimmed}`;
      const prefix = (acct?.notes || '').trim();
      const newNotes = prefix ? `${prefix}\n\n${entry}` : entry;
      const { data: updated } = await supabase.from('accounts')
        .update({ notes: newNotes, updated_by: state.profile.id })
        .eq('id', accountId).select().single();
      if (updated) dispatch({ type: 'UPSERT_ACCOUNT', account: updated });
    }
  }

  async function refreshAccount() {
    if (!accountId) return;
    const { data } = await supabase.from('accounts').select('*').eq('id', accountId).single();
    if (data) dispatch({ type: 'UPSERT_ACCOUNT', account: data });
  }

  function closeModal() {
    teardown();
    // Close the modal immediately; run network cleanup in the background so a
    // slow Supabase response can never block the close.
    dispatch({ type: 'CLOSE_MODAL' });
    (async () => {
      try {
        await persistNotes();
        await refreshAccount();
        const { data: cls } = await supabase.from('calls').select('*').order('started_at', { ascending: false }).limit(1000);
        if (cls) dispatch({ type: 'SET_ALL_CALLS', calls: cls });
      } catch (e) {
        console.error('[dialer] post-close cleanup failed', e);
      }
    })();
  }

  async function dial() {
    const device = window.__twilioDevice;
    if (!device || state.twilio.status !== 'ready') {
      setErrorMsg(state.twilio.error || 'Phone system not ready. Refresh the page and try again.');
      setStatus('error');
      return;
    }
    setStatus('connecting');
    setErrorMsg('');
    try {
      const call = await device.connect({
        params: {
          To: to,
          accountId: accountId || '',
          contactId: contactId || '',
          userId: state.profile.id,
        },
      });
      callRef.current = call;
      sidRef.current = call.parameters?.CallSid || null;
      call.on('accept', () => {
        sidRef.current = call.parameters?.CallSid || sidRef.current;
        setStatus('on_call');
        const start = Date.now();
        timerRef.current = setInterval(() => setDuration(Math.floor((Date.now() - start) / 1000)), 250);
      });
      call.on('disconnect', () => {
        setStatus('ended');
        if (timerRef.current) { clearInterval(timerRef.current); timerRef.current = null; }
        if (accountId) autoAdvanceCadenceOnActivity({ accountId, activityType: 'call', state, dispatch });
      });
      call.on('cancel', () => {
        setStatus('ended');
        if (timerRef.current) { clearInterval(timerRef.current); timerRef.current = null; }
      });
      call.on('reject', () => setStatus('ended'));
      call.on('error', (err) => {
        setStatus('error');
        setErrorMsg(err?.message || 'Call error');
        if (timerRef.current) { clearInterval(timerRef.current); timerRef.current = null; }
      });
    } catch (e) {
      setStatus('error');
      setErrorMsg(e?.message || 'Failed to start call');
    }
  }

  // Auto-dial as soon as the device is ready.
  useEffect(() => {
    if (status === 'idle' && state.twilio.status === 'ready') {
      dial();
    }
  }, [state.twilio.status]);

  // Cleanup on unmount.
  useEffect(() => () => teardown(), []);

  function hangup() {
    if (callRef.current) { try { callRef.current.disconnect(); } catch {} }
  }
  function toggleMute() {
    if (callRef.current) {
      const next = !isMuted;
      try { callRef.current.mute(next); setIsMuted(next); } catch {}
    }
  }

  const callerId = account?.caller_id_number || null;
  const headline = contactName || accountName || formatPhone(to) || 'Unknown';
  const subline  = (contactName && accountName) ? accountName : null;

  return (
    <Modal open={true} onClose={closeModal} title="Dial" width="max-w-md">
      <div className="space-y-3">
        <div>
          <div className="text-xs text-gray-500">Calling</div>
          <div className="text-lg font-medium text-gray-900">{headline}</div>
          {subline && <div className="text-sm text-gray-600">{subline}</div>}
          <div className="text-sm text-gray-700 mt-0.5">{formatPhone(to)}</div>
        </div>

        <div className="text-xs text-gray-500">
          From: <span className="font-medium text-gray-700">{callerId ? formatPhone(callerId) : '— assigned automatically on first call —'}</span>
        </div>

        <div className="min-h-[1.5rem]">
          {status === 'idle' && state.twilio.status !== 'ready' && (
            <div className="text-sm text-gray-600">Initializing phone… ({state.twilio.status})</div>
          )}
          {status === 'connecting' && <div className="text-sm text-blue-700">Dialing…</div>}
          {status === 'on_call'    && <div className="text-sm text-green-700">Connected · {fmtDur(duration)}</div>}
          {status === 'ended'      && <div className="text-sm text-gray-600">Call ended{duration > 0 ? ` (${fmtDur(duration)})` : ''}</div>}
          {status === 'error'      && <div className="text-sm text-red-700">{errorMsg || 'Error'}</div>}
        </div>

        <Textarea
          label="Call notes (saved when you close this dialog)"
          rows={3}
          value={notes}
          onChange={e => setNotes(e.target.value)}
          disabled={status === 'idle' && state.twilio.status !== 'ready'}
        />

        <div className="flex justify-end gap-2 pt-2 border-t border-gray-200">
          {(status === 'connecting' || status === 'on_call') && (
            <>
              <Button variant="secondary" onClick={toggleMute}>{isMuted ? 'Unmute' : 'Mute'}</Button>
              <Button variant="danger" onClick={hangup}>Hang up</Button>
            </>
          )}
          {(status === 'idle' || status === 'ended' || status === 'error') && (
            <>
              {(status === 'ended' || status === 'error') && (
                <Button variant="secondary" onClick={() => { setStatus('idle'); setDuration(0); setErrorMsg(''); sidRef.current = null; dial(); }}>Redial</Button>
              )}
              <Button onClick={closeModal}>Close</Button>
            </>
          )}
        </div>
      </div>
    </Modal>
  );
}

/* =====================================================================
   CADENCES — multi-step outreach sequences
   ===================================================================== */
const CADENCE_STEP_META = {
  call:              { icon: '📞', label: 'Call' },
  auto_email_report: { icon: '📊', label: 'Auto SEO report' },
  personal_email:    { icon: '✉️', label: 'Personal email' },
  manual_task:       { icon: '📝', label: 'Manual task' },
};

function getCadenceStepsFor(state, cadenceId) {
  return state.cadenceSteps
    .filter(s => s.cadence_id === cadenceId)
    .sort((a, b) => a.step_order - b.step_order);
}

function buildCadenceTaskPayload(step, cadence, account, currentUserId) {
  const due = new Date();
  due.setDate(due.getDate() + (step.wait_days_before || 0));
  due.setHours(9, 0, 0, 0);
  const meta = CADENCE_STEP_META[step.step_type] || { label: 'Cadence step' };
  const fallbackTitle = `${meta.label} — ${account.name}`;
  return {
    account_id: account.id,
    assignee_id: account.owner_id || currentUserId,
    created_by: currentUserId,
    title: step.label ? `${step.label} — ${account.name}` : fallbackTitle,
    notes: `Step ${step.step_order} of "${cadence.name}" cadence (${meta.label.toLowerCase()})`,
    due_at: due.toISOString(),
  };
}

async function enrollAccountInCadence({ accountId, cadenceId, state, dispatch }) {
  const cadence = state.cadences.find(c => c.id === cadenceId);
  const account = state.accounts.find(a => a.id === accountId);
  if (!cadence || !account) throw new Error('Cadence or account not found');

  const steps = getCadenceStepsFor(state, cadenceId);
  if (!steps.length) throw new Error('Cadence has no steps');

  // Create the first task
  const taskPayload = buildCadenceTaskPayload(steps[0], cadence, account, state.profile.id);
  const { data: task, error: tErr } = await supabase.from('tasks').insert(taskPayload).select().single();
  if (tErr) throw new Error(tErr.message);

  // Create the enrollment
  const enrollPayload = {
    account_id: accountId, cadence_id: cadenceId,
    enrolled_by: state.profile.id,
    status: 'active', current_step_order: 1,
    current_task_id: task.id,
  };
  const { data: enrollment, error: eErr } = await supabase.from('cadence_enrollments').insert(enrollPayload).select().single();
  if (eErr) {
    // Cleanup the orphaned task if enrollment fails
    await supabase.from('tasks').delete().eq('id', task.id);
    throw new Error(eErr.message);
  }

  dispatch({ type: 'UPSERT_TASK', task });
  dispatch({ type: 'UPSERT_CADENCE_ENROLLMENT', enrollment });
  return enrollment;
}

// Auto-complete a cadence task when the rep does the matching activity.
// Called from the dialer (call step) + email modal (personal_email step).
async function autoAdvanceCadenceOnActivity({ accountId, activityType, state, dispatch }) {
  if (!accountId || !activityType) return false;
  const enrollment = state.cadenceEnrollments.find(e =>
    e.account_id === accountId && e.status === 'active' && e.current_task_id
  );
  if (!enrollment) return false;
  const steps = getCadenceStepsFor(state, enrollment.cadence_id);
  const currentStep = steps.find(s => s.step_order === enrollment.current_step_order);
  if (!currentStep || currentStep.step_type !== activityType) return false;
  const task = state.allTasks.find(t => t.id === enrollment.current_task_id);
  if (task?.completed_at) return false;

  const completedAt = new Date().toISOString();
  const { data, error } = await supabase.from('tasks')
    .update({ completed_at: completedAt })
    .eq('id', enrollment.current_task_id)
    .select().single();
  if (error) { console.error('[cadence-auto] task done failed:', error.message); return false; }
  if (data) dispatch({ type: 'UPSERT_TASK', task: data });
  await advanceCadenceFromCompletedTask({ taskId: enrollment.current_task_id, state, dispatch });
  notify(dispatch, '🪜 Cadence step auto-completed');
  return true;
}

async function advanceCadenceFromCompletedTask({ taskId, state, dispatch }) {
  const enrollment = state.cadenceEnrollments.find(e =>
    e.current_task_id === taskId && e.status === 'active'
  );
  if (!enrollment) {
    console.log('[cadence] no active enrollment for task', taskId);
    return { ok: false, reason: 'no_enrollment' };
  }
  const cadence = state.cadences.find(c => c.id === enrollment.cadence_id);
  const account = state.accounts.find(a => a.id === enrollment.account_id);
  if (!cadence || !account) {
    console.error('[cadence] missing cadence or account for enrollment', enrollment.id);
    return { ok: false, reason: 'missing_cadence_or_account' };
  }

  const steps = getCadenceStepsFor(state, enrollment.cadence_id);
  const currentStep = steps.find(s => s.step_order === enrollment.current_step_order);

  if (currentStep) {
    const { data: exec, error: eErr } = await supabase.from('cadence_step_executions').insert({
      enrollment_id: enrollment.id,
      step_order: currentStep.step_order,
      step_type: currentStep.step_type,
      executed_by: state.profile.id,
      task_id: taskId,
      skipped: false,
    }).select().single();
    if (eErr) console.error('[cadence] execution log failed:', eErr.message);
    else if (exec) dispatch({ type: 'ADD_CADENCE_EXECUTION', execution: exec });
  }

  const nextStep = steps.find(s => s.step_order === enrollment.current_step_order + 1);

  if (!nextStep) {
    const { data: updated, error: uErr } = await supabase.from('cadence_enrollments')
      .update({ status: 'completed', completed_at: new Date().toISOString(), current_task_id: null })
      .eq('id', enrollment.id).select().single();
    if (uErr) {
      console.error('[cadence] enrollment complete failed:', uErr.message);
      return { ok: false, reason: 'enrollment_update_failed', error: uErr.message };
    }
    if (updated) dispatch({ type: 'UPSERT_CADENCE_ENROLLMENT', enrollment: updated });
    return { ok: true, completed: true };
  }

  const nextTaskPayload = buildCadenceTaskPayload(nextStep, cadence, account, state.profile.id);
  const { data: nextTask, error: tErr } = await supabase.from('tasks').insert(nextTaskPayload).select().single();
  if (tErr) {
    console.error('[cadence] next task insert failed:', tErr.message, tErr);
    notify(dispatch, 'Cadence advance failed: ' + tErr.message, 'error');
    return { ok: false, reason: 'next_task_failed', error: tErr.message };
  }

  const { data: updated, error: uErr } = await supabase.from('cadence_enrollments')
    .update({ current_step_order: nextStep.step_order, current_task_id: nextTask.id })
    .eq('id', enrollment.id).select().single();
  if (uErr) {
    console.error('[cadence] enrollment advance failed:', uErr.message);
    notify(dispatch, 'Cadence advance failed: ' + uErr.message, 'error');
    return { ok: false, reason: 'enrollment_update_failed', error: uErr.message };
  }

  if (nextTask) dispatch({ type: 'UPSERT_TASK', task: nextTask });
  if (updated) dispatch({ type: 'UPSERT_CADENCE_ENROLLMENT', enrollment: updated });
  return { ok: true, nextStep, nextTask };
}

async function stopCadenceEnrollment({ enrollmentId, state, dispatch }) {
  const enrollment = state.cadenceEnrollments.find(e => e.id === enrollmentId);
  if (!enrollment) return;
  // Delete the open task so it doesn't keep haunting the rep
  if (enrollment.current_task_id) {
    await supabase.from('tasks').delete().eq('id', enrollment.current_task_id);
    dispatch({ type: 'REMOVE_TASK', id: enrollment.current_task_id });
  }
  await supabase.from('cadence_enrollments').delete().eq('id', enrollmentId);
  dispatch({ type: 'REMOVE_CADENCE_ENROLLMENT', id: enrollmentId });
}

function CadenceEnrollModal() {
  const { state, dispatch } = useApp();
  const { accountId } = state.modalProps || {};
  const account = state.accounts.find(a => a.id === accountId);
  const [cadenceId, setCadenceId] = useState(state.cadences[0]?.id || '');
  const [busy, setBusy] = useState(false);

  const selectedCadence = state.cadences.find(c => c.id === cadenceId);
  const stepsPreview = cadenceId ? getCadenceStepsFor(state, cadenceId) : [];

  async function submit() {
    if (!cadenceId || !accountId) return;
    setBusy(true);
    try {
      await enrollAccountInCadence({ accountId, cadenceId, state, dispatch });
      notify(dispatch, `${account?.name || 'Account'} enrolled in ${selectedCadence?.name || 'cadence'}.`);
      dispatch({ type: 'CLOSE_MODAL' });
    } catch (e) {
      const msg = e?.message || 'Enroll failed.';
      notify(dispatch, msg.includes('unique') ? 'Already enrolled in this cadence.' : msg, 'error');
    } finally { setBusy(false); }
  }

  return (
    <Modal open={true} onClose={() => dispatch({ type: 'CLOSE_MODAL' })} title="Enroll in cadence" width="max-w-lg">
      <div className="space-y-3">
        {account && (
          <div className="text-xs text-gray-500">Enrolling <span className="font-medium text-gray-800">{account.name}</span></div>
        )}
        <Select label="Cadence" value={cadenceId} onChange={e => setCadenceId(e.target.value)}
          options={state.cadences.map(c => ({ value: c.id, label: c.name }))} />
        {selectedCadence?.description && (
          <div className="text-xs text-gray-600">{selectedCadence.description}</div>
        )}
        {stepsPreview.length > 0 && (
          <div className="bg-gray-50 border border-gray-200 rounded p-3">
            <div className="text-xs text-gray-500 mb-2">Steps</div>
            <ol className="space-y-1.5">
              {stepsPreview.map((s, i) => {
                const meta = CADENCE_STEP_META[s.step_type] || { icon: '•', label: s.step_type };
                return (
                  <li key={s.id} className="flex items-center gap-2 text-sm">
                    <span className="w-5 text-xs text-gray-400">{i + 1}.</span>
                    <span>{meta.icon}</span>
                    <span className="text-gray-800">{s.label || meta.label}</span>
                    {s.wait_days_before > 0 && i > 0 && (
                      <span className="text-xs text-gray-500">· wait {s.wait_days_before}d</span>
                    )}
                  </li>
                );
              })}
            </ol>
          </div>
        )}
        <div className="flex justify-end gap-2 pt-2 border-t border-gray-200">
          <Button variant="secondary" onClick={() => dispatch({ type: 'CLOSE_MODAL' })}>Cancel</Button>
          <Button onClick={submit} disabled={busy || !cadenceId}>{busy ? 'Enrolling…' : 'Enroll'}</Button>
        </div>
      </div>
    </Modal>
  );
}

function CadenceProgressWidget({ account }) {
  const { state, dispatch } = useApp();
  const enrollment = state.cadenceEnrollments.find(e => e.account_id === account.id && e.status !== 'opted_out');
  if (!enrollment) return null;
  const cadence = state.cadences.find(c => c.id === enrollment.cadence_id);
  const steps = getCadenceStepsFor(state, enrollment.cadence_id);
  const executions = state.cadenceExecutions.filter(x => x.enrollment_id === enrollment.id);
  const currentTask = state.allTasks.find(t => t.id === enrollment.current_task_id);
  const isComplete = enrollment.status === 'completed';

  async function stop() {
    if (!confirm(`Stop "${cadence?.name}" cadence for ${account.name}?`)) return;
    await stopCadenceEnrollment({ enrollmentId: enrollment.id, state, dispatch });
    notify(dispatch, 'Cadence stopped.');
  }

  return (
    <div className="mb-4 bg-white border border-gray-200 rounded-lg p-3">
      <div className="flex items-center justify-between mb-2">
        <div className="text-sm font-medium text-gray-800">
          {cadence?.name || 'Cadence'}
          {isComplete ? <span className="ml-2 text-xs text-green-700">· Completed</span>
                      : <span className="ml-2 text-xs text-gray-500">· Step {enrollment.current_step_order} of {steps.length}</span>}
        </div>
        {!isComplete && (
          <Button size="sm" variant="ghost" onClick={stop}>Stop</Button>
        )}
      </div>
      <ol className="space-y-1">
        {steps.map(s => {
          const done = executions.some(x => x.step_order === s.step_order);
          const isCurrent = !isComplete && s.step_order === enrollment.current_step_order;
          const meta = CADENCE_STEP_META[s.step_type] || { icon: '•', label: s.step_type };
          return (
            <li key={s.id} className={classNames(
              'flex items-center gap-2 text-sm px-2 py-1 rounded',
              isCurrent && 'bg-blue-50',
              done && 'text-gray-500',
            )}>
              <span className="w-4 text-xs">
                {done ? '✓' : isCurrent ? '◉' : '○'}
              </span>
              <span>{meta.icon}</span>
              <span className={classNames(done && 'line-through')}>{s.label || meta.label}</span>
              {isCurrent && currentTask?.due_at && (
                <span className="ml-auto text-xs text-gray-500">due {fmtDate(currentTask.due_at)}</span>
              )}
              {s.wait_days_before > 0 && s.step_order > 1 && (
                <span className="text-xs text-gray-400">(+{s.wait_days_before}d)</span>
              )}
            </li>
          );
        })}
      </ol>
    </div>
  );
}

function CadenceListView() {
  const { state, dispatch } = useApp();
  const profileMap = useMemo(() => Object.fromEntries(state.profiles.map(p => [p.id, p])), [state.profiles]);
  const acctMap    = useMemo(() => Object.fromEntries(state.accounts.map(a => [a.id, a])), [state.accounts]);
  const cadenceMap = useMemo(() => Object.fromEntries(state.cadences.map(c => [c.id, c])), [state.cadences]);
  const taskMap    = useMemo(() => Object.fromEntries(state.allTasks.map(t => [t.id, t])), [state.allTasks]);
  const stepsByCadence = useMemo(() => {
    const m = {};
    state.cadences.forEach(c => { m[c.id] = getCadenceStepsFor(state, c.id); });
    return m;
  }, [state.cadences, state.cadenceSteps]);

  const [sortField, setSortField] = useState('due_at');
  const [sortDir, setSortDir]     = useState('asc');
  const [statusFilter, setStatusFilter] = useState('active');
  const [stepTypeFilter, setStepTypeFilter] = useState([]);

  const rows = useMemo(() => {
    const filtered = state.cadenceEnrollments.filter(e => {
      if (statusFilter !== 'all' && e.status !== statusFilter) return false;
      if (stepTypeFilter.length) {
        const steps = stepsByCadence[e.cadence_id] || [];
        const cur = steps.find(s => s.step_order === e.current_step_order);
        if (!cur || !stepTypeFilter.includes(cur.step_type)) return false;
      }
      return true;
    });
    return filtered.map(e => {
      const steps = stepsByCadence[e.cadence_id] || [];
      const cur = steps.find(s => s.step_order === e.current_step_order);
      const task = e.current_task_id ? taskMap[e.current_task_id] : null;
      const acct = acctMap[e.account_id];
      return {
        enrollment: e,
        account: acct,
        cadence: cadenceMap[e.cadence_id],
        currentStep: cur,
        currentTask: task,
        rep: acct ? profileMap[acct.owner_id] : null,
      };
    });
  }, [state.cadenceEnrollments, stepsByCadence, taskMap, acctMap, cadenceMap, profileMap, statusFilter, stepTypeFilter]);

  const sorted = useMemo(() => {
    const k = sortDir === 'asc' ? 1 : -1;
    const get = (r) => {
      switch (sortField) {
        case 'account':  return (r.account?.name || '').toLowerCase();
        case 'cadence':  return (r.cadence?.name || '').toLowerCase();
        case 'step':     return r.enrollment.current_step_order || 0;
        case 'rep':      return (r.rep?.full_name || '').toLowerCase();
        case 'enrolled': return r.enrollment.enrolled_at || '';
        case 'due_at':
        default:         return r.currentTask?.due_at || '9999-12-31';
      }
    };
    return rows.slice().sort((a,b) => {
      const av = get(a), bv = get(b);
      if (av < bv) return -1 * k;
      if (av > bv) return  1 * k;
      return 0;
    });
  }, [rows, sortField, sortDir]);

  function sortBy(field) {
    if (sortField === field) setSortDir(sortDir === 'asc' ? 'desc' : 'asc');
    else { setSortField(field); setSortDir('asc'); }
  }
  function HeaderCell({ k, children }) {
    const isSorted = sortField === k;
    return (
      <th onClick={() => sortBy(k)} className="px-3 py-2 text-left font-medium text-gray-600 text-xs whitespace-nowrap cursor-pointer hover:bg-gray-100">
        {children}{isSorted && <span className="ml-1">{sortDir === 'asc' ? '↑' : '↓'}</span>}
      </th>
    );
  }

  async function markDone(row) {
    if (!row.currentTask) return;
    const completedAt = new Date().toISOString();
    const { data, error } = await supabase.from('tasks').update({ completed_at: completedAt }).eq('id', row.currentTask.id).select().single();
    if (error) return notify(dispatch, 'Mark done failed: ' + error.message, 'error');
    if (data) dispatch({ type: 'UPSERT_TASK', task: data });
    const result = await advanceCadenceFromCompletedTask({ taskId: row.currentTask.id, state, dispatch });
    if (result?.ok && result.completed) notify(dispatch, '🎉 Cadence complete!');
    else if (result?.ok) notify(dispatch, 'Step complete — cadence advanced');
    // error case already notified inside advanceCadenceFromCompletedTask
  }

  async function runReportNow(row) {
    if (!row.currentTask || !row.account) return;
    const account = row.account;
    const contacts = state.allContacts.filter(c => c.account_id === account.id);
    const primary = contacts.find(c => c.is_primary) || contacts[0];
    const sendTo = primary?.email || account.email;
    if (!sendTo) return notify(dispatch, 'No recipient email on account or primary contact.', 'error');
    if (!confirm(`Generate and send SEO report to ${sendTo}?\n\nThis will run a Google Maps grid scan + site audit (takes ~30-90 seconds) then send a personalized email.`)) return;
    notify(dispatch, `Generating report for ${account.name}…`);
    const result = await runAutoReportForAccount(account, {
      sendTo,
      prospectName: primary?.first_name || '',
      dispatch,
    });
    if (!result.ok) return notify(dispatch, `Report failed: ${result.error}`, 'error');
    const completedAt = new Date().toISOString();
    const { data: updatedTask } = await supabase.from('tasks').update({ completed_at: completedAt }).eq('id', row.currentTask.id).select().single();
    if (updatedTask) dispatch({ type: 'UPSERT_TASK', task: updatedTask });
    const { data: act } = await supabase.from('activities').insert({
      account_id: account.id, contact_id: primary?.id || null, user_id: account.owner_id,
      type: 'email', subject: result.subject || 'SEO Report sent',
      body: `Auto-sent SEO report to ${sendTo}`, occurred_at: completedAt,
      email_to: sendTo, email_from: 'ben@crocsandclicks.com', email_subject: result.subject,
    }).select().single();
    if (act) dispatch({ type: 'ADD_ACTIVITY', activity: act });
    await advanceCadenceFromCompletedTask({ taskId: row.currentTask.id, state, dispatch });
    notify(dispatch, `📊 Report sent to ${sendTo}`);
  }

  return (
    <div className="flex flex-1 overflow-hidden">
      <div className={classNames('border-r border-gray-200 bg-white transition-all w-72')}>
        <div className="flex items-center justify-between p-2 border-b border-gray-200">
          <div className="text-sm font-medium text-gray-700">Filters</div>
        </div>
        <div className="p-3 space-y-3">
          <Select label="Status" value={statusFilter} onChange={e => setStatusFilter(e.target.value)}
            options={[
              { value: 'active', label: 'Active' },
              { value: 'paused', label: 'Paused' },
              { value: 'completed', label: 'Completed' },
              { value: 'all', label: 'All' },
            ]} />
          <MultiCheckGroup label="Current step type"
            options={Object.entries(CADENCE_STEP_META).map(([v, m]) => ({ value: v, label: `${m.icon} ${m.label}` }))}
            values={stepTypeFilter}
            onChange={v => setStepTypeFilter(v)} />
        </div>
      </div>
      <div className="flex-1 flex flex-col overflow-hidden">
        <ListTabSwitcher />
        <div className="px-4 py-2 flex items-center gap-3 bg-white border-b border-gray-200">
          <span className="text-sm text-gray-600">{sorted.length} enrollment{sorted.length === 1 ? '' : 's'}</span>
        </div>
        <div className="flex-1 overflow-auto scrollbar-thin">
          <table className="min-w-full border-collapse">
            <thead className="bg-gray-50 border-b border-gray-200 sticky top-0 z-10">
              <tr>
                <HeaderCell k="due_at">Due</HeaderCell>
                <HeaderCell k="account">Account</HeaderCell>
                <HeaderCell k="cadence">Cadence</HeaderCell>
                <HeaderCell k="step">Step</HeaderCell>
                <th className="px-3 py-2 text-left font-medium text-gray-600 text-xs whitespace-nowrap">Type</th>
                <HeaderCell k="rep">Rep</HeaderCell>
                <th className="px-3 py-2 text-left font-medium text-gray-600 text-xs whitespace-nowrap"></th>
              </tr>
            </thead>
            <tbody>
              {sorted.map(r => {
                const meta = r.currentStep ? CADENCE_STEP_META[r.currentStep.step_type] : null;
                const overdue = r.currentTask?.due_at && new Date(r.currentTask.due_at) < new Date() && !r.currentTask.completed_at;
                const isComplete = r.enrollment.status === 'completed';
                return (
                  <tr key={r.enrollment.id} className="border-b border-gray-100 row-hover">
                    <td className={classNames('px-3 py-2 text-sm whitespace-nowrap', overdue && 'text-red-600 font-medium')}>
                      {isComplete ? <span className="text-green-700">✓ Completed</span>
                                  : r.currentTask?.due_at ? fmtDate(r.currentTask.due_at) : '—'}
                    </td>
                    <td className="px-3 py-2 text-sm">
                      {r.account ? <a href={`#/accounts/${r.account.id}`} className="text-blue-700 hover:underline font-medium">{r.account.name}</a> : <span className="text-gray-400">—</span>}
                    </td>
                    <td className="px-3 py-2 text-sm text-gray-800 whitespace-nowrap">{r.cadence?.name || '—'}</td>
                    <td className="px-3 py-2 text-sm text-gray-700 whitespace-nowrap">
                      {isComplete
                        ? <span className="text-gray-500">—</span>
                        : <>Step {r.enrollment.current_step_order}</>}
                    </td>
                    <td className="px-3 py-2 text-sm whitespace-nowrap">
                      {isComplete ? <span className="text-gray-400">—</span> :
                        meta ? <><span>{meta.icon}</span> <span className="text-gray-700">{r.currentStep?.label || meta.label}</span></> : '—'}
                    </td>
                    <td className="px-3 py-2 text-sm text-gray-700 whitespace-nowrap">{r.rep?.full_name || '—'}</td>
                    <td className="px-3 py-2 text-right whitespace-nowrap">
                      {!isComplete && r.currentTask && r.currentStep?.step_type === 'auto_email_report' && (
                        <Button size="sm" className="mr-1" onClick={() => runReportNow(r)}>📊 Run report</Button>
                      )}
                      {!isComplete && r.currentTask && (
                        <Button size="sm" variant="secondary" onClick={() => markDone(r)}>Mark done</Button>
                      )}
                    </td>
                  </tr>
                );
              })}
              {sorted.length === 0 && (
                <tr>
                  <td colSpan={7} className="text-center py-12 text-sm text-gray-500">
                    <div className="font-medium text-gray-700 mb-1">No enrollments match.</div>
                    <div className="text-xs">Open an account and click "Enroll in cadence" to start.</div>
                  </td>
                </tr>
              )}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}
